worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream mlflow_backend {
        server mlflow:5000;
    }

    upstream keiba_api_backend {
        server keiba-api:8000;
    }

    # ─────────────────────────────────────────
    # HTTP → HTTPS リダイレクト
    # (SSL証明書が無い場合はこのブロックをコメントアウトして
    #  下の HTTP 直接公開ブロックを有効化してください)
    # ─────────────────────────────────────────
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    # ─────────────────────────────────────────
    # HTTPS (SSL証明書がある場合)
    # ─────────────────────────────────────────
    # server {
    #     listen 443 ssl;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #
    #     # Basic認証
    #     auth_basic "MLflow Keiba";
    #     auth_basic_user_file /etc/nginx/htpasswd;
    #
    #     location / {
    #         proxy_pass http://mlflow_backend;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    #
    #     location /api/ {
    #         proxy_pass http://keiba_api_backend;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    # }

    # ─────────────────────────────────────────
    # HTTP 直接公開 (開発/テスト用)
    # 本番では上の HTTPS ブロックを有効化してください
    # ─────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Basic認証 (外部公開時のセキュリティ)
        auth_basic "MLflow Keiba";
        auth_basic_user_file /etc/nginx/htpasswd;

        # MLflow UI + API
        location / {
            proxy_pass http://mlflow_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket (MLflow UI で使用)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Keiba 予測 API
        location /keiba/ {
            rewrite ^/keiba/(.*) /$1 break;
            proxy_pass http://keiba_api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
