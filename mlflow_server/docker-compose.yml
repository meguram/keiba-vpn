version: "3.8"

services:
  # ─────────────────────────────────────────────
  # MLflow Tracking Server
  # ─────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    container_name: keiba-mlflow
    restart: unless-stopped
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:///mlflow/mlflow.db
        --default-artifact-root /mlflow/artifacts
        --serve-artifacts
    volumes:
      - mlflow_data:/mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_TRACKING_URI=sqlite:///mlflow/mlflow.db
    networks:
      - keiba-net

  # ─────────────────────────────────────────────
  # Nginx リバースプロキシ (外部公開用)
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: keiba-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/htpasswd:/etc/nginx/htpasswd:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - mlflow
    networks:
      - keiba-net

  # ─────────────────────────────────────────────
  # Keiba 予測 API (FastAPI)
  # ─────────────────────────────────────────────
  keiba-api:
    build:
      context: ..
      dockerfile: mlflow_server/Dockerfile.api
    container_name: keiba-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../models:/app/models
      - ../config:/app/config
      - ../pipelines:/app/pipelines
      - mlflow_data:/mlflow
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    networks:
      - keiba-net

volumes:
  mlflow_data:
    driver: local

networks:
  keiba-net:
    driver: bridge
