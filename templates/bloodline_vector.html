<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>血統ベクトル空間マップ | ML-AutoPilot Keiba</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&family=Noto+Sans+JP:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c10;
  --surface: #12151c;
  --border: #1e2330;
  --text: #e8eaf0;
  --text-dim: #8890a0;
  --accent: #ff6b35;
  --accent2: #00d4aa;
  --ss: #e63946;
  --kk: #457b9d;
  --rb: #2a9d8f;
  --nd: #e9c46a;
  --dh: #f4a261;
  --sw: #264653;
  --sc: #a8dadc;
  --mp: #6d6875;
  --ap: #b5838d;
  --dp: #ffb4a2;
  --other: #606060;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;overflow:hidden;height:100vh}
.gnav+.layout{height:calc(100vh - 44px)}
h1{font-family:'Shippori Mincho',serif;font-size:1.4rem;font-weight:700;letter-spacing:0.05em;color:var(--accent)}
.layout{display:grid;grid-template-columns:280px 1fr 300px;height:calc(100vh - 44px);gap:0}
.panel{background:var(--surface);border-right:1px solid var(--border);padding:16px;overflow-y:auto}
.panel-right{border-right:none;border-left:1px solid var(--border)}
.panel h2{font-size:0.75rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--text-dim);margin:16px 0 8px;font-weight:600}
.panel h2:first-child{margin-top:0}
.color-mode-btn{display:block;width:100%;padding:8px 12px;margin:3px 0;background:transparent;border:1px solid var(--border);color:var(--text);font-size:0.8rem;cursor:pointer;text-align:left;border-radius:4px;transition:all .15s}
.color-mode-btn:hover{border-color:var(--accent);color:var(--accent)}
.color-mode-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.legend-item{display:flex;align-items:center;gap:8px;font-size:0.75rem;margin:3px 0;color:var(--text-dim)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
canvas{display:block;background:var(--bg)}
.tooltip{position:fixed;pointer-events:none;background:rgba(18,21,28,.95);border:1px solid var(--accent);border-radius:6px;padding:12px 16px;font-size:0.8rem;line-height:1.5;max-width:320px;display:none;z-index:100;backdrop-filter:blur(8px)}
.tooltip .name{font-family:'Shippori Mincho',serif;font-size:1rem;font-weight:700;color:var(--accent);margin-bottom:6px}
.tooltip .line-tag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:0.7rem;margin-bottom:6px;font-weight:600}
.tooltip .stats{display:grid;grid-template-columns:1fr 1fr;gap:2px 12px}
.tooltip .stat-label{color:var(--text-dim);font-size:0.7rem}
.tooltip .stat-value{color:var(--text);font-weight:600;font-size:0.75rem}
.similar-list{margin-top:12px}
.similar-item{display:flex;justify-content:space-between;padding:6px 10px;margin:2px 0;background:rgba(255,255,255,.03);border-radius:4px;font-size:0.75rem;cursor:pointer;transition:all .15s}
.similar-item:hover{background:rgba(255,107,53,.1);color:var(--accent)}
.similar-score{color:var(--accent2);font-weight:600}
.selected-sire{font-family:'Shippori Mincho',serif;font-size:1.1rem;font-weight:700;color:var(--accent);margin-bottom:8px}
.dist-bar{height:6px;background:var(--border);border-radius:3px;margin:2px 0 6px;overflow:hidden;display:flex}
.dist-bar span{height:100%;transition:width .3s}
.search-box{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;font-size:0.85rem;margin:8px 0;outline:none}
.search-box:focus{border-color:var(--accent)}
.search-results{max-height:200px;overflow-y:auto}
.search-result{padding:6px 10px;cursor:pointer;font-size:0.8rem;border-radius:3px;transition:background .15s}
.search-result:hover{background:rgba(255,107,53,.15);color:var(--accent)}
.header-bar{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--surface)}
.header-bar .info{font-size:0.75rem;color:var(--text-dim)}
.zoom-controls{display:flex;gap:4px}
.zoom-btn{width:32px;height:32px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;border-radius:4px;font-size:1rem;display:flex;align-items:center;justify-content:center}
.zoom-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── Responsive ── */
@media (max-width: 900px) {
  .layout{grid-template-columns:1fr;height:auto}
  .panel{border-right:none;border-bottom:1px solid var(--border);max-height:none}
  .panel-right{border-left:none;border-top:1px solid var(--border)}
  h1{font-size:1.2rem}
  canvas{height:400px!important}
}
@media (max-width: 480px) {
  .panel{padding:12px}
  h1{font-size:1rem}
  h2{font-size:0.7rem}
  .search-box{font-size:0.8rem}
  .header-bar{padding:10px 12px;flex-wrap:wrap}
  .zoom-controls{width:100%;justify-content:center;margin-top:8px}
  canvas{height:350px!important}
}
</style>
</head>

{% include '_nav.html' %}
<div class="layout">
  <div class="panel" id="left-panel">
    <h1><img src="/data/image/icon.jpg" alt="" class="page-brand-icon">血統ベクトル空間</h1>
    <p style="font-size:.7rem;color:var(--text-dim);margin:4px 0 12px">PCA 2D Embedding / 100 Stallions</p>

    <div id="color-modes"></div>
    <h2>Legend</h2>
    <div id="legend"></div>
    <h2>Search</h2>
    <input type="text" class="search-box" id="search" placeholder="種牡馬名で検索...">
    <div class="search-results" id="search-results"></div>
  </div>
  <div style="display:flex;flex-direction:column;overflow:hidden">
    <div class="header-bar">
      <div class="info" id="info-text">100 stallions mapped</div>
      <div class="zoom-controls">
        <button class="zoom-btn" id="zoom-in">+</button>

      </div>
    </div>
    <canvas id="chart"></canvas>

  <div class="panel panel-right" id="right-panel">

    <div id="detail-content"><p style="color:var(--text-dim);font-size:.8rem">クリックで種牡馬を選択</p></div>
  </div>
</div>

const LINE_COLORS={
  "サンデーサイレンス系":"#e63946",
  "キングカメハメハ系":"#457b9d",
  "ロベルト系":"#2a9d8f",
  "ノーザンダンサー系":"#e9c46a",
  "デインヒル系":"#f4a261",
  "サドラーズウェルズ系":"#264653",
  "ストームキャット系":"#a8dadc",
  "ミスタープロスペクター系":"#6d6875",
  "エーピーインディ系":"#b5838d",
  "デピュティミニスター系":"#ffb4a2",
  "その他":"#606060",
  "不明":"#404040"
};

const COLOR_MODES=[
  {id:"sire_line",label:"系統別",fn:d=>LINE_COLORS[d.sire_line]||"#606060"},
  {id:"distance",label:"距離適性",fn:d=>{
    const s=d.sprint_rate,m=d.mile_rate,md=d.middle_rate,l=d.long_rate;
    const r=Math.round(255*s+200*m+100*md),g=Math.round(100*s+200*m+255*md+180*l),b=Math.round(50*s+100*m+150*md+255*l);
    return `rgb(${Math.min(r,255)},${Math.min(g,255)},${Math.min(b,255)})`;
  }},
  {id:"surface",label:"馬場適性 (芝/ダート)",fn:d=>{
    const t=d.turf_rate,dt=d.dirt_rate;
    if(t>0.4)return "#2ecc71";
    if(dt>0.05)return "#e67e22";
    if(t>0.2)return "#82e0aa";
    return "#aab7b8";
  }},
  {id:"top3",label:"複勝率",fn:d=>{
    const v=d.top3_rate;
    const r=Math.round(255*(1-v)+50*v),g=Math.round(80*(1-v)+220*v),b=Math.round(80*(1-v)+100*v);
    return `rgb(${r},${g},${b})`;
  }},
  {id:"mstn",label:"ミオスタチン型",fn:d=>{
    if(d.mstn_c>=0.8)return "#ff4757";
    if(d.mstn_c>=0.4)return "#ffa502";
    if(d.mstn_t>=0.8)return "#3742fa";
    return "#a4b0be";
  }},
  {id:"runners",label:"出走頭数",fn:d=>{
    const v=Math.min(d.n_runners/250,1);
    return `rgb(${Math.round(40+200*v)},${Math.round(60+150*v)},${Math.round(120+100*v)})`;
  }}
];

let currentMode="sire_line";
let selected=null;
let hovered=null;
let offsetX=0,offsetY=0,scale=1;
let dragging=false,dragStartX=0,dragStartY=0;
const canvas=document.getElementById("chart");
const ctx=canvas.getContext("2d");
const tooltip=document.getElementById("tooltip");

function resize(){
  const rect=canvas.parentElement.getBoundingClientRect();
  canvas.width=rect.width*devicePixelRatio;
  canvas.height=(rect.height-44)*devicePixelRatio;
  canvas.style.width=rect.width+"px";
  canvas.style.height=(rect.height-44)+"px";
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  draw();
}
window.addEventListener("resize",resize);

function getColorFn(){return COLOR_MODES.find(m=>m.id===currentMode).fn}

function worldToScreen(wx,wy){
  const cw=canvas.width/devicePixelRatio,ch=canvas.height/devicePixelRatio;
  const xs=DATA.map(d=>d.x),ys=DATA.map(d=>d.y);
  const xmin=Math.min(...xs),xmax=Math.max(...xs),ymin=Math.min(...ys),ymax=Math.max(...ys);
  const pad=60;
  const sx=(wx-xmin)/(xmax-xmin)*(cw-2*pad)+pad;
  const sy=(1-(wy-ymin)/(ymax-ymin))*(ch-2*pad)+pad;
  return [(sx+offsetX)*scale+cw*(1-scale)/2,(sy+offsetY)*scale+ch*(1-scale)/2];
}

function screenToWorld(px,py){
  const cw=canvas.width/devicePixelRatio,ch=canvas.height/devicePixelRatio;
  const xs=DATA.map(d=>d.x),ys=DATA.map(d=>d.y);
  const xmin=Math.min(...xs),xmax=Math.max(...xs),ymin=Math.min(...ys),ymax=Math.max(...ys);
  const pad=60;
  const sx=(px-cw*(1-scale)/2)/scale-offsetX;
  const sy=(py-ch*(1-scale)/2)/scale-offsetY;
  const wx=(sx-pad)/(cw-2*pad)*(xmax-xmin)+xmin;
  const wy=(1-(sy-pad)/(ch-2*pad))*(ymax-ymin)+ymin;
  return [wx,wy];
}

function draw(){
  const cw=canvas.width/devicePixelRatio,ch=canvas.height/devicePixelRatio;
  ctx.clearRect(0,0,cw,ch);
  const colorFn=getColorFn();

  if(selected&&SIM[selected]){
    const simList=SIM[selected];
    const selData=DATA.find(d=>d.name===selected);
    if(selData){
      const[sx,sy]=worldToScreen(selData.x,selData.y);
      simList.forEach(([name,score])=>{
        const other=DATA.find(d=>d.name===name);
        if(other){
          const[ox,oy]=worldToScreen(other.x,other.y);
          ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(ox,oy);
          ctx.strokeStyle=`rgba(255,107,53,${score*0.5})`;
          ctx.lineWidth=score*3;ctx.stroke();
        }
      });
    }
  }

  DATA.forEach(d=>{
    const[px,py]=worldToScreen(d.x,d.y);
    const r=Math.max(4,Math.min(12,Math.sqrt(d.n_runners)*0.8));
    const isSelected=d.name===selected;
    const isHovered=d.name===hovered;
    const isSimilar=selected&&SIM[selected]&&SIM[selected].some(([n])=>n===d.name);

    ctx.beginPath();
    ctx.arc(px,py,isSelected?r+4:isHovered?r+2:r,0,Math.PI*2);

    if(selected&&!isSelected&&!isSimilar){
      ctx.fillStyle=colorFn(d).replace("rgb","rgba").replace(")",",0.15)");
    }else{
      ctx.fillStyle=colorFn(d);
    }
    ctx.fill();

    if(isSelected){
      ctx.strokeStyle="#fff";ctx.lineWidth=2.5;ctx.stroke();
      ctx.beginPath();ctx.arc(px,py,r+8,0,Math.PI*2);
      ctx.strokeStyle="rgba(255,107,53,0.4)";ctx.lineWidth=1;ctx.stroke();
    }else if(isHovered){
      ctx.strokeStyle="rgba(255,255,255,0.6)";ctx.lineWidth=1.5;ctx.stroke();
    }

    const showLabel=isSelected||isHovered||isSimilar||d.n_runners>100||scale>1.5;
    if(showLabel){
      ctx.font=`${isSelected?'bold ':''}${isSelected?'12':'10'}px 'Noto Sans JP',sans-serif`;
      ctx.fillStyle=isSelected?"#fff":isSimilar?"rgba(255,255,255,0.9)":"rgba(255,255,255,0.6)";
      ctx.textAlign="center";
      const label=d.name.length>10?d.name.slice(0,10)+"…":d.name;
      ctx.fillText(label,px,py-r-5);
    }
  });
}

function findNearest(mx,my){
  let best=null,bestDist=Infinity;
  DATA.forEach(d=>{
    const[px,py]=worldToScreen(d.x,d.y);
    const dist=Math.hypot(px-mx,py-my);
    if(dist<bestDist){bestDist=dist;best=d}
  });
  return bestDist<20?best:null;
}

canvas.addEventListener("mousemove",e=>{
  if(dragging){
    offsetX+=(e.movementX)/scale;
    offsetY+=(e.movementY)/scale;
    draw();return;
  }
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const d=findNearest(mx,my);
  hovered=d?d.name:null;
  canvas.style.cursor=d?"pointer":"grab";
  draw();
  if(d){
    showTooltip(d,e.clientX,e.clientY);
  }else{
    tooltip.style.display="none";
  }
});

canvas.addEventListener("mousedown",e=>{
  dragging=true;dragStartX=e.clientX;dragStartY=e.clientY;
  canvas.style.cursor="grabbing";
});
canvas.addEventListener("mouseup",e=>{
  const moved=Math.hypot(e.clientX-dragStartX,e.clientY-dragStartY);
  dragging=false;
  canvas.style.cursor="grab";
  if(moved<5){
    const rect=canvas.getBoundingClientRect();
    const d=findNearest(e.clientX-rect.left,e.clientY-rect.top);
    if(d){selectSire(d.name)}
  }
});
canvas.addEventListener("mouseleave",()=>{dragging=false;hovered=null;tooltip.style.display="none";draw()});

canvas.addEventListener("wheel",e=>{
  e.preventDefault();
  const delta=e.deltaY>0?0.9:1.1;
  scale=Math.max(0.3,Math.min(8,scale*delta));
  draw();
},{passive:false});

document.getElementById("zoom-in").onclick=()=>{scale=Math.min(8,scale*1.3);draw()};
document.getElementById("zoom-out").onclick=()=>{scale=Math.max(0.3,scale/1.3);draw()};
document.getElementById("zoom-reset").onclick=()=>{scale=1;offsetX=0;offsetY=0;draw()};

function showTooltip(d,cx,cy){
  const mstnLabel=d.mstn_c>=0.8?"CC型":d.mstn_c>=0.4?"CT型":d.mstn_t>=0.8?"TT型":"推定中";
  tooltip.innerHTML=`
    <div class="name">${d.name}</div>
    <span class="line-tag" style="background:${LINE_COLORS[d.sire_line]||'#606060'};color:#fff">${d.sire_line}</span>
    <div class="stats">
      <span class="stat-label">出走数</span><span class="stat-value">${d.n_runners}</span>
      <span class="stat-label">複勝率</span><span class="stat-value">${(d.top3_rate*100).toFixed(1)}%</span>
      <span class="stat-label">勝率</span><span class="stat-value">${(d.win_rate*100).toFixed(1)}%</span>
      <span class="stat-label">MSTN</span><span class="stat-value">${mstnLabel}</span>
      <span class="stat-label">スプリント</span><span class="stat-value">${(d.sprint_rate*100).toFixed(0)}%</span>
      <span class="stat-label">マイル</span><span class="stat-value">${(d.mile_rate*100).toFixed(0)}%</span>
      <span class="stat-label">中距離</span><span class="stat-value">${(d.middle_rate*100).toFixed(0)}%</span>
      <span class="stat-label">長距離</span><span class="stat-value">${(d.long_rate*100).toFixed(0)}%</span>
      <span class="stat-label">芝率</span><span class="stat-value">${(d.turf_rate*100).toFixed(0)}%</span>
      <span class="stat-label">ダ率</span><span class="stat-value">${(d.dirt_rate*100).toFixed(0)}%</span>
    </div>`;
  tooltip.style.display="block";
  const tw=tooltip.offsetWidth,th=tooltip.offsetHeight;
  tooltip.style.left=Math.min(cx+12,window.innerWidth-tw-8)+"px";
  tooltip.style.top=Math.min(cy+12,window.innerHeight-th-8)+"px";
}

function selectSire(name){
  selected=name;
  const d=DATA.find(x=>x.name===name);
  if(!d)return;
  draw();
  const sim=SIM[name]||[];
  const mstnLabel=d.mstn_c>=0.8?"CC型 (スプリンター)":d.mstn_c>=0.4?"CT型 (マイラー)":d.mstn_t>=0.8?"TT型 (中長距離)":"推定中";
  const panel=document.getElementById("detail-content");
  panel.innerHTML=`
    <div class="selected-sire">${name}</div>
    <span class="line-tag" style="background:${LINE_COLORS[d.sire_line]||'#606060'};color:#fff;display:inline-block;padding:2px 8px;border-radius:3px;font-size:.7rem;margin-bottom:12px">${d.sire_line}</span>
    <div style="margin:8px 0">
      <div style="display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:2px">
        <span style="color:var(--text-dim)">出走頭数</span><span style="font-weight:600">${d.n_runners}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:2px">
        <span style="color:var(--text-dim)">複勝率</span><span style="font-weight:600;color:var(--accent2)">${(d.top3_rate*100).toFixed(1)}%</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:2px">
        <span style="color:var(--text-dim)">勝率</span><span style="font-weight:600">${(d.win_rate*100).toFixed(1)}%</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:2px">
        <span style="color:var(--text-dim)">MSTN型</span><span style="font-weight:600">${mstnLabel}</span>
      </div>
    </div>
    <h2 style="margin-top:16px">距離分布</h2>
    <div class="dist-bar">
      <span style="width:${d.sprint_rate*100}%;background:#e63946" title="Sprint ${(d.sprint_rate*100).toFixed(0)}%"></span>
      <span style="width:${d.mile_rate*100}%;background:#f4a261" title="Mile ${(d.mile_rate*100).toFixed(0)}%"></span>
      <span style="width:${d.middle_rate*100}%;background:#2a9d8f" title="Middle ${(d.middle_rate*100).toFixed(0)}%"></span>
      <span style="width:${d.long_rate*100}%;background:#264653" title="Long ${(d.long_rate*100).toFixed(0)}%"></span>
    </div>
    <div style="display:flex;gap:8px;font-size:.65rem;color:var(--text-dim);margin-bottom:12px">
      <span><span style="color:#e63946">■</span> Sprint ${(d.sprint_rate*100).toFixed(0)}%</span>
      <span><span style="color:#f4a261">■</span> Mile ${(d.mile_rate*100).toFixed(0)}%</span>
      <span><span style="color:#2a9d8f">■</span> Middle ${(d.middle_rate*100).toFixed(0)}%</span>
      <span><span style="color:#264653">■</span> Long ${(d.long_rate*100).toFixed(0)}%</span>
    </div>
    <h2 style="margin-top:8px">馬場適性</h2>
    <div style="display:flex;gap:16px;font-size:.75rem;margin:4px 0 12px">
      <div><span style="color:var(--text-dim)">芝</span> <span style="font-weight:600;color:#2ecc71">${(d.turf_rate*100).toFixed(0)}%</span>
      <span style="color:var(--text-dim);font-size:.65rem">(TOP3: ${(d.turf_top3*100).toFixed(0)}%)</span></div>
      <div><span style="color:var(--text-dim)">ダ</span> <span style="font-weight:600;color:#e67e22">${(d.dirt_rate*100).toFixed(0)}%</span></div>
    </div>
    <h2>類似種牡馬 (Top 8)</h2>
    <div class="similar-list">${sim.map(([n,s])=>`
      <div class="similar-item" onclick="selectSire('${n.replace(/'/g,"\\'")}')">
        <span>${n.length>16?n.slice(0,16)+'…':n}</span>
        <span class="similar-score">${(s*100).toFixed(1)}%</span>
      </div>`).join("")}
    </div>`;
}

function initColorModes(){
  const container=document.getElementById("color-modes");
  COLOR_MODES.forEach(m=>{
    const btn=document.createElement("button");
    btn.className="color-mode-btn"+(m.id===currentMode?" active":"");
    btn.textContent=m.label;
    btn.onclick=()=>{
      currentMode=m.id;
      container.querySelectorAll(".color-mode-btn").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      updateLegend();
      draw();
    };
    container.appendChild(btn);
  });
}

function updateLegend(){
  const container=document.getElementById("legend");
  container.innerHTML="";
  if(currentMode==="sire_line"){
    Object.entries(LINE_COLORS).forEach(([name,color])=>{
      const count=DATA.filter(d=>d.sire_line===name).length;
      if(count===0)return;
      container.innerHTML+=`<div class="legend-item"><div class="legend-dot" style="background:${color}"></div>${name} (${count})</div>`;
    });
  }else if(currentMode==="distance"){
    container.innerHTML=`
      <div class="legend-item"><div class="legend-dot" style="background:rgb(255,100,50)"></div>スプリンター</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgb(200,200,100)"></div>マイラー</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgb(100,255,150)"></div>中距離</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgb(50,180,255)"></div>ステイヤー</div>`;
  }else if(currentMode==="surface"){
    container.innerHTML=`
      <div class="legend-item"><div class="legend-dot" style="background:#2ecc71"></div>芝主体 (>40%)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#82e0aa"></div>芝寄り (20-40%)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e67e22"></div>ダート寄り</div>
      <div class="legend-item"><div class="legend-dot" style="background:#aab7b8"></div>バランス</div>`;
  }else if(currentMode==="top3"){
    container.innerHTML=`
      <div class="legend-item"><div class="legend-dot" style="background:rgb(50,220,100)"></div>高複勝率 (>30%)</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgb(150,150,90)"></div>中程度 (~20%)</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgb(255,80,80)"></div>低複勝率 (<15%)</div>`;
  }else if(currentMode==="mstn"){
    container.innerHTML=`
      <div class="legend-item"><div class="legend-dot" style="background:#ff4757"></div>CC型 (スプリント)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ffa502"></div>CT型 (マイル~中距離)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#3742fa"></div>TT型 (中~長距離)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#a4b0be"></div>推定中</div>`;
  }else if(currentMode==="runners"){
    container.innerHTML=`
      <div class="legend-item"><div class="legend-dot" style="background:rgb(240,210,220)"></div>多頭数 (>200)</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgb(140,130,170)"></div>中程度 (~100)</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgb(40,60,120)"></div>少頭数 (<30)</div>`;
  }
}

const searchInput=document.getElementById("search");
const searchResults=document.getElementById("search-results");
searchInput.addEventListener("input",()=>{
  const q=searchInput.value.toLowerCase();
  if(!q){searchResults.innerHTML="";return}
  const matches=DATA.filter(d=>d.name.toLowerCase().includes(q)).slice(0,10);
  searchResults.innerHTML=matches.map(d=>`<div class="search-result" onclick="selectSire('${d.name.replace(/'/g,"\\'")}');document.getElementById('search').value=''">${d.name}</div>`).join("");
});

initColorModes();
updateLegend();
resize();
</script>
</body>
</html>
