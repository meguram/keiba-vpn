<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>馬券最適化 | ML-AutoPilot Keiba</title>
<style>
  :root {
    --bg: #0a0e17;
    --surface: #131926;
    --surface2: #1a2235;
    --border: #243049;
    --text: #c8d6e5;
    --text-dim: #6b7d95;
    --accent: #3b82f6;
    --ok: #22c55e;
    --ok-dim: rgba(34,197,94,0.15);
    --warn: #f59e0b;
    --warn-dim: rgba(245,158,11,0.12);
    --err: #ef4444;
    --err-dim: rgba(239,68,68,0.12);
    --gold: #fbbf24;
    --silver: #94a3b8;
    --bronze: #d97706;
    --purple: #a78bfa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--text-dim); margin-bottom: 16px;
  }
  .back-link:hover { color: var(--accent); text-decoration: none; }

  h1 { font-size: 24px; font-weight: 700; margin-bottom: 20px; }
  h2 { font-size: 18px; font-weight: 600; margin-bottom: 12px; color: var(--text); }
  h3 { font-size: 15px; font-weight: 600; margin-bottom: 8px; color: var(--text-dim); }

  .config-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 20px;
  }
  .config-row {
    display: flex; flex-wrap: wrap; gap: 16px; align-items: end;
  }
  .config-field { display: flex; flex-direction: column; gap: 4px; }
  .config-field label {
    font-size: 12px; color: var(--text-dim); font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .config-field input, .config-field select {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); padding: 8px 12px; font-size: 14px; min-width: 140px;
  }
  .config-field input:focus, .config-field select:focus {
    outline: none; border-color: var(--accent);
  }
  .check-group { display: flex; gap: 12px; align-items: center; }
  .check-group label {
    display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer;
  }
  .check-group input[type="checkbox"] {
    accent-color: var(--accent); width: 16px; height: 16px;
  }
  .btn {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 10px 24px; font-size: 14px; font-weight: 600; cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 6px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px;
  }

  .stat-row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; }
  .stat-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px 20px; flex: 1; min-width: 150px;
  }
  .stat-box .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .stat-box .value { font-size: 22px; font-weight: 700; }
  .stat-box .value.positive { color: var(--ok); }
  .stat-box .value.negative { color: var(--err); }
  .stat-box .value.neutral { color: var(--warn); }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left; font-size: 11px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.5px;
    padding: 8px 10px; border-bottom: 1px solid var(--border);
  }
  tbody td {
    padding: 10px 10px; border-bottom: 1px solid rgba(36,48,73,0.5);
    vertical-align: middle;
  }
  tbody tr:hover { background: rgba(59,130,246,0.05); }

  .bet-type-badge {
    display: inline-block; font-size: 11px; font-weight: 700;
    padding: 2px 8px; border-radius: 4px;
  }
  .bet-type-badge.tansho { background: rgba(239,68,68,0.15); color: var(--err); }
  .bet-type-badge.fukusho { background: rgba(34,197,94,0.15); color: var(--ok); }
  .bet-type-badge.umaren { background: rgba(59,130,246,0.15); color: var(--accent); }
  .bet-type-badge.wide { background: rgba(167,139,250,0.15); color: var(--purple); }
  .bet-type-badge.umatan { background: rgba(245,158,11,0.15); color: var(--warn); }

  .ev-bar {
    height: 6px; border-radius: 3px; background: var(--surface2);
    position: relative; overflow: hidden; min-width: 60px;
  }
  .ev-bar .fill {
    position: absolute; top: 0; left: 0; height: 100%; border-radius: 3px;
    transition: width 0.3s;
  }
  .ev-high { background: var(--ok); }
  .ev-mid { background: var(--warn); }
  .ev-low { background: var(--err); }

  .prob-chart { margin-top: 8px; }
  .prob-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .prob-row .num { font-size: 12px; font-weight: 600; min-width: 24px; text-align: right; }
  .prob-row .name { font-size: 12px; color: var(--text-dim); min-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .prob-bar-bg { flex: 1; height: 14px; background: var(--surface2); border-radius: 3px; overflow: hidden; position: relative; }
  .prob-bar-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.4s; }
  .prob-row .pct { font-size: 11px; min-width: 40px; text-align: right; color: var(--text-dim); }

  .alloc-chart { margin-top: 8px; }
  .alloc-bar {
    display: flex; height: 28px; border-radius: 6px; overflow: hidden;
    background: var(--surface2); margin-bottom: 8px;
  }
  .alloc-segment {
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; color: #fff;
    transition: width 0.4s; min-width: 0;
  }

  .kelly-vis { display: flex; gap: 4px; align-items: end; height: 60px; margin-top: 8px; }
  .kelly-bar {
    flex: 1; background: var(--accent); border-radius: 3px 3px 0 0;
    min-width: 4px; transition: height 0.4s;
    position: relative;
  }
  .kelly-bar .tip {
    position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
    font-size: 9px; color: var(--text-dim); white-space: nowrap;
  }

  .loading { text-align: center; padding: 40px; color: var(--text-dim); }
  .loading .spinner {
    display: inline-block; width: 24px; height: 24px;
    border: 3px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--text-dim);
    font-size: 14px;
  }

  .tooltip {
    position: relative; cursor: help;
  }
  .tooltip::after {
    content: attr(data-tip);
    position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-size: 11px; padding: 4px 8px; border-radius: 4px;
    white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.15s;
  }
  .tooltip:hover::after { opacity: 1; }
</style>
</head>
<body>
{% include '_nav.html' %}
<div style="padding:24px">
  <h1><img src="/data/image/icon.jpg" alt="" class="page-brand-icon">馬券最適化 — Kelly Criterion</h1>

  <div class="config-panel">
    <div class="config-row">
      <div class="config-field">
        <label>Race ID</label>
        <input type="text" id="raceId" placeholder="202606010101">
      </div>
      <div class="config-field">
        <label>資金 (円)</label>
        <input type="number" id="bankroll" value="100000" step="10000" min="1000">
      </div>
      <div class="config-field">
        <label>Kelly倍率</label>
        <input type="number" id="kellyFrac" value="0.25" step="0.05" min="0.05" max="1.0">
      </div>
      <div class="config-field">
        <label>最低EV</label>
        <input type="number" id="minEv" value="1.05" step="0.05" min="1.0">
      </div>
      <div class="config-field">
        <label>馬券種別</label>
        <div class="check-group">
          <label><input type="checkbox" id="chkTansho" checked> 単勝</label>
          <label><input type="checkbox" id="chkFukusho" checked> 複勝</label>
          <label><input type="checkbox" id="chkUmaren" checked> 馬連</label>
          <label><input type="checkbox" id="chkWide" checked> ワイド</label>
          <label><input type="checkbox" id="chkUmatan"> 馬単</label>
        </div>
      </div>
      <div class="config-field">
        <button class="btn" id="btnOptimize" onclick="runOptimize()">最適化実行</button>
      </div>
    </div>
  </div>

  <div id="result-area"></div>

<script>
async function runOptimize() {
  const btn = document.getElementById('btnOptimize');
  const area = document.getElementById('result-area');
  const raceId = document.getElementById('raceId').value.trim();
  if (!raceId) { alert('Race ID を入力してください'); return; }

  const betTypes = [];
  if (document.getElementById('chkTansho').checked) betTypes.push('tansho');
  if (document.getElementById('chkFukusho').checked) betTypes.push('fukusho');
  if (document.getElementById('chkUmaren').checked) betTypes.push('umaren');
  if (document.getElementById('chkWide').checked) betTypes.push('wide');
  if (document.getElementById('chkUmatan').checked) betTypes.push('umatan');
  if (!betTypes.length) { alert('馬券種別を1つ以上選択してください'); return; }

  btn.disabled = true;
  area.innerHTML = '<div class="loading"><div class="spinner"></div><div>最適化中...</div></div>';

  try {
    const resp = await fetch('/api/betting/optimize', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        race_id: raceId,
        bankroll: parseInt(document.getElementById('bankroll').value),
        kelly_fraction: parseFloat(document.getElementById('kellyFrac').value),
        min_ev: parseFloat(document.getElementById('minEv').value),
        bet_types: betTypes,
      }),
    });
    const data = await resp.json();
    if (data.error) {
      area.innerHTML = `<div class="card" style="border-color:var(--err)"><p style="color:var(--err)">${data.error}</p></div>`;
      return;
    }
    renderResult(data);
  } catch(e) {
    area.innerHTML = `<div class="card" style="border-color:var(--err)"><p style="color:var(--err)">エラー: ${e.message}</p></div>`;
  } finally {
    btn.disabled = false;
  }
}

function renderResult(data) {
  const area = document.getElementById('result-area');
  const cands = data.candidates || [];
  const roiClass = data.expected_roi >= 1.0 ? 'positive' : (data.expected_roi >= 0.8 ? 'neutral' : 'negative');
  const roiPct = ((data.expected_roi - 1) * 100).toFixed(1);

  let html = `
    <div class="stat-row">
      <div class="stat-box">
        <div class="label">投票総額</div>
        <div class="value">¥${data.total_bet.toLocaleString()}</div>
      </div>
      <div class="stat-box">
        <div class="label">期待回収額</div>
        <div class="value ${roiClass}">¥${Math.round(data.expected_return).toLocaleString()}</div>
      </div>
      <div class="stat-box">
        <div class="label">期待ROI</div>
        <div class="value ${roiClass}">${(data.expected_roi * 100).toFixed(1)}%
          <span style="font-size:13px">(${roiPct > 0 ? '+' : ''}${roiPct}%)</span>
        </div>
      </div>
      <div class="stat-box">
        <div class="label">残資金</div>
        <div class="value">¥${data.remaining.toLocaleString()}</div>
      </div>
      <div class="stat-box">
        <div class="label">投票数</div>
        <div class="value">${cands.length}<span style="font-size:13px;color:var(--text-dim)"> 点</span></div>
      </div>
    </div>
  `;

  if (!cands.length) {
    html += '<div class="empty-state">EV基準を満たす投票候補がありません。<br>最低EV を下げるか、Kelly倍率を調整してください。</div>';
    area.innerHTML = html;
    return;
  }

  html += '<div class="grid-2">';

  // Left: Betting portfolio table
  html += '<div class="card"><h2>投票ポートフォリオ</h2>';
  html += renderAllocBar(cands, data.total_bet);
  html += `<table>
    <thead><tr>
      <th>種別</th><th>組み合わせ</th><th>オッズ</th>
      <th class="tooltip" data-tip="モデル予測による的中確率">確率</th>
      <th class="tooltip" data-tip="期待値 = 確率 × オッズ">EV</th>
      <th class="tooltip" data-tip="Kelly基準による最適比率">Kelly</th>
      <th>投票額</th><th>期待回収</th>
    </tr></thead><tbody>`;

  for (const c of cands) {
    const evClass = c.ev >= 1.5 ? 'ev-high' : (c.ev >= 1.1 ? 'ev-mid' : 'ev-low');
    const evWidth = Math.min(100, (c.ev / 2.0) * 100);
    html += `<tr>
      <td><span class="bet-type-badge ${c.bet_type}">${betTypeLabel(c.bet_type)}</span></td>
      <td><strong>${c.pair_label}</strong><br><span style="font-size:11px;color:var(--text-dim)">${c.horse_names[1] ? c.horse_names.join(' / ') : c.horse_names[0]}</span></td>
      <td>${c.odds.toFixed(1)}</td>
      <td>${(c.prob * 100).toFixed(1)}%</td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-weight:600;color:${c.ev >= 1.0 ? 'var(--ok)' : 'var(--err)'}">${c.ev.toFixed(2)}</span>
          <div class="ev-bar"><div class="fill ${evClass}" style="width:${evWidth}%"></div></div>
        </div>
      </td>
      <td style="font-size:12px">${(c.kelly_fraction * 100).toFixed(1)}%</td>
      <td style="font-weight:600">¥${c.bet_amount.toLocaleString()}</td>
      <td style="color:var(--ok)">¥${Math.round(c.expected_return).toLocaleString()}</td>
    </tr>`;
  }
  html += '</tbody></table></div>';

  // Right: Probability distribution + Kelly visualization
  html += '<div class="card">';
  html += '<h2>確率分布 (モデル推定)</h2>';
  html += renderProbChart(data.prob_distribution);
  html += '<h3 style="margin-top:20px">Kelly比率分布</h3>';
  html += renderKellyVis(cands);
  html += '</div>';

  html += '</div>';

  area.innerHTML = html;
}

function renderAllocBar(cands, total) {
  if (!total) return '';
  const colors = { tansho: '#ef4444', fukusho: '#22c55e', umaren: '#3b82f6', wide: '#a78bfa', umatan: '#f59e0b' };
  let html = '<div class="alloc-bar">';
  for (const c of cands) {
    const pct = (c.bet_amount / total * 100);
    if (pct < 1) continue;
    html += `<div class="alloc-segment" style="width:${pct}%;background:${colors[c.bet_type] || '#555'}" title="${betTypeLabel(c.bet_type)} ${c.pair_label}: ¥${c.bet_amount.toLocaleString()}">${pct > 8 ? c.pair_label : ''}</div>`;
  }
  html += '</div>';
  return html;
}

function renderProbChart(dist) {
  if (!dist) return '';
  const entries = Object.entries(dist).sort((a,b) => b[1] - a[1]);
  const maxProb = entries.length ? entries[0][1] : 0;
  let html = '<div class="prob-chart">';
  for (const [num, prob] of entries) {
    const w = maxProb > 0 ? (prob / maxProb * 100) : 0;
    html += `<div class="prob-row">
      <span class="num">${num}</span>
      <div class="prob-bar-bg"><div class="prob-bar-fill" style="width:${w}%"></div></div>
      <span class="pct">${(prob * 100).toFixed(1)}%</span>
    </div>`;
  }
  html += '</div>';
  return html;
}

function renderKellyVis(cands) {
  if (!cands.length) return '<div style="color:var(--text-dim);font-size:12px">投票候補なし</div>';
  const maxK = Math.max(...cands.map(c => c.kelly_fraction));
  const colors = { tansho: '#ef4444', fukusho: '#22c55e', umaren: '#3b82f6', wide: '#a78bfa', umatan: '#f59e0b' };
  let html = '<div class="kelly-vis">';
  for (const c of cands) {
    const h = maxK > 0 ? (c.kelly_fraction / maxK * 50) : 0;
    html += `<div class="kelly-bar" style="height:${h}px;background:${colors[c.bet_type] || '#555'}" title="${c.pair_label}: ${(c.kelly_fraction*100).toFixed(1)}%">
      <span class="tip">${c.pair_label}</span>
    </div>`;
  }
  html += '</div>';
  return html;
}

function betTypeLabel(t) {
  return { tansho: '単勝', fukusho: '複勝', umaren: '馬連', wide: 'ワイド', umatan: '馬単' }[t] || t;
}
</script>
</div>
</body>
</html>
