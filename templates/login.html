<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>開発者ログイン | ML-AutoPilot Keiba</title>
<style>
  :root {
    --bg: #0a0e17; --surface: #131926; --surface2: #1a2235;
    --border: #243049; --text: #c8d6e5; --text-dim: #6b7d95;
    --accent: #3b82f6; --err: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column;
  }
  .login-container {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
  }
  .login-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 400px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  }
  .login-icon {
    width: 48px; height: 48px; margin: 0 auto 20px;
    background: rgba(59,130,246,0.1); border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
  }
  .login-icon svg { width: 24px; height: 24px; color: var(--accent); }
  .login-title {
    font-size: 20px; font-weight: 700; color: #fff; text-align: center;
    margin-bottom: 6px;
  }
  .login-subtitle {
    font-size: 13px; color: var(--text-dim); text-align: center;
    margin-bottom: 28px;
  }
  .login-field { margin-bottom: 20px; }
  .login-field label {
    display: block; font-size: 12px; font-weight: 600; color: var(--text-dim);
    margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .login-field input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: #fff; padding: 12px 14px; border-radius: 8px; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  .login-field input:focus { border-color: var(--accent); }
  .login-field input::placeholder { color: var(--text-dim); }
  .login-error {
    background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
    color: var(--err); padding: 10px 14px; border-radius: 8px;
    font-size: 13px; margin-bottom: 16px; text-align: center;
  }
  .login-btn {
    width: 100%; background: var(--accent); color: #fff; border: none;
    padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background 0.2s;
  }
  .login-btn:hover { background: #2563eb; }
  .login-footer {
    text-align: center; margin-top: 20px; font-size: 12px; color: var(--text-dim);
  }
  .login-footer a { color: var(--accent); text-decoration: none; }
  .login-footer a:hover { text-decoration: underline; }
  .login-remember {
    display: flex; align-items: center; gap: 8px; margin-bottom: 20px;
    font-size: 12px; color: var(--text-dim);
  }
  .login-remember input[type="checkbox"] {
    accent-color: var(--accent); width: 14px; height: 14px;
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .login-container { padding: 20px 16px; }
    .login-card { padding: 32px 24px; }
    .login-title { font-size: 18px; }
    .login-subtitle { font-size: 12px; }
    .login-icon { width: 40px; height: 40px; margin-bottom: 16px; }
    .login-icon svg { width: 20px; height: 20px; }
  }
</style>
</head>
<body>
{% include '_nav.html' %}

<div class="login-container">
  <div class="login-card">
    <div class="login-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0110 0v4"/>
      </svg>
    </div>
    <h1 class="login-title">開発者ログイン</h1>
    <p class="login-subtitle">管理機能にアクセスするにはパスワードを入力してください</p>

    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <input type="hidden" name="next" value="{{ next_url }}">
      <div class="login-field">
        <label for="password">パスワード</label>
        <input type="password" id="password" name="password" placeholder="開発者パスワード" autofocus required>
      </div>
      <div class="login-remember">
        <input type="checkbox" id="remember" checked disabled>
        <label for="remember">30日間ログイン状態を保持</label>
      </div>
      <button type="submit" class="login-btn">ログイン</button>
    </form>

    <div class="login-footer">
      <a href="/">ビジターとしてサイトを閲覧</a>
    </div>
  </div>
</div>
</body>
</html>
