}

/** クリックで列ソート（data-sort / data-sort-text 対応） */
function enableTableSort(tableEl, opts) {
  if (!tableEl || tableEl.dataset.sortBound === '1') return;
  tableEl.dataset.sortBound = '1';
  const thead = tableEl.querySelector('thead tr');
  const tbody = tableEl.querySelector('tbody');
  if (!thead || !tbody) return;

  const renumberCol = opts && opts.renumberCol >= 0 ? opts.renumberCol : -1;
  let sortCol = null;
  let sortDir = 1;

  function cellValue(td) {
    if (!td) return { n: NaN, s: '' };
    if (td.hasAttribute('data-sort-text')) {
      return { n: NaN, s: td.getAttribute('data-sort-text') || '' };
    }
    const ds = td.getAttribute('data-sort');
    if (ds !== null && ds !== '') {
      const num = parseFloat(ds);
      return Number.isNaN(num) ? { n: NaN, s: String(ds) } : { n: num, s: String(ds) };
    }
    const txt = (td.textContent || '').trim().replace(/[¥,%]/g, '');
    const num = parseFloat(txt);
    return Number.isNaN(num) ? { n: NaN, s: txt } : { n: num, s: txt };
  }

  function compareRows(a, b, col) {
    const A = cellValue(a.children[col]);
    const B = cellValue(b.children[col]);
    if (!Number.isNaN(A.n) && !Number.isNaN(B.n)) return sortDir * (A.n - B.n);
    if (!Number.isNaN(A.n)) return -sortDir;
    if (!Number.isNaN(B.n)) return sortDir;
    return sortDir * A.s.localeCompare(B.s, 'ja');
  }

  tableEl.addEventListener('click', (ev) => {
    const th = ev.target.closest('th.col-sortable');
    if (!th || !tableEl.contains(th)) return;
    const idx = Array.from(thead.children).indexOf(th);
    if (idx < 0) return;
    if (sortCol === idx) sortDir = -sortDir;
    else {
      sortCol = idx;
      sortDir = 1;
    }
    const rows = Array.from(tbody.querySelectorAll('tr'));
    rows.sort((a, b) => compareRows(a, b, idx));
    rows.forEach((r, i) => {
      tbody.appendChild(r);
      if (renumberCol >= 0 && r.children[renumberCol]) {
        r.children[renumberCol].textContent = String(i + 1);
      }
    });
    thead.querySelectorAll('th.col-sortable').forEach((h) => {
      h.classList.remove('col-sort-asc', 'col-sort-desc');
    });
    th.classList.add(sortDir > 0 ? 'col-sort-asc' : 'col-sort-desc');
  });
}

/** ポジションマップ: 1グループに格納する最大頭数 */
const MAX_HORSES_PER_CLUSTER = 5;

/**
 * ポジションマップ用: 番手が近い馬を同一縦位置のクラスターにまとめる。
 * 1グループ最大 MAX_HORSES_PER_CLUSTER 頭。超過分は別グループ（番手帯内で縦位置を少しずらす）。
 */
function clusterPositionMapHorses(horses, fieldSize) {
  if (!horses.length) return [];
  const fs = Math.max(Number(fieldSize) || horses.length, 2);
  const maxGap = fs <= 10 ? 1 : fs <= 14 ? 2 : 2;

  const sorted = [...horses].sort((a, b) => {
    if (a.position !== b.position) return a.position - b.position;
    return a.position_norm - b.position_norm;
  });

  const rawClusters = [];
  let cur = [sorted[0]];
  for (let i = 1; i < sorted.length; i++) {
    const h = sorted[i];
    const last = cur[cur.length - 1];
    const withinGap = h.position - last.position <= maxGap;
    if (withinGap && cur.length < MAX_HORSES_PER_CLUSTER) {
      cur.push(h);
    } else {
      rawClusters.push(cur);
      cur = [h];
    }
  }
  rawClusters.push(cur);

  const clusters = [];
  rawClusters.forEach((group) => {
    const parts = splitClusterGroupsByMaxSize(group, MAX_HORSES_PER_CLUSTER);
    parts.forEach((part, partIdx) => {
      clusters.push(buildPositionMapCluster(part, partIdx, parts.length));
    });
  });
  return clusters;
}

function splitClusterGroupsByMaxSize(group, maxSize) {
  const n = Math.max(1, maxSize || MAX_HORSES_PER_CLUSTER);
  if (group.length <= n) return [group];
  const parts = [];
  for (let i = 0; i < group.length; i += n) {
    parts.push(group.slice(i, i + n));
  }
  return parts;
}

function buildPositionMapCluster(group, partIdx, partTotal) {
  group.sort((a, b) => a.bracket_number - b.bracket_number);
  const positions = group.map((g) => g.position).sort((a, b) => a - b);
  const norms = group.map((g) => g.position_norm);
  let avgNorm = norms.reduce((s, v) => s + v, 0) / norms.length;
  if (partTotal > 1) {
    avgNorm = Math.min(0.97, avgNorm + partIdx * 0.018);
  }
  return {
    horses: group,
    horseRows: [group],
    avgNorm,
    positions,
  };
}

function earlyPosBandLabel(positions) {
  const p = (positions || []).filter((n) => n != null && !Number.isNaN(n));
  if (!p.length) return '—';
  const min = p[0];
  const max = p[p.length - 1];
  return min === max ? String(min) : `${min}-${max}`;
}

function buildPositionMapHtml(data, byHorseNum, fieldSize) {
  const posFlow = data.position_flow || [];
  if (!posFlow.length) return '';

  const horsesWithPos = posFlow.map((pf) => {
    const pos = pf.positions?.early;
    if (!pos || pos.position == null) return null;
    const bn = byHorseNum.find((e) => e.horse_number === pf.horse_number)?.bracket_number || 1;
    return {
      horse_number: pf.horse_number,
      horse_name: pf.horse_name || '',
      position: pos.position,
      position_norm: pos.position_norm || 0,
      bracket_number: bn,
    };
  }).filter((h) => h !== null);

  if (!horsesWithPos.length) return '';

  const clusters = clusterPositionMapHorses(horsesWithPos, fieldSize)
    .sort((a, b) => (a.positions[0] || 99) - (b.positions[0] || 99));

  let ladderHtml = '';
  clusters.forEach((cluster) => {
    const band = earlyPosBandLabel(cluster.positions);
    let pills = '';
    cluster.horses.forEach((horse) => {
      pills += `<button type="button" class="pos-pill waku-${horse.bracket_number}"
        title="${escAttr(horse.horse_name)} · 序盤${horse.position}番手 枠${horse.bracket_number}"
        onclick="scrollToHorseRow(${horse.horse_number})">${horse.horse_number}</button>`;
    });
    ladderHtml += `<div class="early-pos-row">
      <div class="early-pos-band" title="${band}番手">${escHtml(band)}<span class="band-unit">番手</span></div>
      <div class="early-pos-pills">${pills}</div>
    </div>`;
  });

  const gapNote = fieldSize <= 10 ? '1' : '2';
  return `<div class="early-pos-map">
    <p class="early-pos-hint">
      序盤1-3Fの想定位置（全${fieldSize}頭に1〜${fieldSize}番手を割当）。
      近い番手（${gapNote}番手差以内）は同じ行にまとめ、1行は最大${MAX_HORSES_PER_CLUSTER}頭です。上が前・下が後です。
    </p>
    <div class="early-pos-axis">
      <span class="axis-front">▲ 前</span>
      <span class="axis-title">序盤 1-3F</span>
      <span class="axis-back">後 ▼</span>
    </div>
    <div class="early-pos-ladder">${ladderHtml}</div>
  </div>`;
}

function formatPassingDisplay(po) {
  const s = String(po || '').trim();
  if (!s || s === '**') return '—';
  if (s.includes('-')) return s;
  if (/^\d+$/.test(s) && s.length > 2) {
    const parts = [];
    let i = 0;
    while (i < s.length) {
      if (i + 1 < s.length) {
        const two = parseInt(s.slice(i, i + 2), 10);
        if (two >= 10 && two <= 18) {
          parts.push(String(two));
          i += 2;
          continue;
        }
      }
      parts.push(s[i]);
      i += 1;
    }
    return parts.join('-');
  }
  return s;
}

function normalizeDateKey(d) {
  if (!d) return '';
  const s = String(d).trim();
  if (/^\d{8}$/.test(s)) return s;
  const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (iso) return `${iso[1]}${iso[2]}${iso[3]}`;
  const slash = s.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})/);
  if (slash) {
    return `${slash[1]}${String(slash[2]).padStart(2, '0')}${String(slash[3]).padStart(2, '0')}`;
  }
  return '';
}

function formatDateKeyLabel(key) {
  const k = normalizeDateKey(key);
  if (k.length !== 8) return '';
  return `${k.slice(0, 4)}/${k.slice(4, 6)}/${k.slice(6, 8)}`;
}

function filterRacesBeforeAnalysis(races, ctx, limit = 10) {
  const cutoff = normalizeDateKey(ctx.race_date);
  const curRid = String(ctx.race_id || '').trim();
  const out = [];
  for (const r of races || []) {
    if (curRid && String(r.race_id || '').trim() === curRid) continue;
    const rDate = normalizeDateKey(r.date || r.race_date);
    if (cutoff && rDate && rDate >= cutoff) continue;
    out.push(r);
    if (out.length >= limit) break;
  }
  return out;
}

function horseHistoryCacheKey(horseId, ctx) {
  return `${horseId}|${ctx.race_id || ''}|${ctx.race_date || ''}`;
}

/** 対象レース日より前の直近戦績（recent_races 未デプロイ時は detail にフォールバック） */
async function fetchHorseRecentRacesPayload(horseId, ctx, limit = 10) {
  const beforeDate = normalizeDateKey(ctx.race_date);
  const excludeRaceId = String(ctx.race_id || '').trim();
  const q = new URLSearchParams({ limit: String(limit) });
  if (beforeDate) q.set('before_date', beforeDate);
  if (excludeRaceId) q.set('exclude_race_id', excludeRaceId);

  const recentUrl = `/api/horse/${encodeURIComponent(horseId)}/recent_races?${q}`;
  let resp = await fetch(recentUrl);
  if (resp.ok) {
    const data = await resp.json();
    return {
      horse_name: data.horse_name || '',
      races: data.races || [],
    };
  }
  if (resp.status === 404) {
    resp = await fetch(`/api/horse/${encodeURIComponent(horseId)}/detail`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const detail = await resp.json();
    const info = detail.info || {};
    const history = detail.race_history || [];
    return {
      horse_name: info.horse_name || detail.horse_name || '',
      races: filterRacesBeforeAnalysis(history, ctx, limit),
    };
  }
  throw new Error(`HTTP ${resp.status}`);
}

async function openHorseHistory(horseId, horseName) {
  if (!horseId) return;
  const modal = document.getElementById('horseHistoryModal');
  const body = document.getElementById('horseHistoryBody');
  const titleEl = document.getElementById('horseHistoryTitle');
  const subEl = document.getElementById('horseHistorySub');
  if (!modal || !body) return;

  const ctx = { ..._currentAnalysisContext };
  const cacheKey = horseHistoryCacheKey(horseId, ctx);
  const dateLabel = formatDateKeyLabel(ctx.race_date);

  modal.classList.add('is-open');
  modal.setAttribute('aria-hidden', 'false');
  titleEl.textContent = horseName || '馬';
  subEl.textContent = dateLabel
    ? `horse_id: ${horseId} — ${dateLabel} より前の直近10走（新しい順）`
    : `horse_id: ${horseId} — 直近10走（新しい順）`;
  body.innerHTML = `
    <div class="td-loading" style="padding:20px 8px">
      <div style="display:flex;align-items:center;gap:14px">
        <div class="td-loading-spinner" style="width:32px;height:32px" aria-hidden="true"></div>
        <div>
          <div style="font-size:12px;font-weight:600;color:#fff">戦績を読み込んでいます</div>
          <div style="font-size:11px;color:var(--text-dim);margin-top:4px">直近10走を取得中…</div>
        </div>
      </div>
    </div>`;

  try {
    let payload = _horseHistoryCache[cacheKey];
    if (!payload) {
      payload = await fetchHorseRecentRacesPayload(horseId, ctx, 10);
      _horseHistoryCache[cacheKey] = payload;
    }
    const displayName = payload.horse_name || horseName || '';
    titleEl.textContent = displayName;
    body.innerHTML = renderHorseHistoryTable(payload.races || []);
    const histTbl = body.querySelector('.horse-history-table');
    if (histTbl) enableTableSort(histTbl);
  } catch (e) {
    body.innerHTML = `<div class="empty">戦績の取得に失敗しました: ${escHtml(e.message)}</div>`;
  }
}

function closeHorseHistory() {
  const modal = document.getElementById('horseHistoryModal');
  if (!modal) return;
  modal.classList.remove('is-open');
  modal.setAttribute('aria-hidden', 'true');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeHorseHistory();
});

function buildPacePredictionHtml(data, entries, fps) {
  const pace = data.pace_prediction;
  if (!pace) return '';

  const paceType = pace.pace_type || 'ミドル';
  const paceIndex = pace.pace_index || 50;
  const pacePattern = pace.predicted_pattern || '';
  const dist = pace.distribution || {};

  let paceClass = 'pace-type-mid';
  if (paceType === 'ハイ') paceClass = 'pace-type-high';
  else if (paceType === 'スロー') paceClass = 'pace-type-slow';

  const lapTimes = pace.lap_times || {};
  const lap1f = lapTimes.first_1f || 0;
  const lap3f = lapTimes.first_3f || 0;
  const l3fBaseline = pace.last_3f_baseline_sec || 0;
  const paceComment = generatePaceComment(pace, fps, data.field_size || entries.length);
  const verdictCls = paceType === 'ハイ' ? 'pace-verdict-high' : paceType === 'スロー' ? 'pace-verdict-slow' : 'pace-verdict-mid';

  return `<div class="pace-prediction compact">
    <h3>🏁 ペース予想</h3>
    <div style="margin-bottom:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span class="pace-type-badge ${paceClass}">${paceType}ペース</span>
      <span style="font-size:13px;color:var(--text-dim)">ペース指数 ${paceIndex.toFixed(1)}</span>
      <span style="font-size:11px;color:var(--text-dim);padding:3px 8px;background:rgba(255,255,255,0.05);border-radius:4px">${pacePattern}</span>
    </div>
    <div class="pace-meter">
      <div class="pace-meter-pointer" style="left:${paceIndex}%"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-dim);margin-bottom:12px">
      <span>◀ スロー</span><span>ミドル</span><span>ハイ ▶</span>
    </div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px;align-items:flex-start">
      <div class="pace-bars" style="gap:14px">
        <div class="pace-item"><span class="pace-dot" style="background:var(--err)"></span>
          <span class="pace-label">逃げ</span><span class="pace-count">${dist['逃げ'] || 0}頭</span></div>
        <div class="pace-item"><span class="pace-dot" style="background:var(--warn)"></span>
          <span class="pace-label">先行</span><span class="pace-count">${dist['先行'] || 0}頭</span></div>
        <div class="pace-item"><span class="pace-dot" style="background:var(--accent)"></span>
          <span class="pace-label">差し</span><span class="pace-count">${dist['差し'] || 0}頭</span></div>
        <div class="pace-item"><span class="pace-dot" style="background:var(--purple)"></span>
          <span class="pace-label">追込</span><span class="pace-count">${dist['追込'] || 0}頭</span></div>
      </div>
      ${lap1f > 0 ? `
      <div class="lap-times${l3fBaseline > 0 ? '' : ' cols-2'}">
        <div class="lap-time-item">
          <span class="lap-label">前半1F</span>
          <span class="lap-value">${lap1f.toFixed(1)}<span class="lap-unit">秒</span></span>
        </div>
        <div class="lap-time-item">
          <span class="lap-label">前半3F</span>
          <span class="lap-value">${lap3f.toFixed(1)}<span class="lap-unit">秒</span></span>
        </div>
        ${l3fBaseline > 0 ? `
        <div class="lap-time-item">
          <span class="lap-label">上り3F基準</span>
          <span class="lap-value">${l3fBaseline.toFixed(1)}<span class="lap-unit">秒</span></span>
        </div>` : ''}
      </div>` : ''}
    </div>
    <div class="pace-verdict ${verdictCls}" style="margin-top:8px;font-size:12px;line-height:1.5">
      ${paceComment.verdict}
    </div>
    <details class="pace-more">
      <summary>詳しいペース解説を表示</summary>
      <div class="pace-comment-block" style="display:block;margin-top:10px">
        ${paceComment.lines.map(l => `
          <div class="pace-comment-line">
            <span class="pace-comment-icon">${l.icon}</span>
            <span class="pace-comment-text">${l.text}</span>
          </div>`).join('')}
        <div class="pace-tip" style="margin-top:8px">${paceComment.tip}</div>
      </div>
    </details>
  </div>`;
}

function renderResults(data) {
  const main = document.getElementById('mainContent');
  if (!data.entries || data.entries.length === 0) {
    main.innerHTML = '<div class="empty">データが不足しています</div>';
    return;
  }

  const selectedDate = document.getElementById('dateSelect')?.value || '';
  _currentAnalysisContext = {
    race_id: data.race_id || _selectedRaceId || '',
    race_date: normalizeDateKey(data.race_date || selectedDate),
  };

  const entries = data.entries;
  const byHorseNum = [...entries].sort((a, b) => a.horse_number - b.horse_number);
  const fps = data.field_prev_stats || {};
  const fieldSize = resolveFieldSize(data);

  let html = '';

  if (data.race_id && (data.result_viewable || data.result_view_url)) {
    _raceResultMeta[data.race_id] = {
      viewable: true,
      kind: data.result_kind || 'confirmed',
      url: data.result_view_url || `/race/${data.race_id}`,
    };
    updateControlsResultLink();
  }

  const resultLink = resultLinkHtml(data.race_id, {
    viewable: data.result_viewable,
    kind: data.result_kind,
    url: data.result_view_url || (data.result_viewable ? `/race/${data.race_id}` : null),
  });

  // Race meta
  html += `<div class="race-meta">
    <span class="race-name">${data.race_name || data.race_id}</span>
    <span class="race-tag">${data.venue || ''} ${data.surface || ''}${data.distance || ''}m ${data.track_condition || ''}</span>
    <span class="race-tag">${data.field_size}頭</span>
    ${fps.prev_top3_count != null ? `<span class="race-tag" style="background:rgba(239,68,68,0.1);color:var(--err)">前走3番手以内 ${fps.prev_top3_count}頭</span>` : ''}
    ${fps.front_pressure_ratio != null ? `<span class="race-tag" style="background:rgba(245,158,11,0.1);color:var(--warn)">先行意識 ${fieldPrevPaceLabel(fps.t1f_normalization_factor)}</span>` : ''}
    ${resultLink ? `<span class="race-result-link-wrap">${resultLink}</span>` : ''}
  </div>`;

  // ペース予想（レース情報直下）
  html += buildPacePredictionHtml(data, entries, fps);

  const bins = fps.position_bins || [];
  if (bins.length > 0) {
    html += `<details class="field-extra">
      <summary>前走位置分布・フィールド統計（クリックで展開）</summary>
      ${buildPositionBinSectionHtml(bins, byHorseNum, fps)}
    </details>`;
  }

  if ((data.position_flow || []).length > 0) {
    html += `<details class="field-extra position-map-details">
      <summary>📍 序盤ポジション（1-3F）</summary>
      ${buildPositionMapHtml(data, byHorseNum, fieldSize)}
    </details>`;
  }

  html += `<p style="font-size:11px;color:var(--text-dim);margin:0 0 12px;line-height:1.5">
    序盤位置は全${fieldSize}頭に1〜${fieldSize}番手を重複なく割当。列見出しクリックでソート（▲▼）。
  </p>`;
  html += buildHorseMasterTableHtml(data);

  main.innerHTML = html;
  _lastAnalysisPayload = data;
  initSortableTables(main);
}

function scrollToHorseRow(horseNumber) {
  const el = document.getElementById(`row-${horseNumber}`);
  if (!el) return;
  el.classList.add('row-highlight');
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  setTimeout(() => el.classList.remove('row-highlight'), 2000);
}

init();
</script>
