<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>追走難度 | ML-AutoPilot Keiba</title>
<style>
  :root {
    --bg: #0a0e17; --surface: #131926; --surface2: #1a2235;
    --border: #243049; --text: #c8d6e5; --text-dim: #6b7d95;
    --accent: #3b82f6; --ok: #22c55e; --warn: #f59e0b; --err: #ef4444;
    --purple: #a78bfa; --key: #7dd3fc; --num: #fbbf24;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

  .page-header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 16px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .page-header h1 { font-size: 16px; font-weight: 700; color: #fff; }
  .page-header .subtitle { font-size: 12px; color: var(--text-dim); }

  .controls {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .controls label { font-size: 12px; color: var(--text-dim); }
  .controls select, .controls input {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 6px 10px; border-radius: 5px; font-size: 12px;
  }
  .controls button {
    background: var(--accent); color: #fff; border: none; padding: 7px 16px;
    border-radius: 5px; font-size: 12px; cursor: pointer; font-weight: 600;
  }
  .controls button:hover { background: #2563eb; }
  .controls button:disabled { opacity: 0.5; cursor: not-allowed; }
  #statusMsg { font-size: 11px; color: var(--text-dim); }
  #dateLoadMsg { font-size: 11px; color: var(--text-dim); margin-left: 4px; }
  #dateLoadMsg.is-busy { color: var(--key); }

  .content { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }

  .race-meta {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px 18px; margin-bottom: 20px; display: flex; gap: 20px; flex-wrap: wrap;
    align-items: center;
  }
  .race-meta .race-name { font-size: 16px; font-weight: 700; color: #fff; }
  .race-meta .race-tag {
    font-size: 11px; padding: 3px 8px; border-radius: 4px;
    background: rgba(167,139,250,0.15); color: var(--purple); font-weight: 600;
  }
  .race-result-link-wrap { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .race-result-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 700; color: #fff; text-decoration: none;
    padding: 6px 14px; border-radius: 6px;
    background: linear-gradient(135deg, rgba(34,197,94,0.35), rgba(34,197,94,0.15));
    border: 1px solid rgba(34,197,94,0.45);
    transition: background 0.15s, border-color 0.15s;
  }
  .race-result-link:hover {
    background: rgba(34,197,94,0.35);
    border-color: var(--ok);
  }
  .race-result-link.flash {
    background: linear-gradient(135deg, rgba(245,158,11,0.35), rgba(245,158,11,0.12));
    border-color: rgba(245,158,11,0.5);
  }
  .race-result-link.flash:hover { border-color: var(--warn); }
  #controlsResultLink { margin-left: 4px; }

  /* ── ゲート配置 × 追走容易度（横棒） ── */
  .gate-ease-panel {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px 18px; margin-bottom: 20px;
  }
  .gate-ease-head {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap; margin-bottom: 12px;
  }
  .gate-ease-head h3 {
    font-size: 13px; font-weight: 600; color: var(--purple); margin: 0;
  }
  .gate-ease-sort {
    display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-dim);
  }
  .gate-ease-sort select {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 5px 10px; border-radius: 5px; font-size: 12px; cursor: pointer;
  }
  .gate-ease-table {
    width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed;
  }
  .gate-ease-table th {
    text-align: left; padding: 8px 10px; color: var(--text-dim); font-weight: 600;
    border-bottom: 1px solid var(--border); font-size: 11px; white-space: nowrap;
  }
  .gate-ease-table th.col-rank { width: 36px; text-align: center; }
  .gate-ease-table th.col-waku { width: 40px; text-align: center; }
  .gate-ease-table th.col-num { width: 44px; text-align: center; }
  .gate-ease-table th.col-name { width: 18%; }
  .gate-ease-table th.col-pos { width: 72px; text-align: center; }
  .gate-ease-table th.col-flow { width: 88px; text-align: center; }
  .gate-ease-table th.col-l3f { width: 80px; text-align: center; }
  .gate-ease-table th.col-bar { width: auto; }
  .gate-ease-table th.col-label { width: 72px; text-align: center; }
  .gate-ease-table td {
    padding: 9px 10px; border-bottom: 1px solid rgba(36, 48, 73, 0.45);
    vertical-align: middle;
  }
  .gate-ease-table tr { cursor: pointer; transition: background 0.12s; }
  .gate-ease-table tbody tr:hover td { background: rgba(59, 130, 246, 0.06); }
  .gate-ease-table .tc { text-align: center; }
  .gate-ease-table .horse-cell { font-weight: 600; color: #fff; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; max-width: 0; }
  .gate-ease-pos-main { font-weight: 800; color: var(--key); font-size: 13px; }
  .gate-ease-flow-sub { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
  .ease-bar-cell { min-width: 120px; }
  .ease-bar-track {
    position: relative; height: 22px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 4px; overflow: hidden;
  }
  .ease-bar-fill {
    height: 100%; border-radius: 3px 0 0 3px; transition: width 0.35s ease;
    min-width: 2px;
  }
  .ease-bar-pct {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    font-size: 11px; font-weight: 800; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    pointer-events: none;
  }
  .gate-waku-pill {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; border-radius: 50%; font-size: 11px; font-weight: 800;
  }

  /* ── カードグリッド ── */
  .cards-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px; margin-bottom: 24px;
  }
  .td-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .td-card:hover { border-color: var(--accent); box-shadow: 0 0 20px rgba(59,130,246,0.1); }
  .td-card-header {
    padding: 12px 14px; display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .td-card-num {
    width: 32px; height: 32px; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; font-size: 14px; font-weight: 800;
    flex-shrink: 0;
  }
  .td-card-info { flex: 1; min-width: 0; }
  .td-card-name { font-size: 14px; font-weight: 700; color: #fff; }
  .td-card-style {
    font-size: 10px; padding: 2px 6px; border-radius: 3px; font-weight: 600;
    display: inline-block; margin-top: 2px;
  }
  .style-nige { background: rgba(239,68,68,0.15); color: var(--err); }
  .style-senkou { background: rgba(245,158,11,0.15); color: var(--warn); }
  .style-sashi { background: rgba(59,130,246,0.15); color: var(--accent); }
  .style-oikomi { background: rgba(167,139,250,0.15); color: var(--purple); }

  .td-ease-badge {
    font-size: 18px; font-weight: 800; padding: 4px 12px; border-radius: 8px;
    text-align: center; min-width: 60px; flex-shrink: 0;
  }
  .ease-very-easy { background: rgba(34,197,94,0.15); color: var(--ok); }
  .ease-easy { background: rgba(59,130,246,0.15); color: var(--accent); }
  .ease-normal { background: rgba(107,125,149,0.1); color: var(--text-dim); }
  .ease-hard { background: rgba(245,158,11,0.15); color: var(--warn); }
  .ease-very-hard { background: rgba(239,68,68,0.15); color: var(--err); }

  .td-card-body { padding: 12px 14px; }
  .td-factor-group { margin-bottom: 10px; }
  .td-factor-title {
    font-size: 10px; font-weight: 600; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 5px; display: flex; align-items: center; gap: 6px;
  }
  .td-factor-title svg { width: 12px; height: 12px; opacity: 0.6; }
  .td-factor-row {
    display: flex; align-items: center; gap: 8px; padding: 3px 0;
    font-size: 11.5px;
  }
  .td-factor-label { color: var(--text-dim); min-width: 80px; }
  .td-factor-value { font-weight: 600; }
  .td-bar-container { flex: 1; height: 6px; background: rgba(36,48,73,0.5); border-radius: 3px; overflow: hidden; }
  .td-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }

  /* ── 出走馬マスターテーブル（集約） ── */
  .horse-table-section {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 18px; margin-bottom: 20px;
  }
  .table-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap; margin-bottom: 12px;
  }
  .table-toolbar h3 { font-size: 14px; font-weight: 700; color: #fff; margin: 0; }
  .table-toolbar-sort {
    display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-dim);
  }
  .table-toolbar-sort select {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 5px 10px; border-radius: 5px; font-size: 12px;
  }
  .horse-table-wrap { overflow-x: auto; }
  .horse-table {
    width: 100%; border-collapse: collapse; font-size: 12px; min-width: 880px;
  }
  .horse-table thead th {
    background: var(--surface2); padding: 9px 10px; text-align: left;
    font-weight: 600; color: var(--text-dim); font-size: 11px;
    border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  .horse-table tbody td {
    padding: 8px 10px; border-bottom: 1px solid rgba(36, 48, 73, 0.4);
    vertical-align: middle;
  }
  .horse-table tbody tr { transition: background 0.12s; }
  .horse-table tbody tr:hover td { background: rgba(59, 130, 246, 0.06); }
  .horse-table tbody tr.row-highlight td { background: rgba(59, 130, 246, 0.14); }
  .horse-table .tc { text-align: center; }
  .horse-table .num { text-align: center; font-variant-numeric: tabular-nums; }
  .horse-table .horse-name-cell { font-weight: 600; color: #fff; white-space: nowrap; }
  .mini-ease-track {
    display: inline-block; vertical-align: middle; width: 52px; height: 8px;
    background: var(--surface2); border: 1px solid var(--border); border-radius: 3px;
    overflow: hidden; margin-right: 6px;
  }
  .mini-ease-fill { height: 100%; display: block; }
  .flow-compact { font-size: 11px; font-weight: 700; color: var(--key); white-space: nowrap; }
  .field-extra {
    margin-bottom: 16px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 0 14px;
  }
  .field-extra summary {
    cursor: pointer; padding: 12px 0; font-size: 12px; font-weight: 600;
    color: var(--text-dim); list-style: none;
  }
  .field-extra summary::-webkit-details-marker { display: none; }
  .field-extra[open] summary { margin-bottom: 4px; color: var(--key); }
  .field-extra .pos-dist-section { margin: 0 0 12px; padding: 0; border: none; background: transparent; }
  .field-extra .pos-dist-section h3 { display: none; }
  .pace-prediction.compact { padding: 14px 18px; margin-bottom: 16px; }
  .pace-prediction.compact .pace-comment-block { display: none; }
  .pace-prediction.compact details.pace-more { margin-top: 8px; }
  .pace-prediction.compact details.pace-more summary {
    font-size: 11px; color: var(--key); cursor: pointer; list-style: none;
  }
  .pace-prediction.compact details.pace-more summary::-webkit-details-marker { display: none; }

  /* テーブル列ソート（ヘッダークリック） */
  .position-table th.col-sortable,
  .analysis-table th.col-sortable,
  .horse-table th.col-sortable,
  .gate-ease-table th.col-sortable,
  .pos-dist-table th.col-sortable,
  .horse-history-table th.col-sortable {
    cursor: pointer;
    user-select: none;
    transition: background 0.12s, color 0.12s;
    white-space: nowrap;
  }
  .position-table th.col-sortable:hover,
  .analysis-table th.col-sortable:hover,
  .horse-table th.col-sortable:hover,
  .gate-ease-table th.col-sortable:hover,
  .pos-dist-table th.col-sortable:hover,
  .horse-history-table th.col-sortable:hover {
    background: rgba(59, 130, 246, 0.1);
    color: #fff;
  }
  .position-table th.col-sortable::after,
  .analysis-table th.col-sortable::after,
  .horse-table th.col-sortable::after,
  .gate-ease-table th.col-sortable::after,
  .pos-dist-table th.col-sortable::after,
  .horse-history-table th.col-sortable::after {
    content: '⇅';
    font-size: 9px;
    opacity: 0.35;
    margin-left: 4px;
    vertical-align: middle;
  }
  .position-table th.col-sort-asc::after,
  .analysis-table th.col-sort-asc::after,
  .horse-table th.col-sort-asc::after,
  .gate-ease-table th.col-sort-asc::after,
  .pos-dist-table th.col-sort-asc::after,
  .horse-history-table th.col-sort-asc::after {
    content: '▲';
    opacity: 0.9;
    color: var(--key);
  }
  .position-table th.col-sort-desc::after,
  .analysis-table th.col-sort-desc::after,
  .horse-table th.col-sort-desc::after,
  .gate-ease-table th.col-sort-desc::after,
  .pos-dist-table th.col-sort-desc::after,
  .horse-history-table th.col-sort-desc::after {
    content: '▼';
    opacity: 0.9;
    color: var(--key);
  }

  .waku-1 { background: #f5f5f5; color: #222; }
  .waku-2 { background: #111; color: #fff; border: 1px solid #555; }
  .waku-3 { background: #e53935; color: #fff; }
  .waku-4 { background: #1e88e5; color: #fff; }
  .waku-5 { background: #fdd835; color: #222; }
  .waku-6 { background: #43a047; color: #fff; }
  .waku-7 { background: #f57c00; color: #fff; }
  .waku-8 { background: #ec407a; color: #fff; }

  .empty { color: var(--text-dim); text-align: center; padding: 60px 20px; font-size: 14px; }

  /* ── 分析読み込み ── */
  .td-loading {
    animation: td-loading-in 0.35s ease-out;
  }
  @keyframes td-loading-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .td-loading-card {
    background: linear-gradient(145deg, rgba(26, 34, 53, 0.95), rgba(19, 25, 38, 0.98));
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 28px 24px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    position: relative;
    overflow: hidden;
  }
  .td-loading-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% -20%, rgba(59, 130, 246, 0.12), transparent 55%);
    pointer-events: none;
  }
  .td-loading-top {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 22px;
    position: relative;
    z-index: 1;
  }
  .td-loading-spinner {
    flex-shrink: 0;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 2px solid rgba(59, 130, 246, 0.15);
    border-top-color: var(--accent);
    border-right-color: rgba(125, 211, 252, 0.5);
    animation: td-spin 0.9s linear infinite;
  }
  @keyframes td-spin {
    to { transform: rotate(360deg); }
  }
  .td-loading-title {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
    letter-spacing: 0.02em;
  }
  .td-loading-race {
    font-size: 12px;
    color: var(--key);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .td-loading-detail {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.55;
    min-height: 1.55em;
    transition: opacity 0.2s;
  }
  .td-loading-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 16px;
    margin-top: 10px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .td-loading-meta strong {
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .td-loading-hint {
    margin-top: 6px;
    font-size: 11px;
    color: rgba(125, 211, 252, 0.75);
    opacity: 0;
    transition: opacity 0.4s;
  }
  .td-loading-hint.is-visible { opacity: 1; }
  .td-loading-steps {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 22px;
    position: relative;
    z-index: 1;
  }
  .td-loading-step {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid transparent;
    font-size: 12px;
    color: var(--text-dim);
    transition: background 0.25s, border-color 0.25s, color 0.25s;
  }
  .td-loading-step.is-active {
    background: rgba(59, 130, 246, 0.08);
    border-color: rgba(59, 130, 246, 0.25);
    color: var(--text);
  }
  .td-loading-step.is-done {
    color: var(--text);
    opacity: 0.85;
  }
  .td-loading-step-dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 800;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .td-loading-step.is-active .td-loading-step-dot {
    border-color: var(--accent);
    color: var(--key);
    box-shadow: 0 0 12px rgba(59, 130, 246, 0.35);
  }
  .td-loading-step.is-done .td-loading-step-dot {
    background: rgba(34, 197, 94, 0.15);
    border-color: rgba(34, 197, 94, 0.45);
    color: var(--ok);
  }
  .td-loading-skeleton {
    display: grid;
    gap: 12px;
    position: relative;
    z-index: 1;
  }
  .td-skel-block {
    height: 14px;
    border-radius: 6px;
    background: linear-gradient(
      90deg,
      rgba(36, 48, 73, 0.5) 0%,
      rgba(59, 130, 246, 0.12) 45%,
      rgba(36, 48, 73, 0.5) 90%
    );
    background-size: 200% 100%;
    animation: td-shimmer 1.6s ease-in-out infinite;
  }
  .td-skel-block.w40 { width: 40%; }
  .td-skel-block.w55 { width: 55%; }
  .td-skel-block.w70 { width: 70%; }
  .td-skel-block.w100 { width: 100%; height: 48px; border-radius: 8px; }
  .td-skel-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
  }
  .td-skel-card {
    height: 120px;
    border-radius: 8px;
    border: 1px solid rgba(36, 48, 73, 0.6);
    background: linear-gradient(
      110deg,
      rgba(19, 25, 38, 0.9) 0%,
      rgba(36, 48, 73, 0.35) 50%,
      rgba(19, 25, 38, 0.9) 100%
    );
    background-size: 200% 100%;
    animation: td-shimmer 1.8s ease-in-out infinite;
  }
  @keyframes td-shimmer {
    0% { background-position: 100% 0; }
    100% { background-position: -100% 0; }
  }
  .td-loading-error {
    margin-top: 16px;
    padding: 12px 14px;
    border-radius: 8px;
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.35);
    color: #fca5a5;
    font-size: 12px;
    line-height: 1.5;
  }
  .td-loading-retry {
    margin-top: 12px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-weight: 600;
  }
  .td-loading-retry:hover {
    border-color: var(--accent);
    color: #fff;
  }
  .controls.is-busy #analyzeBtn { opacity: 0.65; }
  #dateSelect.is-loading { color: var(--text-dim); }

  /* ── スタミナ指数 ── */
  .stamina-index-badge {
    font-size: 18px; font-weight: 800; padding: 4px 12px; border-radius: 8px;
    text-align: center; min-width: 60px; flex-shrink: 0;
  }
  .stamina-max  { background: rgba(34,197,94,0.15); color: var(--ok); }
  .stamina-high { background: rgba(59,130,246,0.15); color: var(--accent); }
  .stamina-mid  { background: rgba(107,125,149,0.1); color: var(--text-dim); }
  .stamina-low  { background: rgba(245,158,11,0.15); color: var(--warn); }
  .stamina-burn { background: rgba(239,68,68,0.15); color: var(--err); }

  /* ── 位置取り分布（ビン別・表形式） ── */
  .pos-dist-section {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px 18px; margin-bottom: 20px;
  }
  .pos-dist-section h3 { font-size: 13px; font-weight: 600; color: var(--purple); margin-bottom: 12px; }
  .pos-dist-table-wrap { overflow-x: auto; margin-bottom: 14px; }
  .pos-dist-table {
    width: 100%; border-collapse: collapse; font-size: 12px;
    table-layout: fixed;
  }
  .pos-dist-table th,
  .pos-dist-table td {
    padding: 8px 10px; border-bottom: 1px solid var(--border);
    vertical-align: middle; text-align: left;
  }
  .pos-dist-table th {
    font-size: 10px; font-weight: 600; color: var(--text-dim);
    background: rgba(0, 0, 0, 0.12);
  }
  .pos-dist-table th:nth-child(1),
  .pos-dist-table td:nth-child(1) { width: 34%; }
  .pos-dist-table th:nth-child(2),
  .pos-dist-table td:nth-child(2) { width: 18%; white-space: nowrap; }
  .pos-dist-table .pos-dist-bin-label { color: #fff; font-weight: 600; line-height: 1.35; }
  .pos-dist-table .pos-dist-count {
    font-weight: 700; font-variant-numeric: tabular-nums;
  }
  .bin-horse-nums {
    display: flex; flex-wrap: wrap; gap: 3px; align-items: center;
  }
  .bin-hn {
    flex: 0 0 auto;
    width: 20px; height: 20px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700;
  }
  .pos-dist-stats {
    font-size: 11px; color: var(--text-dim); line-height: 1.75;
    padding: 12px 14px; background: rgba(255, 255, 255, 0.02);
    border-radius: 8px; border: 1px solid rgba(36, 48, 73, 0.5);
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 6px 16px;
  }
  .pos-dist-stat-item { display: flex; flex-direction: column; gap: 2px; }
  .pos-dist-stat-label { font-size: 10px; color: var(--text-dim); }
  .pos-dist-stat-value { font-size: 12px; color: #fff; font-weight: 600; }
  .pos-dist-stat-sub { font-size: 10px; color: var(--text-dim); opacity: 0.9; }
  .hana-badge {
    display: inline-block; margin-left: 4px; padding: 1px 5px; border-radius: 3px;
    font-size: 9px; font-weight: 800; color: #fff;
    background: rgba(239, 68, 68, 0.35); border: 1px solid rgba(239, 68, 68, 0.55);
    vertical-align: middle;
  }
  .pace-factor-scale { margin-top: 6px; }
  .pace-factor-track {
    position: relative; height: 6px; border-radius: 3px;
    background: linear-gradient(90deg, rgba(59,130,246,0.35), rgba(239,68,68,0.45));
    margin-bottom: 4px;
  }
  .pace-factor-marker {
    position: absolute; top: 50%; width: 10px; height: 10px;
    margin-left: -5px; margin-top: -5px; border-radius: 50%;
    background: #fff; border: 2px solid var(--warn);
    box-shadow: 0 0 0 2px rgba(0,0,0,0.25);
  }
  .pace-factor-range {
    display: flex; justify-content: space-between; font-size: 9px; color: var(--text-dim);
  }
  .pos-dist-stats-note {
    grid-column: 1 / -1;
    font-size: 10px; opacity: 0.9; margin-top: 4px; line-height: 1.65;
  }

  /* ── T1F・コース比較テーブル ── */
  .analysis-section {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px 18px; margin-bottom: 20px; overflow-x: auto;
  }
  .analysis-section h3 { font-size: 13px; font-weight: 600; color: var(--key); margin-bottom: 12px; }
  .analysis-table {
    width: 100%; border-collapse: collapse; font-size: 11px;
  }
  .t1f-front-cell { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .t1f-front-cell .t1f-bar-bg { width: 100%; max-width: 72px; }

  .analysis-table .th-sub {
    display: block; font-size: 8px; font-weight: 500; color: var(--text-dim);
    margin-top: 2px; line-height: 1.2;
  }
  .form-dual { display: flex; flex-direction: column; gap: 3px; line-height: 1.35; }
  .form-dual-row { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; justify-content: center; }
  .form-dual-tag {
    font-size: 8px; font-weight: 700; color: var(--text-dim);
    padding: 1px 4px; border-radius: 3px; background: rgba(255,255,255,0.06);
    flex: 0 0 auto;
  }
  .form-dual-main {
    display: flex; align-items: center; justify-content: center; gap: 4px;
    margin-bottom: 2px; flex-wrap: wrap;
  }
  .form-style-note { font-size: 8px; color: var(--text-dim); }
  .analysis-table th {
    background: var(--surface2); padding: 8px 10px; text-align: left;
    font-weight: 600; color: var(--text-dim); font-size: 10px;
    border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  .analysis-table td {
    padding: 8px 10px; border-bottom: 1px solid rgba(36,48,73,0.4); white-space: nowrap;
  }
  .analysis-table tr:hover td { background: rgba(59,130,246,0.04); }
  .t1f-bar-cell { width: 80px; }
  .t1f-bar-bg { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .t1f-bar-fill { height: 100%; border-radius: 3px; }
  .dist-ext { color: var(--err); font-weight: 600; }
  .dist-red { color: var(--ok); font-weight: 600; }
  .dist-same { color: var(--text-dim); }
  .gate-up { color: var(--warn); }
  .gate-down { color: var(--accent); }
  .gate-same { color: var(--text-dim); }
  .surface-match { color: var(--ok); }
  .surface-diff { color: var(--warn); }

  /* ── 追走難度指数拡張カード ── */
  .td-stamina-row {
    display: flex; align-items: center; gap: 8px; padding: 4px 0;
    border-top: 1px solid rgba(36,48,73,0.4); margin-top: 6px;
  }
  .td-stamina-label { font-size: 10px; color: var(--text-dim); min-width: 70px; }
  .td-stamina-value { font-size: 13px; font-weight: 700; min-width: 40px; }
  .stamina-load-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
  .load-item { display: flex; align-items: center; gap: 3px; font-size: 10px; }
  .load-dot { width: 6px; height: 6px; border-radius: 50%; }

  /* ── ペース分析セクション ── */
  .pace-section {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px 18px; margin-bottom: 20px;
  }
  .pace-section h3 { font-size: 13px; font-weight: 600; color: var(--purple); margin-bottom: 10px; }
  .pace-bars { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .pace-item { display: flex; align-items: center; gap: 6px; }
  .pace-dot { width: 10px; height: 10px; border-radius: 50%; }
  .pace-label { font-size: 11px; color: var(--text-dim); }
  .pace-count { font-size: 13px; font-weight: 700; }

  /* ── ペース予想 ── */
  .pace-prediction {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 18px; margin-bottom: 20px;
  }
  .pace-prediction h3 { font-size: 13px; font-weight: 600; margin-bottom: 14px; color: var(--purple); }
  .pace-type-badge {
    display: inline-block; padding: 6px 16px; border-radius: 6px;
    font-size: 14px; font-weight: 700; margin-right: 10px;
  }
  .pace-type-high { background: var(--err); color: #fff; }
  .pace-type-mid { background: var(--accent); color: #fff; }
  .pace-type-slow { background: var(--ok); color: #fff; }
  .pace-meter {
    height: 12px; background: linear-gradient(90deg, var(--ok) 0%, var(--accent) 50%, var(--err) 100%);
    border-radius: 6px; position: relative; margin: 14px 0;
  }
  .pace-meter-pointer {
    position: absolute; top: -4px; width: 4px; height: 20px;
    background: #fff; border: 2px solid var(--border); border-radius: 2px;
  }
  .pace-pattern { font-size: 12px; color: var(--text-dim); margin-top: 8px; }

  /* ── ペース解説テキスト ── */
  .pace-comment-block {
    margin-top: 14px;
    border-top: 1px solid var(--border);
    padding-top: 12px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .pace-comment-line {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 12px; line-height: 1.65; color: var(--text);
  }
  .pace-comment-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
  .pace-comment-text { flex: 1; }
  .pace-verdict {
    margin-top: 4px; padding: 10px 14px; border-radius: 7px;
    font-size: 12px; font-weight: 600; line-height: 1.6;
    border-left: 3px solid;
  }
  .pace-verdict-high  { background: rgba(239,68,68,0.08);  border-color: var(--err);    color: #fca5a5; }
  .pace-verdict-mid   { background: rgba(59,130,246,0.08);  border-color: var(--accent); color: var(--text); }
  .pace-verdict-slow  { background: rgba(34,197,94,0.08);   border-color: var(--ok);    color: #86efac; }
  .pace-tip {
    font-size: 11px; color: var(--text-dim); padding: 6px 10px;
    background: rgba(255,255,255,0.03); border-radius: 5px;
    line-height: 1.6;
  }

  /* ── 位置取り予測 ── */
  .position-flow {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 18px; margin-bottom: 20px;
  }
  .position-flow h3 { font-size: 13px; font-weight: 600; margin-bottom: 14px; color: var(--key); }
  .position-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .position-table th { background: rgba(59,130,246,0.08); padding: 8px 6px; text-align: left;
    font-size: 10px; font-weight: 600; color: var(--text-dim); border-bottom: 1px solid var(--border); }
  .position-table td { padding: 8px 6px; border-bottom: 1px solid rgba(46,51,72,0.3); }
  .position-table tr:hover { background: rgba(59,130,246,0.04); }
  .pos-num { display: inline-block; min-width: 20px; text-align: center;
    padding: 2px 6px; border-radius: 3px; font-weight: 600; }
  .pos-arrow { font-size: 10px; color: var(--text-dim); margin: 0 2px; }
  .flow-badge {
    display: inline-block; padding: 2px 6px; border-radius: 3px;
    font-size: 10px; font-weight: 600;
  }
  .flow-forward { background: var(--ok); color: #000; }
  .flow-maintain { background: var(--accent); color: #fff; }
  .flow-backward { background: var(--warn); color: #000; }
  .stamina-warn { color: var(--err); font-size: 10px; }
  .confidence-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .confidence-fill { height: 100%; background: var(--accent); }

  /* ── ラップタイム表示 ── */
  .lap-times {
    display: grid;
    grid-template-columns: repeat(3, minmax(88px, 1fr));
    gap: 12px 16px;
    margin-top: 0;
    padding: 10px 14px;
    background: rgba(59, 130, 246, 0.05);
    border-radius: 8px;
    flex: 1 1 280px;
    min-width: 260px;
    align-self: stretch;
  }
  .lap-times.cols-2 { grid-template-columns: repeat(2, minmax(88px, 1fr)); }
  .lap-time-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    text-align: center;
    gap: 6px;
  }
  .lap-label {
    font-size: 11px;
    font-weight: 500;
    line-height: 1.35;
    color: var(--text-dim);
    min-height: 2.7em;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    width: 100%;
  }
  .lap-value {
    display: inline-flex;
    align-items: baseline;
    justify-content: center;
    gap: 2px;
    font-size: 18px;
    font-weight: 700;
    line-height: 1;
    color: var(--accent);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .lap-unit {
    font-size: 11px;
    font-weight: 600;
    line-height: 1;
    color: var(--text-dim);
    font-family: inherit;
  }

  /* ── 序盤ポジション（1-3F）コンパクト ── */
  .early-pos-map {
    width: 100%;
    max-width: 100%;
    box-sizing: border-box;
  }
  .early-pos-hint {
    font-size: 11px;
    color: var(--text-dim);
    margin: 0 0 10px;
    line-height: 1.5;
  }
  .early-pos-axis {
    display: grid;
    grid-template-columns: 48px 1fr 48px;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    font-weight: 700;
    color: var(--text-dim);
    margin-bottom: 6px;
    padding: 0 4px;
  }
  .early-pos-axis .axis-front { color: var(--err); text-align: left; }
  .early-pos-axis .axis-title {
    text-align: center;
    color: var(--key);
    font-size: 11px;
    letter-spacing: 0.02em;
  }
  .early-pos-axis .axis-back { color: var(--accent); text-align: right; }
  .early-pos-ladder {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: linear-gradient(
      to bottom,
      rgba(239, 68, 68, 0.07) 0%,
      rgba(59, 130, 246, 0.04) 100%
    );
    border-left: 3px solid rgba(239, 68, 68, 0.55);
  }
  .early-pos-row {
    display: grid;
    grid-template-columns: 48px 1fr;
    gap: 8px 10px;
    align-items: center;
    padding: 5px 10px 5px 8px;
    border-bottom: 1px solid rgba(36, 48, 73, 0.4);
    min-height: 34px;
  }
  .early-pos-row:last-child { border-bottom: none; }
  .early-pos-row:hover { background: rgba(59, 130, 246, 0.05); }
  .early-pos-band {
    font-size: 11px;
    font-weight: 800;
    color: #fff;
    text-align: center;
    background: rgba(59, 130, 246, 0.18);
    border: 1px solid rgba(59, 130, 246, 0.35);
    border-radius: 5px;
    padding: 4px 2px;
    line-height: 1.2;
    font-variant-numeric: tabular-nums;
  }
  .early-pos-band .band-unit {
    display: block;
    font-size: 8px;
    font-weight: 600;
    color: var(--text-dim);
    margin-top: 1px;
  }
  .early-pos-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    align-items: center;
    min-width: 0;
  }
  .pos-pill {
    flex-shrink: 0;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1.5px solid rgba(255, 255, 255, 0.35);
    font-size: 10px;
    font-weight: 800;
    color: #fff;
    cursor: pointer;
    padding: 0;
    line-height: 1;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.35);
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .pos-pill:hover {
    transform: scale(1.12);
    z-index: 2;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.45);
  }
  .pos-pill.waku-1 { background: #f5f5f5; color: #111; }
  .pos-pill.waku-2 { background: #111; color: #fff; }
  .pos-pill.waku-3 { background: #e53935; color: #fff; }
  .pos-pill.waku-4 { background: #1e88e5; color: #fff; }
  .pos-pill.waku-5 { background: #fdd835; color: #111; }
  .pos-pill.waku-6 { background: #43a047; color: #fff; }
  .pos-pill.waku-7 { background: #f57c00; color: #fff; }
  .pos-pill.waku-8 { background: #ec407a; color: #fff; }
  .position-map-details .early-pos-map {
    margin: 0 0 8px;
    padding: 0;
  }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .content { padding: 16px; }
    .controls { flex-direction: column; align-items: stretch; gap: 8px; }
    .controls > * { width: 100%; }
    .controls button { width: 100%; }
    .cards-grid { grid-template-columns: 1fr; }
    .gate-ease-table { font-size: 11px; }
    .gate-ease-table th.col-name { width: 22%; }
    .gate-ease-head { flex-direction: column; align-items: flex-start; }
    .position-table { font-size: 10px; }
    .position-table th, .position-table td { padding: 6px 4px; }
  }

  @media (max-width: 480px) {
    .content { padding: 12px; }
    .page-header { padding: 12px 16px; }
    .page-header h1 { font-size: 14px; }
    .controls { padding: 10px 16px; }
    .race-meta { padding: 12px 14px; }
    .race-meta .race-name { font-size: 14px; }
    .gate-ease-panel { padding: 12px 14px; }
    .ease-bar-cell { min-width: 80px; }
    .td-card-header { padding: 10px 12px; }
    .td-card-body { padding: 12px 14px; }
    .pace-prediction { padding: 14px; }
    .pace-type-badge { font-size: 12px; padding: 4px 12px; }
    .lap-times {
      grid-template-columns: 1fr;
      min-width: 0;
      gap: 8px;
    }
    .lap-time-item {
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      gap: 12px;
    }
    .lap-label {
      min-height: auto;
      justify-content: flex-start;
      text-align: left;
      flex: 1;
    }
    .lap-value { font-size: 16px; }
    .lap-unit { font-size: 10px; }
    .pos-dist-stats { grid-template-columns: 1fr; }
    .position-flow { padding: 14px; }
    .position-table { font-size: 9px; }
    .position-table th, .position-table td { padding: 4px 2px; }
    .pos-num { min-width: 18px; padding: 1px 4px; font-size: 9px; }
    .flow-badge { font-size: 9px; padding: 1px 4px; }
    .early-pos-row { grid-template-columns: 40px 1fr; padding: 5px 8px; }
    .early-pos-band { font-size: 10px; }
    .pos-pill { width: 24px; height: 24px; font-size: 9px; }
  }

  /* ── 馬名クリック → 近10走 ── */
  .horse-name-link {
    background: none; border: none; padding: 0; margin: 0;
    font: inherit; font-weight: inherit; color: var(--key);
    cursor: pointer; text-align: inherit;
    text-decoration: underline; text-decoration-color: rgba(125, 211, 252, 0.45);
    text-underline-offset: 2px;
  }
  .horse-name-link:hover { color: #fff; text-decoration-color: var(--key); }
  .gate-name .horse-name-link { font-size: 9.5px; font-weight: 400; }

  .horse-history-modal {
    position: fixed; inset: 0; z-index: 9000;
    display: none; align-items: center; justify-content: center;
    padding: 24px 16px;
  }
  .horse-history-modal.is-open { display: flex; }
  .horse-history-backdrop {
    position: absolute; inset: 0;
    background: rgba(0, 0, 0, 0.62);
  }
  .horse-history-panel {
    position: relative; z-index: 1;
    width: min(920px, 100%); max-height: min(85vh, 720px);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .horse-history-header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .horse-history-title { font-size: 15px; font-weight: 700; color: #fff; }
  .horse-history-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .horse-history-close {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 6px 12px;
    font-size: 12px; cursor: pointer;
  }
  .horse-history-close:hover { border-color: var(--accent); color: #fff; }
  .horse-history-body {
    padding: 14px 18px 18px; overflow: auto; flex: 1;
  }
  .horse-history-table {
    width: 100%; border-collapse: collapse; font-size: 11px;
  }
  .horse-history-table th {
    background: var(--surface2); padding: 8px 10px; text-align: left;
    font-weight: 600; color: var(--text-dim); font-size: 10px;
    border-bottom: 1px solid var(--border); white-space: nowrap;
    position: sticky; top: 0; z-index: 1;
  }
  .horse-history-table td {
    padding: 8px 10px; border-bottom: 1px solid rgba(36, 48, 73, 0.45);
    white-space: nowrap;
  }
  .horse-history-table tr:hover td { background: rgba(59, 130, 246, 0.06); }
  .horse-history-table .tc { text-align: center; }
  .horse-history-table .tr { text-align: right; }
  .hist-rank-1 { color: var(--ok); font-weight: 800; }
  .hist-rank-2, .hist-rank-3 { color: var(--accent); font-weight: 700; }
}
</style>
</head>
<body>
{% include 'partials/_nav.html' %}

<div class="page-header">
  <div>
    <h1><img src="/data/image/icon.jpg" alt="" class="page-brand-icon">追走難度分析</h1>
    <span class="subtitle">前走T1F・位置取り分布・コース比較・ペース予測から追走難度（脚がたまる度）を算出</span>
  </div>
</div>

<div class="controls">
  <label>開催日:</label>
  <select id="dateSelect" onchange="onDateChange()"><option value="">読み込み中...</option></select>
  <label>会場:</label>
  <select id="venueSelect" onchange="onVenueChange()"><option value="">-</option></select>

  <span id="statusMsg"></span>
</div>

<div class="content" id="mainContent">
  <div class="empty" id="placeholder">レースを選択して「分析実行」をクリックしてください</div>
</div>

        <div class="horse-history-sub" id="horseHistorySub"></div>
      </div>
      <button type="button" class="horse-history-close" onclick="closeHorseHistory()">閉じる</button>
    </div>
    <div id="horseHistoryBody" class="horse-history-body">
      <div class="empty">馬名をクリックすると戦績を表示します</div>
    </div>
  </div>
</div>

<script>
// Version: 2026-03-20-v6 - トラック高さ拡大(480px)、縦間隔拡大(3-97%)、横並び一列方式
let _allDates = [];
let _racesForDate = [];
let _selectedRaceId = '';
let _dateRaceMap = {}; // 日付ごとのレース情報を保存
/** race_id -> 結果ページ遷移用メタ（race-list / 分析レスポンス） */
let _raceResultMeta = {};
/** 分析中表示中レース（戦績モーダルの切り出し基準） */
let _currentAnalysisContext = { race_id: '', race_date: '' };
const _horseHistoryCache = {};
/** 直近2週間の過去開催日（picker_past_days 由来） */
let _recentPastDatesForMerge = [];
/** バックグラウンドで追加した過去開催日 */
let _olderPastDates = [];
let _backgroundDatesLoading = false;
const PICKER_RECENT_DAYS = 14;
let _analysisLoadTimer = null;
let _analysisLoadStartedAt = 0;

const _ANALYSIS_LOAD_STEPS = [
  { id: 'prepare', label: 'レース情報の確認' },
  { id: 'fetch', label: '出馬表・戦績の取得' },
  { id: 'compute', label: '追走難度・ペース・位置取りの計算' },
  { id: 'render', label: '結果の表示' },
];

function getSelectedRaceLabel() {
  const rsel = document.getElementById('raceSelect');
  if (!rsel || !rsel.value) return '';
  const opt = rsel.options[rsel.selectedIndex];
  return opt ? opt.textContent.trim() : '';
}

function buildLoadingStepsHtml(activeId, doneIds) {
  const doneSet = new Set(doneIds || []);
  return _ANALYSIS_LOAD_STEPS.map((step, i) => {
    let cls = 'td-loading-step';
    if (step.id === activeId) cls += ' is-active';
    else if (doneSet.has(step.id)) cls += ' is-done';
    const mark = doneSet.has(step.id) ? '✓' : String(i + 1);
    return `<div class="${cls}" data-step="${step.id}">
      <span class="td-loading-step-dot">${mark}</span>
      <span>${escHtml(step.label)}</span>
    </div>`;
  }).join('');
}

function showPageInitLoading() {
  const main = document.getElementById('mainContent');
  if (!main) return;
  main.innerHTML = `
    <div class="td-loading" id="pageInitLoading">
      <div class="td-loading-card">
        <div class="td-loading-top">
          <div class="td-loading-spinner"></div>
          <div>
            <div class="td-loading-title">ページを準備しています</div>
            <div class="td-loading-detail">直近2週間の開催日を読み込んでいます</div>
          </div>
        </div>
        <div class="td-loading-skeleton">
          <div class="td-skel-block w55"></div>
          <div class="td-skel-block w40"></div>
        </div>
      </div>
    </div>`;
}

function hidePageInitLoading() {
  const el = document.getElementById('pageInitLoading');
  if (!el) return;
  const main = document.getElementById('mainContent');
  if (main && main.querySelector('#pageInitLoading')) {
    main.innerHTML = '<div class="empty" id="placeholder">レースを選択して「分析実行」をクリックしてください</div>';
  }
}

function showAnalysisLoading(opts) {
  const o = opts || {};
  const raceLabel = o.raceLabel || getSelectedRaceLabel() || '選択中のレース';
  const phase = o.phase || 'prepare';
  const detail = o.detail || '処理を開始しています…';
  const doneIds = o.doneIds || [];

  const main = document.getElementById('mainContent');
  if (!main) return;

  _analysisLoadStartedAt = Date.now();
  if (_analysisLoadTimer) clearInterval(_analysisLoadTimer);
  _analysisLoadTimer = setInterval(updateAnalysisLoadingElapsed, 1000);

  document.querySelector('.controls')?.classList.add('is-busy');

  main.innerHTML = `
    <div class="td-loading" id="analysisLoading">
      <div class="td-loading-card">
        <div class="td-loading-top">
          <div class="td-loading-spinner" aria-hidden="true"></div>
          <div style="flex:1;min-width:0">
            <div class="td-loading-title">分析を実行しています</div>
            <div class="td-loading-race">${escHtml(raceLabel)}</div>
            <div class="td-loading-detail" id="loadingDetail">${escHtml(detail)}</div>
            <div class="td-loading-meta">
              <span>経過 <strong id="loadingElapsed">0</strong> 秒</span>
              <span id="loadingEta">初回は10〜30秒ほどかかることがあります</span>
            </div>
            <div class="td-loading-hint" id="loadingHint">ML推論と全頭の位置取り計算を行っています。完了までこの画面のままお待ちください。</div>
          </div>
        </div>
        <div class="td-loading-steps" id="loadingSteps">
          ${buildLoadingStepsHtml(phase, doneIds)}
        </div>
        <div class="td-loading-skeleton">
          <div class="td-skel-block w70"></div>
          <div class="td-skel-block w100"></div>
          <div class="td-skel-grid">
            <div class="td-skel-card"></div>
            <div class="td-skel-card"></div>
            <div class="td-skel-card"></div>
            <div class="td-skel-card"></div>
          </div>
        </div>
      </div>
    </div>`;

  requestAnimationFrame(() => {
    const hint = document.getElementById('loadingHint');
    if (hint) setTimeout(() => hint.classList.add('is-visible'), 2800);
  });
}

function updateAnalysisLoadingElapsed() {
  const el = document.getElementById('loadingElapsed');
  if (!el || !_analysisLoadStartedAt) return;
  const sec = Math.floor((Date.now() - _analysisLoadStartedAt) / 1000);
  el.textContent = String(sec);
  const eta = document.getElementById('loadingEta');
  if (eta && sec >= 15) {
    eta.textContent = 'まだお待ちください。データ量が多いレースはさらに時間がかかります';
  } else if (eta && sec >= 8) {
    eta.textContent = 'もう少しで完了する見込みです';
  }
}

function setAnalysisLoadingPhase(phase, detail, doneIds) {
  const detailEl = document.getElementById('loadingDetail');
  const stepsEl = document.getElementById('loadingSteps');
  if (detailEl && detail) detailEl.textContent = detail;
  if (stepsEl) stepsEl.innerHTML = buildLoadingStepsHtml(phase, doneIds || []);
  const msg = document.getElementById('statusMsg');
  if (msg && detail) msg.textContent = detail;
}

function stopAnalysisLoadingTimer() {
  if (_analysisLoadTimer) {
    clearInterval(_analysisLoadTimer);
    _analysisLoadTimer = null;
  }
  document.querySelector('.controls')?.classList.remove('is-busy');
}

function showAnalysisLoadingError(message) {
  stopAnalysisLoadingTimer();
  const main = document.getElementById('mainContent');
  if (!main) return;
  const elapsed = _analysisLoadStartedAt
    ? Math.floor((Date.now() - _analysisLoadStartedAt) / 1000)
    : 0;
  main.innerHTML = `
    <div class="td-loading">
      <div class="td-loading-card">
        <div class="td-loading-top">
          <div class="td-loading-title" style="color:var(--err)">分析を完了できませんでした</div>
          <div class="td-loading-detail">${escHtml(message)}</div>
          ${elapsed > 0 ? `<div class="td-loading-meta">経過 ${elapsed} 秒で中断</div>` : ''}
        </div>
        <button type="button" class="td-loading-retry" onclick="analyze()">もう一度実行</button>
      </div>
    </div>`;
}

function formatPastDateLabel(d) {
  return `${d.slice(0, 4)}/${d.slice(4, 6)}/${d.slice(6, 8)}`;
}

function setDateLoadMsg(text, busy) {
  const el = document.getElementById('dateLoadMsg');
  if (!el) return;
  el.textContent = text || '';
  el.classList.toggle('is-busy', !!busy);
}

function applyUpcomingRaces(futureData) {
  const futureRaces = (futureData.races || []).filter((r) => r.race_id);
  const futureDates = [...new Set(futureRaces.map((r) => r.date))].sort();
  futureDates.forEach((date) => {
    _dateRaceMap[date] = {
      type: 'future',
      races: futureRaces.filter((r) => r.date === date),
    };
  });
  return { futureRaces, futureDates };
}

function fillDateSelect(sel, opts) {
  const {
    futureDates = [],
    recentPast = [],
    olderPast = [],
    selected = '',
  } = opts || {};

  _allDates = [...futureDates, ...recentPast, ...olderPast];

  let html = '<option value="">日付を選択</option>';

  if (futureDates.length) {
    html += '<optgroup label="今後の開催">';
    futureDates.forEach((d) => {
      const y = d.slice(0, 4);
      const m = d.slice(4, 6);
      const day = d.slice(6, 8);
      const raceCount = (_dateRaceMap[d]?.races || []).length;
      const offset = _dateRaceMap[d]?.races[0]?.day_offset || 0;
      let label = '';
      if (offset === 1) label = '🔴 明日';
      else if (offset === 2) label = '🟡 明後日';
      else label = `🟢 ${y}/${m}/${day}`;
      html += `<option value="${d}">${label} (${raceCount}R)</option>`;
    });
    html += '</optgroup>';
  }

  if (recentPast.length) {
    html += '<optgroup label="直近2週間（過去）">';
    recentPast.forEach((d) => {
      html += `<option value="${d}">${formatPastDateLabel(d)}</option>`;
    });
    html += '</optgroup>';
  }

  if (olderPast.length) {
    html += '<optgroup label="過去（追加読込）">';
    olderPast.forEach((d) => {
      html += `<option value="${d}">${formatPastDateLabel(d)}</option>`;
    });
    html += '</optgroup>';
  }

  sel.innerHTML = html;

  if (selected && _allDates.includes(selected)) {
    sel.value = selected;
  } else if (futureDates.length) {
    sel.value = futureDates[0];
  } else if (recentPast.length) {
    sel.value = recentPast[0];
  } else if (olderPast.length) {
    sel.value = olderPast[0];
  } else {
    sel.value = '';
  }
}

async function loadPastDatesInBackground() {
  if (_backgroundDatesLoading) return;
  _backgroundDatesLoading = true;
  const sel = document.getElementById('dateSelect');
  if (!sel) {
    _backgroundDatesLoading = false;
    return;
  }

  const prev = sel.value;
  setDateLoadMsg('過去の開催日を読み込み中…', true);

  try {
    const resp = await fetch('/api/scrape-dates', { cache: 'no-store' });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    const allPast = (data.dates || []).sort().reverse();

    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const recentCutoff = new Date(today.getTime() - PICKER_RECENT_DAYS * 24 * 60 * 60 * 1000);

    const known = new Set([
      ..._recentPastDatesForMerge,
      ..._olderPastDates,
      ...Object.keys(_dateRaceMap).filter((d) => _dateRaceMap[d]?.type === 'future'),
    ]);

    const supplementRecent = [];
    const olderDates = [];
    allPast.forEach((d) => {
      if (known.has(d)) return;
      const dateStr = `${d.slice(0, 4)}-${d.slice(4, 6)}-${d.slice(6, 8)}`;
      const dateObj = new Date(dateStr);
      dateObj.setHours(0, 0, 0, 0);
      if (dateObj >= recentCutoff && dateObj < today) {
        supplementRecent.push(d);
      } else if (dateObj < recentCutoff) {
        olderDates.push(d);
      }
    });

    if (!supplementRecent.length && !olderDates.length) {
      setDateLoadMsg('開催日一覧は最新です', false);
      return;
    }

    if (supplementRecent.length) {
      _recentPastDatesForMerge = [...new Set([..._recentPastDatesForMerge, ...supplementRecent])]
        .sort()
        .reverse();
    }
    if (olderDates.length) {
      _olderPastDates = [...new Set([..._olderPastDates, ...olderDates])].sort().reverse();
    }

    const futureDates = Object.keys(_dateRaceMap)
      .filter((d) => _dateRaceMap[d]?.type === 'future')
      .sort();

    fillDateSelect(sel, {
      futureDates,
      recentPast: _recentPastDatesForMerge,
      olderPast: _olderPastDates,
      selected: prev,
    });

    const parts = [];
    if (supplementRecent.length) parts.push(`直近+${supplementRecent.length}`);
    if (olderDates.length) parts.push(`過去+${olderDates.length}`);
    setDateLoadMsg(`開催日を追加（${parts.join('、')}日）`, false);
  } catch (e) {
    console.warn('[loadPastDatesInBackground]', e);
    setDateLoadMsg('過去分の追加読込に失敗（直近2週間は利用可能）', false);
  } finally {
    _backgroundDatesLoading = false;
  }
}

async function init() {
  showPageInitLoading();
  const dateSel = document.getElementById('dateSelect');
  if (dateSel) dateSel.classList.add('is-loading');
  try {
    await loadInitialPickerDates();
  } catch (e) {
    console.error('init error:', e);
    const main = document.getElementById('mainContent');
    if (main) {
      main.innerHTML = '<div class="empty">開催日の読み込みに失敗しました。ページを再読み込みしてください。</div>';
    }
  } finally {
    if (dateSel) dateSel.classList.remove('is-loading');
    hidePageInitLoading();
  }
  loadUpcomingRacesInBackground();
  loadPastDatesInBackground();
  primeSelectedDateRaces();
}

/** 初回表示: 直近2週間の過去日だけ（ローカル存在確認のみ・高速） */
async function loadInitialPickerDates() {
  const sel = document.getElementById('dateSelect');
  _dateRaceMap = {};
  _olderPastDates = [];
  _recentPastDatesForMerge = [];
  setDateLoadMsg('', false);

  const resp = await fetch(`/api/scrape-dates?picker_past_days=${PICKER_RECENT_DAYS}`, { cache: 'no-store' });
  if (!resp.ok) throw new Error(`picker HTTP ${resp.status}`);
  const pastData = await resp.json();
  const recentDates = (pastData.dates || []).sort().reverse();
  _recentPastDatesForMerge = recentDates;

  fillDateSelect(sel, {
    futureDates: [],
    recentPast: recentDates,
    olderPast: [],
    selected: '',
  });
}

/** 今後の開催（ローカル race_lists のみ・netkeiba は叩かない） */
async function loadUpcomingRacesInBackground() {
  const sel = document.getElementById('dateSelect');
  if (!sel) return;
  const prev = sel.value;
  try {
    const resp = await fetch(`/api/upcoming-races?local_only=1&_=${Date.now()}`, { cache: 'no-store' });
    if (!resp.ok) return;
    const futureData = await resp.json();
    const { futureDates } = applyUpcomingRaces(futureData);
    if (!futureDates.length) return;

    fillDateSelect(sel, {
      futureDates,
      recentPast: _recentPastDatesForMerge,
      olderPast: _olderPastDates,
      selected: prev,
    });
    if (!prev && sel.value) {
      onDateChange();
    }
  } catch (e) {
    console.warn('[loadUpcomingRacesInBackground]', e);
  }
}

/** 日付確定後のレース一覧（結果有無チェックは後回しで体感を優先） */
function primeSelectedDateRaces() {
  const sel = document.getElementById('dateSelect');
  if (!sel?.value) return;
  onDateChange({ skipResultStatus: true });
}

async function onDateChange(opts) {
  const date = document.getElementById('dateSelect').value;
  if (!date) return;
  const skipResultStatus = !!(opts && opts.skipResultStatus);

  try {
    // 未来のレースかどうかをチェック
    if (_dateRaceMap[date] && _dateRaceMap[date].type === 'future') {
      // 未来のレース（すでにロード済み）
      _racesForDate = _dateRaceMap[date].races;
      const venues = [...new Set(_racesForDate.map(r => r.venue))];
      const vsel = document.getElementById('venueSelect');
      vsel.innerHTML = '<option value="">全会場</option>';
      for (const v of venues) {
        vsel.innerHTML += `<option value="${v}">${v}</option>`;
      }
      populateRaces();
    } else {
      // 過去のレース（APIから取得）
      const qs = skipResultStatus ? '?with_result_status=0' : '';
      const resp = await fetch(`/api/race-list/${date}${qs}`);
      const data = await resp.json();
      _racesForDate = data.races || [];
      applyRaceResultMeta(_racesForDate);
      const venues = data.venues || [];
      const vsel = document.getElementById('venueSelect');
      vsel.innerHTML = '<option value="">全会場</option>';
      for (const v of venues) {
        vsel.innerHTML += `<option value="${v}">${v}</option>`;
      }
      populateRaces();
    }
  } catch (e) {
    console.error('date change error:', e);
  }
}

function onVenueChange() { populateRaces(); }

function applyRaceResultMeta(races) {
  if (!Array.isArray(races)) return;
  for (const r of races) {
    if (!r || !r.race_id) continue;
    _raceResultMeta[r.race_id] = {
      viewable: !!(r.result_viewable || r.has_race_result || r.has_result_flash),
      kind: r.result_kind || (r.has_race_result ? 'confirmed' : (r.has_result_flash ? 'flash' : null)),
      url: r.result_view_url || (r.result_viewable ? `/race/${r.race_id}` : null),
    };
  }
}

function resultLinkHtml(raceId, meta) {
  const m = meta || _raceResultMeta[raceId];
  if (!m || !m.viewable || !m.url) return '';
  const isFlash = m.kind === 'flash';
  const label = isFlash ? '速報結果を見る' : 'レース結果を見る';
  const cls = isFlash ? 'race-result-link flash' : 'race-result-link';
  return `<a class="${cls}" href="${m.url}" target="_blank" rel="noopener noreferrer">${label} →</a>`;
}

function updateControlsResultLink() {
  const el = document.getElementById('controlsResultLink');
  if (!el) return;
  el.innerHTML = _selectedRaceId ? resultLinkHtml(_selectedRaceId) : '';
}

function populateRaces() {
  const venue = document.getElementById('venueSelect').value;
  const rsel = document.getElementById('raceSelect');
  const filtered = venue ? _racesForDate.filter(r => r.venue === venue) : _racesForDate;
  applyRaceResultMeta(filtered);
  rsel.innerHTML = '<option value="">レースを選択</option>';
  for (const r of filtered) {
    const meta = _raceResultMeta[r.race_id];
    const badge = meta && meta.viewable ? (meta.kind === 'flash' ? ' 🟡' : ' 🏁') : '';
    const label = `${r.round}R ${r.race_name || ''} (${r.venue})${badge}`;
    rsel.innerHTML += `<option value="${r.race_id}">${label}</option>`;
  }
  document.getElementById('analyzeBtn').disabled = true;
  _selectedRaceId = '';
  updateControlsResultLink();
}

async function refreshResultMetaForRace(raceId) {
  if (!raceId) return;
  try {
    const resp = await fetch(`/api/race/${raceId}/result-status`);
    if (!resp.ok) return;
    const d = await resp.json();
    if (d.viewable) {
      _raceResultMeta[raceId] = {
        viewable: true,
        kind: d.kind || (d.has_confirmed ? 'confirmed' : 'flash'),
        url: d.result_view_url || `/race/${raceId}`,
      };
    } else {
      _raceResultMeta[raceId] = { viewable: false, kind: null, url: null };
    }
    updateControlsResultLink();
  } catch (e) {
    console.warn('[result-status]', e);
  }
}

function onRaceChange() {
  _selectedRaceId = document.getElementById('raceSelect').value;
  document.getElementById('analyzeBtn').disabled = !_selectedRaceId;
  updateControlsResultLink();
  if (_selectedRaceId) refreshResultMetaForRace(_selectedRaceId);
}

async function analyze() {
  if (!_selectedRaceId) return;
  const btn = document.getElementById('analyzeBtn');
  const msg = document.getElementById('statusMsg');
  btn.disabled = true;

  const raceLabel = getSelectedRaceLabel();
  showAnalysisLoading({
    phase: 'prepare',
    detail: 'レース情報を確認しています…',
    raceLabel,
    doneIds: [],
  });

  const done = [];

  try {
    const selectedDate = document.getElementById('dateSelect').value;
    const isFutureRace = _dateRaceMap[selectedDate] && _dateRaceMap[selectedDate].type === 'future';

    done.push('prepare');
    if (isFutureRace) {
      setAnalysisLoadingPhase('fetch', '出馬表・戦績を取得しています…', done);
      const raceInfo = _dateRaceMap[selectedDate].races.find(r => r.race_id === _selectedRaceId);
      if (raceInfo) {
        const queueResp = await fetch('/api/scrape-queue/add', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            race_id: _selectedRaceId,
            date: raceInfo.date,
            venue: raceInfo.venue,
            round: raceInfo.round,
            race_name: raceInfo.race_name,
            types: ['race_shutuba', 'horse_result', 'race_odds']
          })
        });
        const queueData = await queueResp.json();

        if (queueData.status === 'queued') {
          setAnalysisLoadingPhase(
            'fetch',
            `スクレイピングキューで待機中（${queueData.position}番目）…`,
            done
          );
          await waitForScrapeComplete(_selectedRaceId);
        } else if (queueData.status === 'running') {
          setAnalysisLoadingPhase('fetch', 'データを取得しています…', done);
          await waitForScrapeComplete(_selectedRaceId);
        }
      }
      done.push('fetch');
    } else {
      done.push('fetch');
    }

    setAnalysisLoadingPhase(
      'compute',
      '追走難度・ペース・位置取り・想定上り3Fを計算しています…',
      done
    );
    const resp = await fetch(`/api/race/${_selectedRaceId}/tracking-difficulty`);
    if (!resp.ok) {
      let errMsg = `HTTP ${resp.status}`;
      try {
        const errBody = await resp.json();
        if (errBody.error) errMsg = errBody.error;
      } catch (_) { /* ignore */ }
      throw new Error(errMsg);
    }
    const data = await resp.json();
    if (data.error && (!data.entries || !data.entries.length)) {
      throw new Error(data.error);
    }

    done.push('compute');
    setAnalysisLoadingPhase('render', '結果を画面に反映しています…', done);
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
    renderResults(data);
    done.push('render');
    const elapsed = _analysisLoadStartedAt
      ? Math.floor((Date.now() - _analysisLoadStartedAt) / 1000)
      : 0;
    msg.textContent = elapsed > 0 ? `完了（${elapsed}秒）` : '完了';
  } catch (e) {
    msg.textContent = `エラー: ${e.message}`;
    console.error(e);
    showAnalysisLoadingError(e.message || '不明なエラー');
  } finally {
    stopAnalysisLoadingTimer();
    btn.disabled = false;
  }
}

async function waitForScrapeComplete(raceId) {
  const done = ['prepare'];
  for (let i = 0; i < 60; i++) {
    await new Promise(r => setTimeout(r, 5000));

    const statusResp = await fetch('/api/scrape-queue/status');
    const statusData = await statusResp.json();

    const job = statusData.jobs?.find(j => j.race_id === raceId);
    if (!job) break;

    if (job.status === 'completed') {
      setAnalysisLoadingPhase('fetch', 'データ取得が完了しました', done);
      break;
    }
    if (job.status === 'failed') {
      throw new Error(`スクレイピング失敗: ${job.error || '不明'}`);
    }
    if (job.status === 'running') {
      setAnalysisLoadingPhase('fetch', 'データを取得しています…', done);
    } else {
      const pos = statusData.jobs.filter(j => j.status === 'pending').findIndex(j => j.race_id === raceId) + 1;
      if (pos > 0) {
        setAnalysisLoadingPhase('fetch', `キュー待ち（${pos}番目）…`, done);
      }
    }
  }
}

function easeClass(label) {
  if (label === '非常に楽') return 'ease-very-easy';
  if (label === '楽') return 'ease-easy';
  if (label === '普通') return 'ease-normal';
  if (label === 'やや困難') return 'ease-hard';
  return 'ease-very-hard';
}

function easeColor(pct) {
  if (pct >= 75) return 'var(--ok)';
  if (pct >= 60) return 'var(--accent)';
  if (pct >= 45) return 'var(--text-dim)';
  if (pct >= 30) return 'var(--warn)';
  return 'var(--err)';
}

/**
 * 前走1角の通過順などから求めた「序盤前寄り指数」（API: t1f_norm）。
 * 数値が小さいほど前走で先行寄り、大きいほど後方寄り。
 * 今回フィールドの先行意識（前走で前にいた馬の多さ）で補正している。
 */
function describeT1fFrontIndex(norm) {
  if (norm === null || norm === undefined || Number.isNaN(Number(norm))) {
    return { label: '—', sub: '', color: 'var(--text-dim)', barPct: 0, title: '' };
  }
  const n = Number(norm);
  let label = '中団';
  let color = 'var(--accent)';
  if (n < 0.22) {
    label = 'かなり前寄り';
    color = 'var(--err)';
  } else if (n < 0.38) {
    label = 'やや前寄り';
    color = 'var(--warn)';
  } else if (n < 0.55) {
    label = '中団';
    color = 'var(--accent)';
  } else if (n < 0.72) {
    label = 'やや後方';
    color = 'var(--text-dim)';
  } else {
    label = '後方寄り';
    color = 'var(--text-dim)';
  }
  return {
    label,
    sub: n.toFixed(2),
    color,
    barPct: Math.min(100, Math.max(4, (1 - n) * 100)),
    title: `序盤前寄り指数 ${n.toFixed(2)}（0に近い＝前走で先行寄り、1に近い＝後方。今回の先行意識で補正）`,
  };
}

function t1fFrontIndexCell(norm) {
  const d = describeT1fFrontIndex(norm);
  if (d.label === '—') return '<span style="color:var(--text-dim)">—</span>';
  return `<div class="t1f-front-cell" title="${escHtml(d.title)}">
    <div class="t1f-bar-bg"><div class="t1f-bar-fill" style="width:${d.barPct}%;background:${d.color}"></div></div>
    <div style="font-size:11px;font-weight:700;color:${d.color}">${escHtml(d.label)}</div>
    <div style="font-size:9px;color:var(--text-dim)">指数 ${escHtml(d.sub)}</div>
  </div>`;
}

/** 想定上り3F（秒・小さいほど速い）の表示色 */
function last3fPredictColor(deltaSec) {
  const d = Number(deltaSec);
  if (Number.isNaN(d)) return 'var(--text-dim)';
  if (d <= -0.25) return 'var(--ok)';
  if (d <= -0.1) return 'var(--accent)';
  if (d < 0.12) return 'var(--text-dim)';
  if (d < 0.3) return 'var(--warn)';
  return 'var(--err)';
}

function formatExpectedLast3f(l3f) {
  if (!l3f || l3f.seconds == null || l3f.seconds <= 0) {
    return { main: '—', sub: '', color: 'var(--text-dim)', title: '' };
  }
  const sec = Number(l3f.seconds);
  const delta = Number(l3f.delta_sec);
  const rank = l3f.rank != null ? `${l3f.rank}位` : '';
  const label = l3f.label || '';
  const title = [
    `想定上り3F ${sec.toFixed(1)}秒`,
    l3f.baseline_sec ? `基準 ${Number(l3f.baseline_sec).toFixed(1)}秒` : '',
    !Number.isNaN(delta) ? `基準比 ${delta >= 0 ? '+' : ''}${delta.toFixed(2)}秒` : '',
    rank ? `フィールド内 ${rank}` : '',
    label,
  ].filter(Boolean).join(' / ');
  return {
    main: `${sec.toFixed(1)}秒`,
    sub: [rank, label].filter(Boolean).join(' · '),
    color: last3fPredictColor(delta),
    title,
  };
}

function expectedLast3fCell(l3f) {
  const f = formatExpectedLast3f(l3f);
  if (f.main === '—') return '<span style="color:var(--text-dim)">—</span>';
  return `<div class="l3f-predict-cell" title="${escHtml(f.title)}">
    <div style="font-size:12px;font-weight:800;color:${f.color}">${escHtml(f.main)}</div>
    ${f.sub ? `<div style="font-size:9px;color:var(--text-dim)">${escHtml(f.sub)}</div>` : ''}
  </div>`;
}

let _lastAnalysisPayload = null;
let _horseTableSortMode = 'predicted';

function buildMasterHorseRows(data) {
  const entries = data.entries || [];
  const pfMap = Object.fromEntries(
    (data.position_flow || []).map((p) => [p.horse_number, p])
  );
  return entries.map((e) => {
    const td = e.tracking_difficulty || {};
    const pf = pfMap[e.horse_number] || {};
    const pos = pf.positions || {};
    const pr = e.prev_race || {};
    const cc = e.course_comparison || {};
    const prof = e.profile || {};
    const pa = e.position_ability || {};
    const stm = pf.stamina || {};
    const bestMin = pa.best_norm_pos_min ?? prof.best_norm_pos_min;
    const everLed = pa.ever_led_before_final ?? pa.ever_led_any;
    return {
      horse_number: e.horse_number,
      horse_id: e.horse_id,
      horse_name: e.horse_name || '',
      bracket_number: e.bracket_number || 0,
      style: pf.style || prof.style || '',
      style_jra: prof.style_jra || '',
      style_final: prof.style_final || '',
      best_norm_min: bestMin != null ? Number(bestMin) : null,
      ever_led: !!everLed,
      jockey_bias: pa.jockey_position_bias != null ? Number(pa.jockey_position_bias) : null,
      ease_pct: Number(td.ease_pct) || 50,
      ease_label: td.label || '普通',
      early: pos.early?.position ?? null,
      mid: pos.mid?.position ?? null,
      late: pos.late?.position ?? null,
      flow_pattern: pf.flow_pattern || '',
      stamina_concern: !!pf.stamina_concern,
      expected_last_3f: pf.expected_last_3f || null,
      stamina_index: stm.stamina_index ?? null,
      stamina_label: stm.stamina_label || '',
      prev_t1f: pr.t1f_raw || 0,
      prev_field: pr.field_size || 0,
      dist_change: cc.dist_change,
      dist_category: cc.dist_category || '',
      same_surface: !!cc.same_surface,
    };
  });
}

function sortMasterHorseRows(rows, mode) {
  const list = [...rows];
  const cmpHorse = (a, b) => a.horse_number - b.horse_number;
  switch (mode) {
    case 'ease_asc':
      return list.sort((a, b) => a.ease_pct - b.ease_pct || cmpHorse(a, b));
    case 'horse':
      return list.sort(cmpHorse);
    case 'stamina_desc':
      return list.sort((a, b) => {
        const sa = a.stamina_index ?? -1;
        const sb = b.stamina_index ?? -1;
        return sb - sa || cmpHorse(a, b);
      });
    case 'predicted':
      return list.sort((a, b) => {
        const ea = a.early ?? 99;
        const eb = b.early ?? 99;
        return ea - eb || cmpHorse(a, b);
      });
    case 'ease_desc':
    default:
      return list.sort((a, b) => b.ease_pct - a.ease_pct || cmpHorse(a, b));
  }
}

    const l3fFmt = formatExpectedLast3f(r.expected_last_3f);

    let flowClass = 'flow-maintain';

    const t1fColor = (r.prev_t1f || 0) <= 3 ? 'var(--err)' : (r.prev_t1f || 0) <= 6 ? 'var(--warn)' : 'var(--text-dim)';
    const bestPct = r.best_norm_min != null ? Math.round(r.best_norm_min * 100) : null;
    const bestColor = bestPct != null && bestPct <= 12 ? 'var(--err)' : bestPct != null && bestPct <= 25 ? 'var(--warn)' : 'var(--text-dim)';
    const hanaMark = r.ever_led ? '<span class="hana-badge" title="過去走で最終角前に1位通過あり">ハナ</span>' : '';
    const distCls = r.dist_category === '距離延長' ? 'dist-ext' : r.dist_category === '距離短縮' ? 'dist-red' : 'dist-same';
    const distSign = r.dist_change != null

    body += `<tr id="row-${r.horse_number}">
      <td class="tc" data-sort="${r.bracket_number || ''}"><span class="gate-waku-pill ${wakuClass(r.bracket_number)}" style="width:22px;height:22px;font-size:10px">${r.bracket_number || '—'}</span></td>
      <td class="num" style="font-weight:800" data-sort="${r.horse_number}">${r.horse_number}</td>
      <td class="horse-name-cell" data-sort-text="${escAttr(r.horse_name)}">${horseNameLink(r.horse_id, r.horse_name)}</td>
      <td class="tc" data-sort-text="${escAttr(r.style)}">
        <span class="${styleClass(r.style)}" style="font-size:10px" title="${escAttr([r.style_jra, r.style_final].filter(Boolean).join(' / '))}">${r.style || '—'}</span>
        ${hanaMark}
      </td>
      <td data-sort="${r.ease_pct}">
        <span class="mini-ease-track" title="追走容易度 ${r.ease_pct.toFixed(1)}%"><span class="mini-ease-fill" style="width:${Math.max(0, Math.min(100, r.ease_pct))}%;background:${color}"></span></span>
        <span style="font-weight:700;color:${color}">${r.ease_pct.toFixed(0)}</span>
        <span class="td-ease-badge ${easeClass(r.ease_label)}" style="font-size:10px;padding:1px 6px;margin-left:4px">${r.ease_label}</span>
      </td>
      <td class="num" style="color:${r.stamina_index != null ? staminaColor(r.stamina_index) : 'var(--text-dim)'};font-weight:700" data-sort="${r.stamina_index ?? ''}">
        ${r.stamina_index != null ? r.stamina_index.toFixed(0) : '—'}
        ${r.stamina_label ? `<div style="font-size:9px;font-weight:600">${escHtml(r.stamina_label)}</div>` : ''}
      </td>
      <td class="tc flow-compact" data-sort="${earlyN}" title="序→中→終">${flowStr}</td>
      <td class="tc" title="${escHtml(l3fFmt.title)}" data-sort="${l3fSec}">
        <span style="font-weight:800;color:${l3fFmt.color}">${escHtml(l3fFmt.main)}</span>
      </td>
      <td data-sort-text="${escAttr(flow)}"><span class="flow-badge ${flowClass}" style="font-size:10px">${flow || '—'}</span>${warn}</td>
      <td class="num" style="color:${bestColor};font-weight:700" data-sort="${r.best_norm_min ?? ''}" title="過去走の最前方位置（0%=先頭圏）">${bestPct != null ? `前${bestPct}%` : '—'}</td>
      <td class="num" style="color:${t1fColor};font-weight:700" data-sort="${r.prev_t1f || ''}">${r.prev_t1f > 0 ? `${r.prev_t1f}/${r.prev_field || '?'}` : '—'}</td>
      <td class="${distCls}" style="font-size:11px;white-space:nowrap" data-sort="${r.dist_change != null ? r.dist_change : ''}">
        ${distSign} <span style="color:${r.same_surface ? 'var(--ok)' : 'var(--warn)'}">${surfTxt}</span>
      </td>
    </tr>`;
  });
  return `<div class="horse-table-wrap">
    <table class="horse-table">
      <thead><tr>
        <th class="col-sortable tc">枠</th>
        <th class="col-sortable num">馬番</th>
        <th class="col-sortable">馬名</th>
        <th class="col-sortable tc">脚質</th>
        <th class="col-sortable">容易度</th>
        <th class="col-sortable num">温存</th>
        <th class="col-sortable tc">序→中→終</th>
        <th class="col-sortable tc">上り3F</th>
        <th class="col-sortable">展開</th>
        <th class="col-sortable num" title="過去走で最も前に行けた位置（%）">最前位置</th>
        <th class="col-sortable num">前走1角</th>

function resolveFieldSize(data) {
  const d = data || _lastAnalysisPayload || {};
  const n = Number(d.field_size);
  if (n > 0) return n;
  const entries = d.entries || [];
  return entries.length > 0 ? entries.length : 18;
}

function styleClass(style) {
  if (style === '逃げ') return 'style-nige';
  if (style === '先行') return 'style-senkou';
  if (style === '差し') return 'style-sashi';
  return 'style-oikomi';
}

function wakuClass(bn) {
  return bn >= 1 && bn <= 8 ? `waku-${bn}` : '';
}

/**
 * ペース数値から人間向けの解説文を生成する。
 * @returns { lines: [{icon, text}], verdict: string, tip: string }
 */
function generatePaceComment(pace, fps, fieldSize) {
  const paceType  = pace.pace_type  || 'ミドル';
  const paceIdx   = pace.pace_index || 50;
  const dist      = pace.distribution || {};
  const nigeN     = dist['逃げ']  || 0;
  const senkoN    = dist['先行']  || 0;
  const sashiN    = dist['差し']  || 0;
  const oikomiN   = dist['追込']  || 0;
  const lap1f     = pace.lap_times?.first_1f || 0;
  const lap3f     = pace.lap_times?.first_3f || 0;
  const prevTop3  = fps.prev_top3_count     || 0;
  const presRatio = fps.front_pressure_ratio || 0;
  const frontN    = nigeN + senkoN;
  const backN     = sashiN + oikomiN;

  const lines = [];

  // ── ① 逃げ頭数によるシナリオ ──
  if (nigeN === 0) {
    lines.push({ icon: '🏳️', text: `逃げ馬が不在のため、誰かが行かされる展開になりそうです。先行馬がハナを主張する可能性があり、前半は比較的落ち着いた流れになりやすいです。` });
  } else if (nigeN === 1 && senkoN <= 2) {
    lines.push({ icon: '🏇', text: `逃げ馬は${nigeN}頭で単騎逃げが濃厚。マイペースで進めやすく、前半は引き締まらないスロー〜ミドルが想定されます。` });
  } else if (nigeN === 2) {
    lines.push({ icon: '⚔️', text: `逃げ馬が${nigeN}頭おり、ハナ争いが発生する可能性があります。2頭が競り合うと前半が速くなりやすく、早めにペースが落ち着くか激化するか注目です。` });
  } else {
    lines.push({ icon: '🔥', text: `逃げ馬が${nigeN}頭と多く、先行争いが激しくなります。前半から速い流れが予想され、先行馬は脚を使わされる消耗戦になりやすいです。` });
  }

  // ── ② 先行馬の厚みによる補足 ──
  if (senkoN >= 4) {
    lines.push({ icon: '⚠️', text: `先行馬が${senkoN}頭と厚く、前半の隊列が縦長になりやすいです。好位を取るのが難しく、ポジション争いが激化する可能性があります。` });
  } else if (senkoN >= 2 && nigeN >= 1) {
    lines.push({ icon: '📌', text: `先行馬${senkoN}頭が逃げ馬の後ろに並ぶ形。序盤にポジション争いはあるものの、${nigeN + senkoN}頭が前を固める展開が見込まれます。` });
  }

  // ── ③ 後方馬・差し馬の多さ ──
  if (backN >= fieldSize * 0.6) {
    lines.push({ icon: '🌊', text: `差し・追込馬が${backN}頭（全体の${Math.round(backN/fieldSize*100)}%）を占めており、後方待機組が多いです。スローになると届かないケースもあるため、ペースの読みが重要です。` });
  }

  // ── ④ 前走前目馬による追走圧力 ──
  if (prevTop3 >= 3) {
    lines.push({ icon: '💥', text: `前走で3番手以内を走っていた馬が${prevTop3}頭いるため、今回も序盤のポジション争いが起きやすい構成です。前半のT1Fペースは想定より速くなる可能性があります。` });
  }

  // ── ⑤ ラップタイム説明 ──
  if (lap1f > 0 && lap3f > 0) {
    const lap1fQ = lap1f <= 11.5 ? '非常に速い' : lap1f <= 12.0 ? '速め' : lap1f <= 12.5 ? '標準的' : 'ゆったりした';
    lines.push({ icon: '⏱️', text: `前半1Fは約 ${lap1f.toFixed(1)} 秒（${lap1fQ}ペース）、前半3Fは約 ${lap3f.toFixed(1)} 秒と予測されます。${lap1f <= 11.8 ? '序盤から脚を使われるため、スタミナのある馬が有利です。' : '前半が抑えられる分、末脚の持続力が問われます。'}` });
  }

  // ── ⑥ 総合verdict ──
  let verdict = '';
  if (paceType === 'ハイ') {
    if (nigeN >= 3) {
      verdict = `逃げ馬${nigeN}頭の先行争いでハイペース確定的。前残りは困難で、差し・追込馬に展開利があります。逃げ・先行馬は早仕掛けにならないよう注意。`;
    } else {
      verdict = `ハイペース想定（指数 ${paceIdx.toFixed(0)}）。前につけた馬ほど消耗が激しく、後方待機の馬が台頭しやすいレース質です。`;
    }
  } else if (paceType === 'スロー') {
    if (nigeN === 0) {
      verdict = `逃げ不在のスローが濃厚（指数 ${paceIdx.toFixed(0)}）。縦長になりにくく、前に位置した馬がそのまま残るケースが多い展開です。差し・追込には厳しい。`;
    } else {
      verdict = `スローペース想定（指数 ${paceIdx.toFixed(0)}）。位置取りが重要になり、外を回しすぎると距離損になります。早め動きが鍵になる差し馬に注目。`;
    }
  } else {
    verdict = `ミドルペース想定（指数 ${paceIdx.toFixed(0)}）。各馬の能力が素直に出やすく、極端な展開利不利は少ない見込みです。`;
  }

  // ── ⑦ 馬券ヒント ──
  let tip = '';
  if (paceType === 'ハイ') {
    tip = `📝 ヒント: ハイペースでは逃げ・先行馬の「スタミナ温存度」が低くなりがちです。温存度ランキング上位（後方から差してくる馬）を重視してみてください。`;
  } else if (paceType === 'スロー') {
    tip = `📝 ヒント: スローペースでは先行馬が有利。「序盤予測位置」が前の馬かつ追走容易度が高い馬を中心に組み立てるのが得策です。`;
  } else {
    tip = `📝 ヒント: ミドルペースは総合力勝負。追走容易度が高く、かつスタミナ温存度も標準以上の馬を軸にするとバランスがよいです。`;
  }

  return { lines, verdict, paceType, tip };
}

function staminaClass(lbl) {
  if (lbl === '最大温存') return 'stamina-max';
  if (lbl === '温存')     return 'stamina-high';
  if (lbl === '標準')     return 'stamina-mid';
  if (lbl === '消耗')     return 'stamina-low';

function staminaColor(idx) {

  if (idx >= 60) return 'var(--accent)';

/** 先行意識に応じた序盤補正（t1f_normalization_factor 1.0〜2.0）の平易ラベル */

function escHtml(s) {

    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')

}

function escAttr(s) {
