<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>馬場速度レベリング | ML-AutoPilot Keiba</title>
<style>
  :root {
    --bg: #0a0e17;
    --surface: #131926;
    --surface2: #1a2235;
    --border: #243049;
    --text: #c8d6e5;
    --text-dim: #6b7d95;
    --accent: #3b82f6;
    --ok: #22c55e;
    --warn: #f59e0b;
    --err: #ef4444;
    --speed5: #ef4444;
    --speed4: #f97316;
    --speed3: #a3a3a3;
    --speed2: #3b82f6;
    --speed1: #8b5cf6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh;
  }
  .page-header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 20px 32px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  }
  .page-header h1 { font-size: 18px; font-weight: 600; color: #fff; }
  .page-header .sub { font-size: 12px; color: var(--text-dim); }

  .controls {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 32px; flex-wrap: wrap;
  }
  .btn {
    border: none; border-radius: 8px; padding: 8px 18px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-outline {
    background: transparent; color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-outline.active { border-color: var(--accent); color: var(--accent); background: rgba(59,130,246,0.08); }

  select {
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 7px 12px; font-size: 13px; outline: none;
  }

  .job-banner {
    margin: 0 32px 16px; padding: 14px 18px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; display: none;
  }
  .job-banner .title { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 8px; }
  .job-progress { font-size: 12px; color: var(--text-dim); max-height: 120px; overflow-y: auto; }
  .job-progress div { padding: 2px 0; }
  .job-spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(59,130,246,0.2); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .stats-row {
    display: flex; gap: 12px; padding: 0 32px 16px; flex-wrap: wrap;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px; min-width: 130px;
  }
  .stat-card .label { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
  .stat-card .value { font-size: 22px; font-weight: 700; color: #fff; }

  .legend-row {
    display: flex; gap: 16px; padding: 0 32px 16px; flex-wrap: wrap; align-items: center;
  }
  .legend-item {
    display: flex; align-items: center; gap: 5px; font-size: 11.5px; color: var(--text-dim);
  }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 3px;
  }

  .timeline-container {
    padding: 0 32px 32px;
  }
  .date-group {
    margin-bottom: 6px;
  }
  .date-header {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; cursor: pointer;
    border-radius: 8px; transition: background 0.15s;
  }
  .date-header:hover { background: rgba(59,130,246,0.04); }
  .date-label { font-size: 14px; font-weight: 600; color: #fff; min-width: 110px; }
  .date-weekday { font-size: 11px; min-width: 20px; }
  .date-weekday.sat { color: #60a5fa; }
  .date-weekday.sun { color: #f87171; }

  .venue-badges { display: flex; gap: 8px; flex: 1; flex-wrap: wrap; }
  .venue-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 6px; font-size: 12px;
    border: 1px solid var(--border); background: var(--surface);
    transition: all 0.15s;
  }
  .venue-badge:hover { border-color: rgba(255,255,255,0.1); }
  .venue-name { font-weight: 600; color: #fff; }
  .surface-tag {
    font-size: 10px; font-weight: 700; padding: 1px 5px;
    border-radius: 3px; letter-spacing: 0.5px;
  }
  .surface-tag.turf { background: rgba(34,197,94,0.15); color: #4ade80; }
  .surface-tag.dirt { background: rgba(245,158,11,0.15); color: #fbbf24; }
  .surf-swatch {
    display: inline-block; width: 12px; height: 12px; border-radius: 2px;
    vertical-align: -2px; margin-right: 4px;
  }
  .surf-swatch-turf { background: rgba(34,197,94,.25); border-left: 3px solid #4ade80; }
  .surf-swatch-dirt { background: rgba(245,158,11,.25); border-left: 3px solid #fbbf24; }
  .tsi-value {
    font-size: 13px; font-weight: 700;
    font-variant-numeric: tabular-nums;
    min-width: 40px; text-align: right;
  }
  .speed-label {
    font-size: 10.5px; font-weight: 600; padding: 2px 7px;
    border-radius: 4px;
  }
  .speed-5 { color: var(--speed5); background: rgba(239,68,68,0.12); }
  .speed-4 { color: var(--speed4); background: rgba(249,115,22,0.12); }
  .speed-3 { color: var(--speed3); background: rgba(163,163,163,0.1); }
  .speed-2 { color: var(--speed2); background: rgba(59,130,246,0.12); }
  .speed-1 { color: var(--speed1); background: rgba(139,92,246,0.12); }
  .sample-count { font-size: 10px; color: var(--text-dim); }

  .detail-panel {
    margin: 4px 0 10px 128px; padding: 12px 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; display: none;
  }
  .detail-panel.open { display: block; }
  .race-row {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 8px; font-size: 12px; border-radius: 4px;
    transition: background 0.1s;
  }
  .race-row:hover { background: rgba(255,255,255,0.02); }
  .race-round { font-weight: 600; color: var(--text-dim); min-width: 28px; }
  .race-dist { color: var(--text-dim); min-width: 50px; }
  .race-grade { color: var(--accent); min-width: 50px; }
  .race-time { font-variant-numeric: tabular-nums; min-width: 60px; color: #fff; }
  .race-baseline { color: var(--text-dim); min-width: 60px; font-variant-numeric: tabular-nums; }
  .race-z { font-weight: 600; min-width: 55px; text-align: right; font-variant-numeric: tabular-nums; }
  .race-fadj { color: var(--text-dim); min-width: 55px; text-align: right; font-variant-numeric: tabular-nums; }
  .race-tsi { font-weight: 700; min-width: 55px; text-align: right; font-variant-numeric: tabular-nums; }

  .race-table {
    width: 100%; border-collapse: collapse; font-size: 12px;
  }
  .race-table th {
    padding: 6px 8px; text-align: center; color: var(--text-dim);
    font-weight: 600; font-size: 11px; border-bottom: 1px solid var(--border);
  }
  .race-table th.sortable {
    cursor: pointer; user-select: none; white-space: nowrap;
  }
  .race-table th.sortable:hover { color: var(--text); }
  .race-table th .sort-icon {
    display: inline-block; margin-left: 4px; font-size: 9px; opacity: 0.3;
  }
  .race-table th.sort-asc .sort-icon,
  .race-table th.sort-desc .sort-icon { opacity: 1; color: var(--accent); }
  .race-table td {
    padding: 5px 8px; border-bottom: 1px solid rgba(36,48,73,.35);
    white-space: nowrap; text-align: center;
  }
  .race-table tr:hover td { background: rgba(255,255,255,.02); }
  .race-table tr.row-turf td {
    background: rgba(34, 197, 94, 0.07);
    border-bottom-color: rgba(34, 197, 94, 0.14);
  }
  .race-table tr.row-turf:hover td { background: rgba(34, 197, 94, 0.13); }
  .race-table tr.row-turf td.col-r {
    border-left: 3px solid #4ade80;
    color: #bbf7d0;
  }
  .race-table tr.row-turf .col-cond { color: #86efac; font-weight: 600; }
  .race-table tr.row-dirt td {
    background: rgba(245, 158, 11, 0.08);
    border-bottom-color: rgba(245, 158, 11, 0.16);
  }
  .race-table tr.row-dirt:hover td { background: rgba(245, 158, 11, 0.14); }
  .race-table tr.row-dirt td.col-r {
    border-left: 3px solid #fbbf24;
    color: #fde68a;
  }
  .race-table tr.row-dirt .col-cond { color: #fcd34d; font-weight: 600; }
  .race-table .col-r { font-weight: 700; width: 36px; color: #fff; }
  .race-table .col-speed {
    min-width: 68px; text-align: center; vertical-align: middle;
  }
  .race-table th.col-speed-h { min-width: 68px; }
  .race-table .col-race-level {
    min-width: 72px; text-align: center; vertical-align: middle;
  }
  .race-table .col-cond { color: var(--text); min-width: 72px; }
  .race-table .col-cls { color: var(--text-dim); max-width: 140px; overflow: hidden; text-overflow: ellipsis; text-align: center; }
  .race-table .col-name {
    max-width: 148px; min-width: 80px; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; text-align: center;
  }
  .race-name-link {
    color: var(--text); text-decoration: none; font-size: 12px;
    display: inline-flex; align-items: center; gap: 3px;
    max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .race-name-link:hover { color: var(--accent); }
  .nk-icon {
    flex-shrink: 0; font-size: 9px; color: var(--text-dim); opacity: 0.7;
    line-height: 1;
  }
  .race-name-link:hover .nk-icon { color: var(--accent); opacity: 1; }
  .race-table .col-time { font-variant-numeric: tabular-nums; font-weight: 600; }
  .race-table .col-pace { min-width: 96px; line-height: 1.3; text-align: center; }
  .pace-cell { display: flex; flex-direction: column; gap: 2px; align-items: center; }
  .pace-fh { font-weight: 600; font-variant-numeric: tabular-nums; color: var(--text); }
  .pace-range { font-size: 10px; color: var(--text-dim); font-weight: 400; font-variant-numeric: tabular-nums; letter-spacing: 0.2px; }
  .pace-meta { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 4px; font-size: 10px; }
  .pace-tag {
    padding: 1px 5px; border-radius: 3px; font-weight: 600; line-height: 1.2;
  }
  .pace-tag.pace-hi { background: rgba(239, 68, 68, 0.18); color: #fca5a5; }
  .pace-tag.pace-slow { background: rgba(59, 130, 246, 0.18); color: #93c5fd; }
  .pace-tag.pace-mid { background: rgba(148, 163, 184, 0.14); color: var(--text-dim); }
  .pace-adj { color: var(--text-dim); }
  .race-table .col-z { font-weight: 700; text-align: center; font-variant-numeric: tabular-nums; }
  .race-table .col-perf { font-weight: 700; text-align: center; font-variant-numeric: tabular-nums; min-width: 62px; }
  .perf-hi  { color: #4ade80; }
  .perf-lo  { color: #f87171; }
  .perf-pos { color: #4ade80; }
  .perf-neg { color: #f87171; }
  .perf-zero { color: var(--text-dim); }

  .level-badge {
    font-size: 10px; font-weight: 700; padding: 2px 6px;
    border-radius: 4px; white-space: nowrap;
  }
  .level-hi  { background: rgba(234,179,8,0.15); color: #fbbf24; }
  .level-mid { background: rgba(148,163,184,0.1); color: var(--text-dim); }
  .level-lo  { background: rgba(99,102,241,0.15); color: #a78bfa; }

  /* ── Class-level badges ── */
  .cls-badge {
    font-size: 10px; font-weight: 700; padding: 2px 7px;
    border-radius: 4px; white-space: nowrap; letter-spacing: 0.2px;
  }
  .cls-G1  { background: rgba(234,179,8,0.20);   color: #fde68a; border: 1px solid rgba(234,179,8,0.35); }
  .cls-G2  { background: rgba(209,213,219,0.14); color: #d1d5db; border: 1px solid rgba(209,213,219,0.3); }
  .cls-G3  { background: rgba(34,197,94,0.14);   color: #86efac; border: 1px solid rgba(34,197,94,0.3); }
  .cls-OP  { background: rgba(249,115,22,0.15);  color: #fdba74; border: 1px solid rgba(249,115,22,0.3); }
  .cls-L   { background: rgba(249,115,22,0.11);  color: #fb923c; border: 1px solid rgba(249,115,22,0.22); }
  .cls-3   { background: rgba(59,130,246,0.14);  color: #93c5fd; border: 1px solid rgba(59,130,246,0.28); }
  .cls-2   { background: rgba(99,102,241,0.13);  color: #a5b4fc; border: 1px solid rgba(99,102,241,0.25); }
  .cls-1   { background: rgba(148,163,184,0.10); color: #94a3b8; border: 1px solid rgba(148,163,184,0.22); }
  .cls-msh { background: rgba(71,85,105,0.12);   color: #64748b; border: 1px solid rgba(71,85,105,0.22); }
  .cls-shm { background: rgba(51,65,85,0.10);    color: #475569; border: 1px solid rgba(51,65,85,0.2); }

  .race-table tr.race-clickable { cursor: pointer; }
  .horse-panel-row { display: none; }
  .horse-panel-row.open { display: table-row; }
  .horse-panel-cell {
    padding: 0 !important;
    background: rgba(15,23,42,0.8) !important;
    border-bottom: 2px solid var(--border) !important;
  }
  .horse-panel-inner { padding: 10px 16px 12px; overflow-x: auto; }
  .horse-table { border-collapse: collapse; font-size: 11.5px; }
  .horse-table th {
    padding: 4px 10px; text-align: left; color: var(--text-dim);
    font-weight: 600; font-size: 10.5px; border-bottom: 1px solid var(--border);
  }
  .horse-table td {
    padding: 4px 10px; border-bottom: 1px solid rgba(36,48,73,.2); white-space: nowrap;
  }
  .horse-table tr.row-2nd td { background: rgba(59,130,246,0.08); }
  .horse-table tr.row-1st td { background: rgba(234,179,8,0.07); }
  .col-perf-h { font-weight: 700; text-align: right; font-variant-numeric: tabular-nums; min-width: 56px; }

  .dist-section { padding: 0 32px 16px; }
  .dist-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 14px;
  }
  .dist-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px 14px;
  }
  .dist-head {
    display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap;
  }
  .dist-title { font-size: 14px; font-weight: 700; }
  .dist-meta { font-size: 11px; color: var(--text-dim); margin-left: auto; }
  .dist-svg { display: block; width: 100%; height: auto; }
  .dist-caption {
    margin-top: 6px; font-size: 10px; color: var(--text-dim); line-height: 1.4;
  }

  .tsi-bar {
    width: 80px; height: 8px; background: var(--surface2);
    border-radius: 4px; overflow: hidden; position: relative;
  }
  .tsi-bar-center { position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: var(--border); }
  .tsi-bar-fill {
    position: absolute; top: 0; bottom: 0; border-radius: 4px;
    transition: all 0.3s;
  }

  .empty-state {
    text-align: center; padding: 80px 32px;
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 14px; color: var(--text-dim); }

  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }
  .toast {
    padding: 10px 18px; border-radius: 8px; font-size: 13px;
    margin-top: 8px; animation: fadeIn 0.2s;
    border: 1px solid var(--border); background: var(--surface);
  }
  .toast.success { border-color: var(--ok); color: var(--ok); }
  .toast.error { border-color: var(--err); color: var(--err); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }

  /* ── Category Search ── */
  .cat-section {
    padding: 0 32px 24px;
  }
  .cat-section-title {
    font-size: 12px; font-weight: 700; color: var(--text-dim);
    letter-spacing: 0.8px; text-transform: uppercase;
    padding: 10px 0 8px; border-top: 1px solid var(--border);
    margin-bottom: 10px;
  }
  .cat-controls {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px;
  }
  .cat-results-wrap { overflow-x: auto; }
  .cat-pagination {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0 0; font-size: 12px; color: var(--text-dim);
  }
  .cat-empty {
    padding: 32px; text-align: center; font-size: 13px; color: var(--text-dim);
  }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .page-header { padding: 16px 20px; }
    .controls { padding: 12px 20px; flex-wrap: wrap; }
    .stats-row { padding: 0 20px 12px; }
    .legend-row { padding: 0 20px 12px; }
    .dist-section { padding: 0 20px 12px; }
    .timeline-container { padding: 0 20px 24px; }
    .race-day { padding: 14px 16px; }
    .race-row { flex-direction: column; align-items: flex-start; gap: 8px; }
  }

  @media (max-width: 480px) {
    .page-header { padding: 12px 16px; }
    .page-header h1 { font-size: 16px; }
    .controls { padding: 10px 16px; }
    .btn { font-size: 12px; padding: 7px 14px; }
    select { font-size: 12px; }
    .stats-row { padding: 0 16px 10px; gap: 8px; }
    .stat-card { min-width: 110px; padding: 12px 14px; }
    .stat-card .value { font-size: 18px; }
    .legend-row { padding: 0 16px 12px; gap: 12px; }
    .dist-section { padding: 0 16px 10px; }
    .timeline-container { padding: 0 16px 20px; }
    .race-day { padding: 12px 14px; }
  }
</style>
</head>
<body>
{% include 'partials/_nav.html' %}

<div class="page-header">
  <div>
    <h1><img src="/data/image/icon.jpg" alt="" class="page-brand-icon">馬場速度レベリング</h1>
    <div class="sub">2着タイムから算出した馬場指数（50=標準・高い=速い／障害除く・RPCIのz変換連続ペース補正・2020-2025基準）| PF指数=コース内評価・PF(2000m)=全コース横断比較用標準化指数</div>
  </div>
</div>

<div class="controls">
  <label style="font-size:12px;color:var(--text-dim)">日付</label>
  <input type="date" id="datePick" style="background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:13px">
  <label style="font-size:12px;color:var(--text-dim)">競馬場</label>
  <select id="venuePick"><option value="">選択</option></select>
  <button class="btn btn-primary" id="loadDayBtn" onclick="loadDay()">表示</button>
  <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn btn-outline" onclick="rebuildBaselines()">基準データ再構築</button>
    <button class="btn btn-outline" onclick="assignRaces()">2026〜振り分け</button>
  </div>
</div>

<div class="job-banner" id="jobBanner">
  <div class="title"><span class="job-spinner"></span> 処理中...</div>
  <div class="job-progress" id="jobProgress"></div>
</div>

<div class="stats-row" id="statsRow" style="display:none"></div>

<div class="legend-row" id="legendRow">
  <span style="font-size:11px;color:var(--text-dim)">馬場レベル:</span>
  <div class="legend-item"><div class="legend-dot" style="background:var(--speed5)"></div>超高速</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--speed4)"></div>高速</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--speed3)"></div>標準</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--speed2)"></div>低速</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--speed1)"></div>超低速</div>
  <span style="font-size:10px;color:var(--text-dim);margin-left:12px">馬場指数 50=標準（高い=速い・ペース補正後）</span>
  <span style="font-size:10px;color:var(--text-dim)">前半ペース: RPCI/前半3Fの正規分布z変換で連続補正（z&lt;−1=ハイ・z&gt;1=スロー）</span>
  <span class="legend-item" style="margin-left:8px"><span class="surf-swatch surf-swatch-turf"></span>芝</span>
  <span class="legend-item"><span class="surf-swatch surf-swatch-dirt"></span>ダート</span>
</div>

<div class="cat-section">
  <div class="cat-section-title">コース×馬場カテゴリ 直近レース</div>
  <div class="cat-controls">
    <label style="font-size:12px;color:var(--text-dim)">競馬場</label>
    <select id="catVenuePick"><option value="">選択</option></select>
    <label style="font-size:12px;color:var(--text-dim)">芝/ダート</label>
    <select id="catSurfacePick">
      <option value="">両方</option>

<div class="dist-section" id="distCharts" style="display:none"></div>

<div class="timeline-container" id="mainContent">

  </div>
  <div id="raceTableWrap"></div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
function raceNameCell(r) {
  const name = r.race_name || '';
  const rid  = String(r.race_id || '');
  const isNkId = /^\d{12}$/.test(rid);
  if (!name) return '<td class="col-name" style="color:var(--text-dim)">—</td>';
  if (isNkId) {
    const url = `https://race.netkeiba.com/race/result.html?race_id=${rid}`;
    return `<td class="col-name" title="${name}"><a class="race-name-link" href="${url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${name}<span class="nk-icon">↗</span></a></td>`;
  }
  return `<td class="col-name" title="${name}">${name}</td>`;
}

const SPEED_COLORS = { 5: 'var(--speed5)', 4: 'var(--speed4)', 3: 'var(--speed3)', 2: 'var(--speed2)', 1: 'var(--speed1)' };
const SPEED_CLASSES = { 5: 'speed-5', 4: 'speed-4', 3: 'speed-3', 2: 'speed-2', 1: 'speed-1' };
const WEEKDAYS = ['日','月','火','水','木','金','土'];

function showToast(msg, type = 'info') {
  const c = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

const BABA_BASE = 50;
const BABA_STEP = 10;

function zColor(z) {
  if (z <= -1.5) return SPEED_COLORS[5];
  if (z <= -0.5) return SPEED_COLORS[4];
  if (z < 0.5) return SPEED_COLORS[3];
  if (z < 1.5) return SPEED_COLORS[2];
  return SPEED_COLORS[1];
}

function zToIndex(z) {
  if (z == null) return null;
  return Math.round((BABA_BASE - z * BABA_STEP) * 10) / 10;
}

function raceIndex(r) {
  if (r.z != null) return zToIndex(r.z);
  if (r.baba_index != null) return r.baba_index;
  return null;
}

function indexColor(idx) {
  return zColor((BABA_BASE - idx) / BABA_STEP);
}

function spdClass(level) { return SPEED_CLASSES[level] || 'speed-3'; }

function fmtRaceTime(sec) {
  if (sec == null || sec <= 0) return '—';
  const tenths = Math.round(sec * 10);
  const m = Math.floor(tenths / 600);
  if (m > 0) {
    const rem = tenths % 600;
    const whole = Math.floor(rem / 10);
    const dec = rem % 10;
    return `${m}:${String(whole).padStart(2, '0')}.${dec}`;
  }
  return sec.toFixed(1);
}

function condLabel(r) {
  const s = r.surface === '芝' ? '芝' : 'ダ';
  const d = r.distance > 0 ? r.distance : '—';
  const lay = r.layout && r.layout !== '-' ? r.layout : '';
  return `${s}${d}${lay}`;
}

const PACE_KIND_MAP = { '前傾': 'ハイ', '抑え': 'スロー' };

function paceKind(r) {
  if (r.pace_z != null) {
    if (r.pace_z < -1.0) return 'ハイ';
    if (r.pace_z > 1.0) return 'スロー';
    return '標準';
  }
  if (PACE_KIND_MAP[r.pace_label]) return PACE_KIND_MAP[r.pace_label];
  const adj = r.pace_adj_sec;
  if (adj == null || Math.abs(adj) < 0.05) return '標準';
  return adj > 0 ? 'ハイ' : 'スロー';
}

function paceKindClass(kind) {
  if (kind === 'ハイ') return 'pace-hi';
  if (kind === 'スロー') return 'pace-slow';
  return 'pace-mid';
}

function paceAdjText(adj) {
  if (adj == null || Math.abs(adj) < 0.05) return '';
  const sec = Math.abs(adj).toFixed(1);
  return adj > 0 ? `${sec}秒短縮` : `${sec}秒延長`;
}

function formatPaceCell(r) {
  const fh = r.first_half_3f != null && r.first_half_3f > 0 ? Number(r.first_half_3f).toFixed(1) : '';
  const rpci = r.pace_rpci != null && r.pace_rpci > 0 ? Number(r.pace_rpci).toFixed(3) : '';
  const pz = r.pace_z != null ? Number(r.pace_z).toFixed(2) : null;
  const metric = r.pace_metric || '';
  const kind = paceKind(r);
  const adj = paceAdjText(r.pace_adj_sec);
  if (!fh && !rpci && !pz && kind === '標準' && !adj) {
    return { html: '—', title: 'ペースデータなし' };
  }

  // 実測値と過去レンジ（mean ± std）
  const mMean = r.pace_metric_mean != null ? Number(r.pace_metric_mean) : null;
  const mStd  = r.pace_metric_std  != null ? Number(r.pace_metric_std)  : null;
  const isRpci = metric === 'rpci';
  const unit = isRpci ? '' : '秒';
  let rangeHtml = '';
  let rangeNote = '';
  if (mMean != null && mStd != null) {
    const lo = (mMean - mStd).toFixed(isRpci ? 3 : 1);
    const hi = (mMean + mStd).toFixed(isRpci ? 3 : 1);
    const meanFmt = mMean.toFixed(isRpci ? 3 : 1);
    const stdFmt  = mStd.toFixed(isRpci ? 3 : 1);
    rangeHtml = `<span class="pace-range" title="±1σ基準帯 平均${meanFmt}${unit} (σ=${stdFmt})">${lo}〜${hi}${unit}</span>`;
    rangeNote = `±1σ基準帯: ${lo}〜${hi}${unit}（平均 ${meanFmt}・σ ${stdFmt}）`;
  }

  const kindNote = kind === 'ハイ'
    ? 'z<−1: 同条件より前傾ペース（2着タイムを補正済み）'
    : kind === 'スロー'
      ? 'z>1: 同条件よりスローペース（2着タイムを補正済み）'
      : '|z|≤1: 同条件の標準ペース帯';
  const adjNote = adj
    ? `z変換線形補正により${adj}（馬場指数用）`
    : 'ペース補正なし';
  const metricNote = isRpci
    ? '指標: RPCI（前半3F÷上がり3F）の正規分布z得点'
    : metric === 'first_half_3f' ? '指標: 前半3F の正規分布z得点' : '';
  const title = [
    fh ? `前半3F: ${fh}秒` : null,
    rpci ? `RPCI: ${rpci}` : null,
    pz != null ? `ペースz: ${pz}` : null,
    rangeNote || null,
    metricNote,
    kindNote,
    adjNote,
  ].filter(Boolean).join(' / ');

  let html = '<div class="pace-cell">';
  // 1行目: 実測値
  if (fh) html += `<span class="pace-fh">${fh}秒</span>`;
  else if (rpci) html += `<span class="pace-fh">R${rpci}</span>`;
  // 2行目: ±1σ基準帯（あれば）
  if (rangeHtml) html += rangeHtml;
  // 3行目: z得点・ラベル・補正量
  html += '<span class="pace-meta">';
  if (pz != null) html += `<span class="pace-adj" title="ペースz得点">z${pz}</span>`;
  html += `<span class="pace-tag ${paceKindClass(kind)}">${kind}</span>`;
  if (adj) html += `<span class="pace-adj">${adj}</span>`;
  html += '</span></div>';
  return { html, title };
}

function surfaceRowClass(surface) {
  return surface === '芝' ? 'row-turf' : 'row-dirt';
}

const PERF_BASE = 50, PERF_HI = 56.5, PERF_LO = 43.5;

function formatPerfIndex(v, titlePrefix) {
  const label = titlePrefix || 'PF指数';
  if (v == null || isNaN(v)) return { html: '<span class="perf-zero">—</span>', title: `${label}なし` };
  const num = Number(v);
  const cls = num >= PERF_HI ? 'perf-hi' : num <= PERF_LO ? 'perf-lo' : 'perf-zero';
  return {
    html: `<span class="${cls}">${num.toFixed(1)}</span>`,
    title: `${label}: ${num.toFixed(1)}（50=標準・高いほど良パフォーマンス・1単位=0.1秒）`,
  };
}

function perfLevelBadge(level, label) {
  if (!level || !label) return '';
  return `<span class="level-badge level-${level}">${label}</span>`;
}

const CLS_CSS = {
  'G1': 'cls-G1', 'G2': 'cls-G2', 'G3': 'cls-G3',
  'OP': 'cls-OP', 'L': 'cls-L',
  '3勝': 'cls-3', '2勝': 'cls-2', '1勝': 'cls-1',
  '未勝利': 'cls-msh', '新馬': 'cls-shm',
};
// Display labels — 3勝級 ではなく「3勝クラス級」が長すぎるので短縮表記
const CLS_DISP = {
  'G1': 'G1級', 'G2': 'G2級', 'G3': 'G3級',
  'OP': 'OP級', 'L': 'L級',
  '3勝': '3勝級', '2勝': '2勝級', '1勝': '1勝級',
  '未勝利': '未勝利級', '新馬': '新馬級',
};

function classLevelBadge(cls) {
  if (!cls) return '';
  const cssCls = CLS_CSS[cls] || 'cls-msh';
  const disp   = CLS_DISP[cls] || (cls + '級');
  const CLS_ORDER = ['新馬','未勝利','1勝','2勝','3勝','OP','L','G3','G2','G1'];
  const rank = CLS_ORDER.indexOf(cls);
  const title = rank >= 0
    ? `レースレベル: ${disp}（ペース補正済みタイムを${disp}基準と比較）`
    : '';
  return `<span class="cls-badge ${cssCls}" title="${title}">${disp}</span>`;
}

async function toggleHorsePanel(raceId, racePerfIndex) {
  const panelRow = document.getElementById(`hp-${raceId}`);
  if (!panelRow) return;
  const isOpen = panelRow.classList.contains('open');
  if (isOpen) { panelRow.classList.remove('open'); return; }
  panelRow.classList.add('open');
  const inner = document.getElementById(`hp-inner-${raceId}`);
  if (inner.dataset.loaded) return;
  inner.innerHTML = '<span style="font-size:12px;color:var(--text-dim)">読み込み中…</span>';
  try {
    const res = await fetch(`/api/track-speed/race-horses?race_id=${encodeURIComponent(raceId)}&race_perf=${racePerfIndex}`);
    const data = await res.json();
    if (data.error) { inner.innerHTML = `<span style="color:var(--err);font-size:12px">${data.error}</span>`; return; }
    inner.innerHTML = renderHorseTable(data.horses);
    inner.dataset.loaded = '1';
  } catch(e) {
    inner.innerHTML = '<span style="color:var(--err);font-size:12px">取得エラー</span>';
  }
}

function renderHorseTable(horses) {
  if (!horses || !horses.length) return '<span style="color:var(--text-dim);font-size:12px">データなし</span>';
  let html = '<table class="horse-table"><thead><tr>';
  ['着順','馬番','馬名','タイム','差(2着比)','PF指数','速度水準'].forEach(h => { html += `<th>${h}</th>`; });
  html += '</tr></thead><tbody>';
  horses.forEach(h => {
    const is1 = h.finish_position === 1, is2 = h.finish_position === 2;
    const rowCls = is1 ? 'row-1st' : is2 ? 'row-2nd' : '';
    const diffStr = is2 ? '<span style="color:var(--text-dim)">基準</span>'
      : h.time_diff > 0 ? `<span style="color:var(--err)">+${h.time_diff.toFixed(1)}</span>`
      : `<span style="color:#4ade80">${h.time_diff.toFixed(1)}</span>`;
    const pf = formatPerfIndex(h.horse_perf);
    const lvl = classLevelBadge(h.horse_class_level);
    html += `<tr${rowCls ? ` class="${rowCls}"` : ''}>`;
    html += `<td style="font-weight:700;color:${is1?'#fbbf24':is2?'var(--accent)':'var(--text-dim)'}">${h.finish_position}</td>`;
    html += `<td style="color:var(--text-dim)">${h.horse_number}</td>`;
    html += `<td style="font-weight:${is1||is2?'600':'400'}">${h.horse_name}</td>`;
    html += `<td style="font-variant-numeric:tabular-nums">${h.time_fmt}</td>`;
    html += `<td style="text-align:right">${diffStr}</td>`;
    html += `<td class="col-perf-h">${pf.html}</td>`;
    html += `<td style="text-align:center">${lvl || '<span style="color:var(--text-dim)">—</span>'}</td>`;
    html += '</tr>';
  });
  html += '</tbody></table>';
  return html;
}

function normalPdf(x) {
  return Math.exp(-0.5 * x * x) / Math.sqrt(2 * Math.PI);
}

function buildDistChart({ surface, indices, meanIndex, label, nRaces }) {
  const W = 380, H = 178;
  const pad = { l: 36, r: 14, t: 22, b: 50 };
  const plotW = W - pad.l - pad.r;
  const plotH = H - pad.t - pad.b;
  const raceStrip = 22;
  const curveH = plotH - raceStrip;
  const xMin = 30, xMax = 70;
  const x = idx => pad.l + ((Math.max(xMin, Math.min(xMax, idx)) - xMin) / (xMax - xMin)) * plotW;
  const yMax = normalPdf(0);
  const yFromZ = z => pad.t + curveH - (normalPdf(z) / yMax) * curveH;
  const baseY = pad.t + plotH;
  const raceY0 = baseY - 6;

  let curvePath = '';
  for (let i = 0; i <= 120; i++) {
    const idx = xMin + (xMax - xMin) * i / 120;
    const z = (BABA_BASE - idx) / BABA_STEP;
    const px = x(idx), py = yFromZ(z);
    curvePath += (i === 0 ? 'M' : 'L') + `${px.toFixed(1)},${py.toFixed(1)}`;
  }
  const curveArea = `${curvePath} L${x(xMax).toFixed(1)},${baseY} L${x(xMin).toFixed(1)},${baseY} Z`;

  const meanColor = indexColor(meanIndex);
  const mi = Math.max(xMin, Math.min(xMax, meanIndex));
  const mx = x(mi);
  const mz = (BABA_BASE - mi) / BABA_STEP;
  const my = yFromZ(mz);
  const surfCls = surface === '芝' ? 'turf' : 'dirt';

  const valid = indices.filter(v => v != null && !Number.isNaN(v));
  const slotCount = {};
  let raceDots = '';
  valid.forEach(idx => {
    const key = Math.round(idx * 4) / 4;
    const tier = slotCount[key] || 0;
    slotCount[key] = tier + 1;
    const px = x(idx);
    const py = raceY0 - tier * 9;
    const col = indexColor(idx);
    raceDots += `<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="4.5" fill="${col}" stroke="var(--bg)" stroke-width="1.2" opacity="0.95"><title>${idx.toFixed(1)}</title></circle>`;
  });

  const zBands = [
    { z0: -3, z1: -1.5, fill: 'rgba(239,68,68,0.06)' },
    { z0: -1.5, z1: -0.5, fill: 'rgba(249,115,22,0.06)' },
    { z0: -0.5, z1: 0.5, fill: 'rgba(163,163,163,0.05)' },
    { z0: 0.5, z1: 1.5, fill: 'rgba(59,130,246,0.06)' },
    { z0: 1.5, z1: 3, fill: 'rgba(139,92,246,0.06)' },
  ];
  let bandRects = '';
  zBands.forEach(b => {
    const i0 = BABA_BASE - b.z1 * BABA_STEP;
    const i1 = BABA_BASE - b.z0 * BABA_STEP;
    const x0 = x(Math.max(xMin, Math.min(xMax, i0)));
    const x1 = x(Math.max(xMin, Math.min(xMax, i1)));
    bandRects += `<rect x="${Math.min(x0, x1).toFixed(1)}" y="${pad.t}" width="${Math.abs(x1 - x0).toFixed(1)}" height="${curveH}" fill="${b.fill}"/>`;
  });

  const threshIdx = [35, 45, 55, 65];
  const threshLines = threshIdx.map(ti =>
    `<line x1="${x(ti)}" y1="${pad.t}" x2="${x(ti)}" y2="${baseY}" stroke="var(--border)" stroke-dasharray="3,4" opacity="0.5"/>`
  ).join('');
  const xTicks = [35, 45, 50, 55, 65];
  const tickY = baseY + 18;
  const xLabels = xTicks.map(ti =>
    `<text x="${x(ti)}" y="${tickY}" text-anchor="middle" fill="var(--text-dim)" font-size="10">${ti}</text>`
  ).join('');

  return `<div class="dist-card">
    <div class="dist-head">
      <span class="surface-tag ${surfCls}">${surface}</span>
      <span class="dist-title" style="color:${meanColor}">${label}</span>
      <span class="dist-meta">平均 ${meanIndex.toFixed(1)} · ${nRaces}R</span>
    </div>
    <svg class="dist-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="${surface}の馬場指数（正規分布）">
      ${bandRects}
      ${threshLines}
      <line x1="${x(50)}" y1="${pad.t}" x2="${x(50)}" y2="${baseY}" stroke="var(--text-dim)" stroke-width="1" opacity="0.4"/>
      <path d="${curveArea}" fill="${meanColor}" opacity="0.12"/>
      <path d="${curvePath}" fill="none" stroke="var(--text-dim)" stroke-width="1.6"/>
      <line x1="${pad.l}" y1="${baseY}" x2="${W - pad.r}" y2="${baseY}" stroke="var(--border)" opacity="0.6"/>
      ${raceDots}
      <line x1="${mx}" y1="${pad.t}" x2="${mx}" y2="${baseY}" stroke="${meanColor}" stroke-width="2"/>
      <circle cx="${mx}" cy="${my}" r="5.5" fill="${meanColor}" stroke="var(--bg)" stroke-width="1.5"/>
      <text x="${mx}" y="${pad.t - 6}" text-anchor="middle" fill="${meanColor}" font-size="10" font-weight="700">平均 ${meanIndex.toFixed(1)}</text>
      ${xLabels}
      <text x="${pad.l}" y="${tickY + 14}" fill="var(--text-dim)" font-size="9">遅い</text>
      <text x="${W - pad.r}" y="${tickY + 14}" text-anchor="end" fill="var(--text-dim)" font-size="9">速い</text>
    </svg>
    <p class="dist-caption">曲線＝標準正規分布（指数50＝μ・1σ＝10）。●は各レースの馬場指数。</p>
  </div>`;
}

function renderDistCharts(races, summary) {
  const el = document.getElementById('distCharts');
  const sumBySurf = {};
  Object.values(summary || {}).forEach(s => { sumBySurf[s.surface] = s; });
  const bySurf = { '芝': [], 'ダート': [] };
  races.forEach(r => {
    const key = r.surface === '芝' ? '芝' : 'ダート';
    if (bySurf[key]) bySurf[key].push(raceIndex(r));
  });
  const cards = ['芝', 'ダート']
    .filter(s => bySurf[s].length)
    .map(s => {
      const indices = bySurf[s];
      const sum = sumBySurf[s];
      const meanIndex = sum?.mean_index ?? indices.reduce((a, b) => a + b, 0) / indices.length;
      return buildDistChart({
        surface: s, indices, meanIndex,
        label: sum?.label ?? '—',
        nRaces: sum?.n_races ?? indices.length,
      });
    });
  if (!cards.length) {
    el.style.display = 'none';
    el.innerHTML = '';
    return;
  }
  el.innerHTML = `<div class="dist-row">${cards.join('')}</div>`;
  el.style.display = 'block';
}

// ─── Table Sort ──────────────────────────────────────────────────────────────
const CLASS_RANK = {
  '新馬': 0, '未勝利': 1, '1勝': 2, '2勝': 3, '3勝': 4,
  'OP': 5, 'L': 5, 'G3': 6, 'G2': 7, 'G1': 8,
};
const CLS_LEVEL_RANK = {
  '新馬': 0, '未勝利': 1, '1勝': 2, '2勝': 3, '3勝': 4,
  'OP': 5, 'L': 5, 'G3': 6, 'G2': 7, 'G1': 8,
};

let _dayRaces = [];
let _daySortCol = 'round', _daySortDir = 1;
let _catRaces = [];
let _catSortCol = 'date', _catSortDir = -1;

function _sortKey(r, col) {
  switch (col) {
    case 'round':    return r.round ?? 999;
    case 'dist_sort': return (r.distance ?? 0) + (r.surface === '芝' ? 0 : 100000);
    case 'class_band': return CLASS_RANK[r.class_band] ?? CLASS_RANK[r.grade] ?? -1;
    case 'cond_variant': return (r.cond_variant ?? r.track_condition ?? '');
    case 'pace_z':   return r.pace_z ?? null;
    case 'time_2nd': return r.time_2nd ?? null;
    case 'baba_index': {
      const bi = r.baba_index ?? (r.z != null ? zToIndex(r.z) : null);
      return bi ?? null;
    }
    case 'perf_index': return r.perf_index ?? null;
    case 'perf_index_std2000': return r.perf_index_std2000 ?? null;
    case 'level':    return r.level ?? null;
    case 'class_level': return CLS_LEVEL_RANK[r.class_level_label] ?? -1;
    case 'date':     return r.date ?? '';
    case 'venue':    return r.venue ?? '';
    default: return null;
  }
}

function sortRaces(races, col, dir) {
  if (!col) return races;
  return [...races].sort((a, b) => {
    const va = _sortKey(a, col), vb = _sortKey(b, col);
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    if (typeof va === 'string') return dir * va.localeCompare(vb, 'ja');
    return dir * (va - vb);
  });
}

function _thHtml(label, col, curCol, dir) {
  if (!col) return `<th>${label}</th>`;
  const active = curCol === col;
  const arrow = active ? (dir > 0 ? '▲' : '▼') : '▲';
  const cls = 'sortable' + (active ? (dir > 0 ? ' sort-asc' : ' sort-desc') : '');
  return `<th class="${cls}" data-col="${col}"><span>${label}</span><span class="sort-icon">${arrow}</span></th>`;
}

function toDateInput(yyyymmdd) {
  return `${yyyymmdd.slice(0, 4)}-${yyyymmdd.slice(4, 6)}-${yyyymmdd.slice(6, 8)}`;
}

function clearRaceView(msg) {
  const empty = document.getElementById('emptyState');
  const wrap = document.getElementById('raceTableWrap');
  if (empty) { empty.style.display = 'flex'; empty.querySelector('p').textContent = msg || empty.querySelector('p').textContent; }
  if (wrap) wrap.innerHTML = '';
  document.getElementById('statsRow').style.display = 'none';
  document.getElementById('distCharts').style.display = 'none';
}

async function updateVenuesForDate(autoLoad = true) {
  const dateEl = document.getElementById('datePick');
  const sel = document.getElementById('venuePick');
  if (!dateEl.value) {
    sel.innerHTML = '<option value="">日付を選択</option>';
    clearRaceView('日付を選択してください');
    return;
  }
  const d = dateEl.value.replace(/-/g, '');
  try {
    const res = await fetch(`/api/track-speed/venues?date=${d}`);
    const { venues, error } = await res.json();
    if (error) { showToast(error, 'error'); return; }
    const prev = sel.value;
    sel.innerHTML = '';
    if (!venues?.length) {
      sel.innerHTML = '<option value="">開催なし</option>';
      clearRaceView('この日のデータはありません');
      return;
    }
    venues.forEach(v => { sel.innerHTML += `<option value="${v}">${v}</option>`; });
    sel.value = venues.includes(prev) ? prev : venues[0];
    if (autoLoad) await loadDay();
  } catch (e) {
    console.error(e);
    showToast('会場一覧の取得に失敗しました', 'error');
  }
}

async function initMeta() {
  const dateEl = document.getElementById('datePick');
  const onDateChange = () => updateVenuesForDate(true);
  dateEl.addEventListener('change', onDateChange);
  dateEl.addEventListener('input', onDateChange);
  document.getElementById('venuePick').addEventListener('change', () => loadDay());

  const res = await fetch('/api/track-speed/meta');
  const meta = await res.json();
  if (!meta.baselines_ready) {
    showToast('基準データ未生成。「基準データ再構築」を実行してください', 'error');
  }
  const catVenueSel = document.getElementById('catVenuePick');
  (meta.venues || []).forEach(v => {
    catVenueSel.innerHTML += `<option value="${v}">${v}</option>`;
  });
  const dr = await fetch('/api/track-speed/dates');
  const dateJson = await dr.json();
  if (dateJson.error) {
    showToast(`日付一覧の取得に失敗: ${dateJson.error}（サーバー再起動をお試しください）`, 'error');
    const today = new Date().toISOString().slice(0, 10);
    dateEl.value = today;
    dateEl.min = '2020-01-01';
    dateEl.max = today;
    await updateVenuesForDate(true);
    return;
  }
  const { dates } = dateJson;
  if (dates?.length) {
    dateEl.value = toDateInput(dates[0]);
    dateEl.min = toDateInput(dates[dates.length - 1]);
    dateEl.max = toDateInput(dates[0]);
  }
  await updateVenuesForDate(true);
}

async function loadDay() {
  const dateEl = document.getElementById('datePick');
  const venue = document.getElementById('venuePick').value;
  if (!dateEl.value || !venue) {
    showToast('日付と競馬場を選択してください', 'error');
    return;
  }
  const d = dateEl.value.replace(/-/g, '');
  try {
    const res = await fetch(`/api/track-speed/day?date=${d}&venue=${encodeURIComponent(venue)}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.error) { showToast(data.error, 'error'); return; }
    renderDay(data);
  } catch (e) {
    console.error(e);
    showToast('レースデータの取得に失敗しました', 'error');
  }
}

const DAY_COLS = [
  ['R',        'round'],
  ['馬場速度',   'level'],
  ['レースレベル', 'class_level'],
  ['条件',      'dist_sort'],
  ['クラス',    'class_band'],
  ['レース名',  null],
  ['馬場',      'cond_variant'],
  ['前半ペース', 'pace_z'],
  ['2着',       'time_2nd'],
  ['馬場指数',   'baba_index'],
  ['PF指数',    'perf_index'],
  ['PF(2000m)', 'perf_index_std2000'],
];

function _dayTbodyHtml(sorted) {
  let html = '';
  sorted.forEach(r => {
    const idx = raceIndex(r);
    const t2 = fmtRaceTime(r.time_2nd);
    const cls = (r.grade || r.class_band || '').replace(/"/g, '&quot;');
    const cond = r.cond_variant || r.track_condition || '';
    const pace = formatPaceCell(r);
    const perf = formatPerfIndex(r.perf_index, 'PF指数');
    const perfStd = formatPerfIndex(r.perf_index_std2000, 'PF(2000m)');
    const lvlBadge = classLevelBadge(r.class_level_label);
    const rid = String(r.race_id || '');
    const rperf = r.perf_index != null ? r.perf_index : 'null';
    const spdTitle = r.label ? `馬場速度: ${r.label}（ペース補正タイムの z から 5 段階）` : '';
    html += `<tr class="${surfaceRowClass(r.surface)} race-clickable" onclick="toggleHorsePanel('${rid}',${rperf})">`;
    html += `<td class="col-r">${r.round}</td>`;
    html += `<td class="col-speed" title="${spdTitle.replace(/"/g, '&quot;')}"><span class="speed-label ${spdClass(r.level)}">${r.label || '—'}</span></td>`;
    html += `<td class="col-race-level">${lvlBadge || '—'}</td>`;
    html += `<td class="col-cond">${condLabel(r)}</td>`;
    html += `<td class="col-cls" title="${cls}">${r.grade || r.class_band || ''}</td>`;
    html += raceNameCell(r);
    html += `<td>${cond}</td>`;
    html += `<td class="col-pace" title="${pace.title.replace(/"/g, '&quot;')}">${pace.html}</td>`;
    html += `<td class="col-time">${t2}</td>`;
    html += `<td class="col-z" style="color:${indexColor(idx)}" title="50=標準・高いほど速い馬場">${idx != null ? idx.toFixed(1) : '—'}</td>`;
    html += `<td class="col-perf" title="${perf.title}">${perf.html}</td>`;
    html += `<td class="col-perf" title="${perfStd.title}">${perfStd.html}</td>`;
    html += '</tr>';
    html += `<tr class="horse-panel-row" id="hp-${rid}"><td class="horse-panel-cell" colspan="12"><div class="horse-panel-inner" id="hp-inner-${rid}"></div></td></tr>`;

}

function renderDayTable() {
  const wrap = document.getElementById('raceTableWrap');
  if (!wrap) return;
  const sorted = sortRaces(_dayRaces, _daySortCol, _daySortDir);
  let html = '<div style="overflow-x:auto"><table class="race-table" id="dayTable"><thead><tr>';
  DAY_COLS.forEach(([label, col]) => { html += _thHtml(label, col, _daySortCol, _daySortDir); });
  html += '</tr></thead><tbody>';
  html += _dayTbodyHtml(sorted);
  html += '</tbody></table></div>';
  wrap.innerHTML = html;
  document.getElementById('dayTable')?.addEventListener('click', e => {
    const th = e.target.closest('th.sortable');
    if (!th) return;
    const col = th.dataset.col;
    if (_daySortCol === col) { _daySortDir *= -1; } else { _daySortCol = col; _daySortDir = 1; }
    renderDayTable();
  });
}

function renderDay(data) {
  const empty = document.getElementById('emptyState');
  const wrap = document.getElementById('raceTableWrap');
  if (empty) empty.style.display = 'none';
  const sumRow = document.getElementById('statsRow');
  sumRow.style.display = 'flex';
  sumRow.innerHTML = '';
  Object.values(data.summary || {}).forEach(s => {
    const idx = s.mean_index != null ? s.mean_index : zToIndex(s.mean_z);
    const nOut = s.n_outliers ?? 0;
    const zStd = s.z_std != null ? Number(s.z_std).toFixed(2) : null;
    const conf = s.confidence ?? 'mid';
    const confColor = conf === 'high' ? 'var(--ok)' : conf === 'low' ? 'var(--warn)' : 'var(--text-dim)';
    const confLabel = conf === 'high' ? '安定' : conf === 'low' ? '不安定' : '';
    const outlierNote = nOut > 0 ? `<span style="color:var(--warn);margin-left:4px" title="外れ値レース数">⚠${nOut}</span>` : '';
    const stdNote = zStd ? `<span title="z得点の標準偏差（小さいほど一貫した馬場）">σ${zStd}</span>` : '';
    const confNote = confLabel ? `<span style="color:${confColor}">${confLabel}</span>` : '';
    const inliers = s.n_inliers ?? s.n_races;
    const priorSrc = s.n_prior_sources ?? 0;
    const poolNote = priorSrc > 0 ? `<span style="color:var(--text-dim);margin-left:4px" title="前日・前週データを加重プーリング済み">+前${priorSrc}日</span>` : '';
    sumRow.innerHTML += `<div class="stat-card">
      <div class="label">${s.surface}</div>
      <div class="value" style="color:${indexColor(idx)}">${s.label}</div>
      <div style="font-size:11px;color:var(--text-dim);margin-top:4px">指数 ${idx.toFixed(1)} · ${inliers}/${s.n_races}R ${outlierNote}${poolNote}</div>
      <div style="font-size:10px;color:var(--text-dim);display:flex;gap:6px;margin-top:2px">${stdNote}${confNote}</div>
    </div>`;
  });

  _dayRaces = (data.races || []).slice();
  _daySortCol = 'round'; _daySortDir = 1;
  if (!_dayRaces.length) {
    clearRaceView('該当レースなし');
    return;
  }
  renderDistCharts(_dayRaces, data.summary);
  renderDayTable();
}

let _pollTimer = null;
async function pollJob() {
  const banner = document.getElementById('jobBanner');
  const progress = document.getElementById('jobProgress');
  banner.style.display = 'block';
  const poll = async () => {
    const res = await fetch('/api/track-speed/status');
    const st = await res.json();
    if (st.progress?.length) {
      progress.innerHTML = st.progress.map(p => `<div>${p}</div>`).join('');
      progress.scrollTop = progress.scrollHeight;
    }
    if (st.status === 'done') {
      banner.style.display = 'none';
      showToast('処理完了', 'success');
      await initMeta();
      if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
      return;
    }
    if (st.status === 'error') {
      banner.style.display = 'none';
      showToast(st.error || 'エラー', 'error');
      if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
    }
  };
  if (_pollTimer) clearInterval(_pollTimer);
  _pollTimer = setInterval(poll, 2000);
  poll();
}

async function rebuildBaselines() {
  showToast('基準データ構築を開始…', 'info');
  await fetch('/api/track-speed/rebuild-baselines', { method: 'POST' });
  pollJob();
}

async function assignRaces() {
  showToast('2026年以降の振り分けを開始…', 'info');
  await fetch('/api/track-speed/assign?date_from=2026-01-01', { method: 'POST' });
  pollJob();
}

let _catOffset = 0;
const CAT_LIMIT = 20;

async function loadCategory(reset) {
  const venue = document.getElementById('catVenuePick').value;
  const level = document.getElementById('catLevelPick').value;
  if (!venue) { showToast('競馬場を選択してください', 'error'); return; }
  if (reset) _catOffset = 0;
  const surface = document.getElementById('catSurfacePick').value;
  const params = new URLSearchParams({ venue, level, offset: _catOffset, limit: CAT_LIMIT });
  if (surface) params.set('surface', surface);
  try {
    const res = await fetch(`/api/track-speed/by-category?${params}`);
    if (!res.ok) { showToast(`カテゴリ検索に失敗しました (HTTP ${res.status})`, 'error'); return; }
    const data = await res.json();
    if (data.error) { showToast(data.error, 'error'); return; }
    renderCategoryResults(data);
  } catch (e) {
    console.error(e);
    showToast('カテゴリ検索に失敗しました', 'error');
  }
}

function loadCategoryPage(dir) {
  _catOffset = Math.max(0, _catOffset + dir * CAT_LIMIT);
  loadCategory(false);
}

function renderCatTable() {
  const wrap = document.getElementById('catResults');
  if (!wrap || !_catRaces.length) return;
  let html = '<div style="overflow-x:auto"><table class="race-table" id="catTable"><thead><tr>';
  CAT_COLS.forEach(([label, col]) => { html += _thHtml(label, col, _catSortCol, _catSortDir); });

  html += _catTbodyHtml(sortRaces(_catRaces, _catSortCol, _catSortDir));
  html += '</tbody></table></div>';
  wrap.innerHTML = html;
  document.getElementById('catTable')?.addEventListener('click', e => {
    const th = e.target.closest('th.sortable');
    if (!th) return;
    const col = th.dataset.col;
    if (_catSortCol === col) { _catSortDir *= -1; } else { _catSortCol = col; _catSortDir = 1; }
    renderCatTable();
  });
}

function renderCategoryResults(data) {
  const wrap = document.getElementById('catResults');
  const pag = document.getElementById('catPagination');
  const info = document.getElementById('catPageInfo');
  const prevBtn = document.getElementById('catPrevBtn');
  const nextBtn = document.getElementById('catNextBtn');

  if (!data.races || !data.races.length) {
    wrap.innerHTML = '<div class="cat-empty">該当レースが見つかりませんでした</div>';
    pag.style.display = 'none';
    return;
  }

  const from = data.offset + 1;
  const to = Math.min(data.offset + data.races.length, data.total);
  info.textContent = `${from}–${to} 件 / 全 ${data.total} 件`;
  prevBtn.disabled = data.offset === 0;
  nextBtn.disabled = data.offset + CAT_LIMIT >= data.total;
  pag.style.display = 'flex';

  _catRaces = (data.races || []).slice();
  if (data.offset === 0) { _catSortCol = 'date'; _catSortDir = -1; }
  renderCatTable();
}
