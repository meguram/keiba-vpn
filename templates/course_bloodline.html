<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コース特性 × 血統適性 | ML-AutoPilot Keiba</title>
<style>
:root {
  --bg:#0a0e17;--sf:#131926;--sf2:#1a2235;--sf3:#212d42;
  --bd:#243049;--tx:#c8d6e5;--txd:#6b7d95;--txb:#edf2f7;
  --ac:#06b6d4;--acd:rgba(6,182,212,.15);
  --bl:#3b82f6;--gn:#22c55e;--yl:#f59e0b;--rd:#ef4444;--pp:#a78bfa;--pk:#ec4899;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;}
.top-bar{display:flex;align-items:center;gap:16px;padding:16px 24px;border-bottom:1px solid var(--bd);background:var(--sf);}
.top-bar a{color:var(--txd);font-size:13px;text-decoration:none;}
.top-bar a:hover{color:var(--ac);}
.top-bar h1{font-size:20px;font-weight:700;flex:1;}
.container{max-width:1600px;margin:0 auto;padding:20px 24px;}
.controls{display:flex;flex-wrap:wrap;gap:12px;align-items:end;background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:16px 20px;margin-bottom:20px;}
.cf{display:flex;flex-direction:column;gap:4px;}
.cf label{font-size:11px;color:var(--txd);text-transform:uppercase;letter-spacing:.5px;font-weight:500;}
.cf input{background:var(--sf2);border:1px solid var(--bd);border-radius:6px;color:var(--tx);padding:7px 12px;font-size:13px;}
.cf input:focus{outline:none;border-color:var(--ac);}
.btn{background:var(--ac);color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;}
.btn:hover{opacity:.85;}.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-out{background:transparent;border:1px solid var(--bd);color:var(--tx);border-radius:8px;padding:8px 16px;font-size:12px;cursor:pointer;}
.btn-out:hover{border-color:var(--ac);color:var(--ac);}

.status-bar{display:flex;align-items:center;gap:10px;padding:8px 16px;background:var(--sf2);border-radius:8px;margin-bottom:20px;font-size:13px;}
.spinner{width:16px;height:16px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.hidden{display:none!important;}

.stats{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:20px;}
.sb{background:var(--sf2);border-radius:10px;padding:14px 18px;flex:1;min-width:120px;}
.sb .l{font-size:10px;color:var(--txd);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}
.sb .v{font-size:20px;font-weight:700;}

.tabs{display:flex;gap:4px;margin-bottom:20px;overflow-x:auto;}
.tab{padding:8px 18px;border-radius:8px 8px 0 0;font-size:13px;font-weight:500;cursor:pointer;background:var(--sf);border:1px solid var(--bd);border-bottom:none;color:var(--txd);white-space:nowrap;transition:all .15s;}
.tab:hover{color:var(--tx);}.tab.active{background:var(--sf2);color:var(--ac);border-color:var(--ac);}
.panel{background:var(--sf);border:1px solid var(--bd);border-radius:0 12px 12px 12px;padding:20px;min-height:400px;}

.radar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:16px;}
.rc{background:var(--sf2);border-radius:10px;padding:16px;}
.rc h4{font-size:14px;margin-bottom:2px;}
.rc .meta{font-size:11px;color:var(--txd);margin-bottom:10px;}
.br{display:flex;align-items:center;gap:6px;margin:3px 0;}
.br .bl{font-size:10px;color:var(--txd);min-width:50px;}
.bbg{flex:1;height:12px;background:var(--sf3);border-radius:3px;overflow:hidden;}
.bf{height:100%;border-radius:3px;transition:width .4s;}
.br .bv{font-size:10px;min-width:24px;text-align:right;}

.scroll-x{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;font-size:10px;color:var(--txd);text-transform:uppercase;letter-spacing:.5px;padding:8px 6px;border-bottom:1px solid var(--bd);}
td{padding:7px 6px;border-bottom:1px solid rgba(36,48,73,.3);}
tr:hover{background:rgba(6,182,212,.03);}
.hc{display:inline-block;min-width:44px;padding:2px 6px;border-radius:4px;font-weight:600;text-align:center;font-size:11px;}
.cg{background:rgba(34,197,94,.12);color:var(--gn);}
.cy{background:rgba(245,158,11,.1);color:var(--yl);}
.cr{background:rgba(239,68,68,.08);color:var(--rd);}
.mini{height:10px;background:var(--sf3);border-radius:3px;overflow:hidden;width:60px;display:inline-block;vertical-align:middle;}
.mini>div{height:100%;border-radius:3px;}
.mv{font-size:10px;color:var(--txd);margin-left:4px;}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--acd);color:var(--ac);}

.empty{text-align:center;padding:60px 20px;color:var(--txd);font-size:14px;}
.notes{background:var(--sf2);border-radius:8px;padding:14px;font-size:12px;color:var(--txd);margin-top:12px;}
.notes li{margin:4px 0;}
@media(max-width:900px){.controls,.stats{flex-direction:column;}.radar-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
{% include '_nav.html' %}
<div class="top-bar">
  <h1>🏟️ コース特性 × 血統適性</h1>
</div>
<div class="container">
  <div class="controls">
    <div class="cf">
      <label>対象年度 (カンマ区切り / 空=全年)</label>
      <input id="years" type="text" placeholder="2020,2021,2022,2023,2024,2025" style="min-width:280px">
    </div>
    <button class="btn" id="btnRun" onclick="runAnalysis()">分析実行</button>
    <button class="btn-out" onclick="loadExisting()">既存結果を表示</button>
    <button class="btn-out" onclick="showProfiles()">コースプロファイルのみ表示</button>
  </div>

  <div class="status-bar hidden" id="sBar"><div class="spinner" id="sSpin"></div><span id="sTxt">分析中...</span></div>

  <div class="stats hidden" id="statsRow">
    <div class="sb"><div class="l">出走データ</div><div class="v" id="stR">-</div></div>
    <div class="sb"><div class="l">種牡馬数</div><div class="v" id="stS">-</div></div>
    <div class="sb"><div class="l">競馬場数</div><div class="v" id="stV">-</div></div>
  </div>

  <div class="tabs hidden" id="tabsRow">
    <div class="tab active" data-t="profiles">コースプロファイル</div>
    <div class="tab" data-t="heatmap">競馬場×種牡馬</div>
    <div class="tab" data-t="aptitude">コース適性スコア</div>
    <div class="tab" data-t="optimal">最適条件</div>
    <div class="tab" data-t="trackcond">馬場×血統</div>
    <div class="tab" data-t="drawbl">枠順×血統</div>
    <div class="tab" data-t="fcdraw">初角距離×枠順×血統</div>
    <div class="tab" data-t="grasstype">芝種別×血統</div>
  </div>

  <div id="panels" class="hidden">
    <div class="panel" id="p-profiles"></div>
    <div class="panel hidden" id="p-heatmap"></div>
    <div class="panel hidden" id="p-aptitude"></div>
    <div class="panel hidden" id="p-optimal"></div>
    <div class="panel hidden" id="p-trackcond"></div>
    <div class="panel hidden" id="p-drawbl"></div>
    <div class="panel hidden" id="p-fcdraw"></div>
    <div class="panel hidden" id="p-grasstype"></div>
  </div>

  <div class="empty" id="emptyState">
    <p style="font-size:32px;margin-bottom:12px">🏟️</p>
    <p>「分析実行」で新規分析を開始、「コースプロファイルのみ表示」でドメインナレッジを確認できます。</p>
  </div>
</div>

<script>
function formatCourseLabel(key) {
  const surface = key.startsWith('turf_') ? '芝' : key.startsWith('dirt_') ? 'ダ' : '';
  const rest = key.replace(/^(turf|dirt)_/, '');
  const m = rest.match(/^(\d+)(?:_(int|ext|straight))?$/);
  if (!m) return key;
  const dist = m[1];
  const variant = m[2];
  const suffix = variant === 'int' ? '(内)' : variant === 'ext' ? '(外)' : variant === 'straight' ? '(直)' : '';
  return `${surface}${dist}m${suffix}`;
}

const TL={stamina_demand:'スタミナ',power_demand:'パワー',speed_sustain:'持続力',acceleration:'瞬発力',agility:'器用さ',track_bias_inner:'内枠○',front_runner_advantage:'先行○'};
const TC={stamina_demand:'#ef4444',power_demand:'#f59e0b',speed_sustain:'#22c55e',acceleration:'#3b82f6',agility:'#a78bfa',track_bias_inner:'#06b6d4',front_runner_advantage:'#ec4899'};
const TK=Object.keys(TL);

document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  document.querySelectorAll('[id^="p-"]').forEach(p=>p.classList.add('hidden'));
  document.getElementById('p-'+t.dataset.t).classList.remove('hidden');
}));

async function runAnalysis(){
  const btn=document.getElementById('btnRun'); btn.disabled=true;
  const yi=document.getElementById('years').value.trim();
  const years=yi?yi.split(',').map(y=>y.trim()).filter(Boolean):null;
  showSt('分析開始中...');
  try{
    await fetch('/api/course-bloodline/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({years})});
    showSt('分析実行中... (数分かかります)');
    await poll();
  }catch(e){showSt('エラー: '+e.message,true);}
  finally{btn.disabled=false;}
}

async function poll(){
  const t0=Date.now();
  while((Date.now()-t0)/1e3<600){
    await sleep(3000);
    try{
      const r=await(await fetch('/api/course-bloodline/status')).json();
      if(!r.running){
        if(r.error){showSt('エラー: '+r.error,true);return;}
        hideSt();
        if(r.result)showStats(r.result);
        await loadAll();return;
      }
      showSt(`分析実行中... (${Math.round((Date.now()-t0)/1e3)}秒)`);
    }catch(e){}
  }
  showSt('タイムアウト',true);
}

async function loadExisting(){
  showSt('読み込み中...');
  try{
    const r=await(await fetch('/api/course-bloodline/status')).json();
    if(r.result)showStats(r.result);
    await loadAll();hideSt();
  }catch(e){showSt('読み込み失敗',true);}
}

async function showProfiles(){
  document.getElementById('emptyState').classList.add('hidden');
  document.getElementById('tabsRow').classList.remove('hidden');
  document.getElementById('panels').classList.remove('hidden');
  await loadProfiles();
}

function showStats(r){
  document.getElementById('statsRow').classList.remove('hidden');
  document.getElementById('stR').textContent=(r.n_records||0).toLocaleString();
  document.getElementById('stS').textContent=(r.n_sires||0).toLocaleString();
  document.getElementById('stV').textContent=(r.n_venues||0).toLocaleString();
}

async function loadAll(){
  document.getElementById('emptyState').classList.add('hidden');
  document.getElementById('tabsRow').classList.remove('hidden');
  document.getElementById('panels').classList.remove('hidden');
  await Promise.all([loadProfiles(),loadHeatmap(),loadAptitude(),loadOptimal(),loadTrackCond(),loadDrawBl(),loadFcDraw(),loadGrassType()]);
}

// ── Profiles ──
async function loadProfiles(){
  const p=document.getElementById('p-profiles');
  try{
    const d=await(await fetch('/api/course-profiles')).json();
    if(d.error){p.innerHTML=`<div class="empty">${d.error}</div>`;return;}
    const venues=d.venues||{};
    let html='<h3 style="margin-bottom:12px">JRA全10場 コース特性レーダー — 芝種・仮柵・枠順バイアス</h3><div class="radar-grid">';
    for(const code of Object.keys(venues).sort()){
      const v=venues[code];
      const t=v.traits||{};
      let bars='';
      for(const k of TK){
        const val=t[k]||0; const w=val/10*100;
        bars+=`<div class="br"><span class="bl">${TL[k]}</span><div class="bbg"><div class="bf" style="width:${w}%;background:${TC[k]}"></div></div><span class="bv">${val}</span></div>`;
      }
      const chars=(v.characteristics||[]).map(c=>`<li>${c}</li>`).join('');
      const blt=v.bloodline_tendency||{};
      const favored=(blt.favored_types||[]).map(t=>`<span style="color:var(--gn);font-size:11px">● ${t}</span>`).join(' ');
      const unfavored=(blt.unfavored_types||[]).map(t=>`<span style="color:var(--rd);font-size:11px">✕ ${t}</span>`).join(' ');

      const gi=v.grass_info||{};
      const grassBase=gi.base_type||v.grass_type||'';
      const grassSv=gi.seasonal_variation;
      let grassHtml='';
      if(gi.schedule){
        grassHtml='<div style="margin-top:6px;font-size:10px;border-left:2px solid var(--yl);padding-left:8px">';
        grassHtml+=`<div style="color:var(--yl);font-weight:600;margin-bottom:2px">🌱 芝種: ${grassBase}${grassSv?' (季節変動あり)':''}</div>`;
        for(const s of gi.schedule){
          const ms=s.months.map(m=>m+'月').join(',');
          grassHtml+=`<div style="color:var(--txd)"><strong>${ms}</strong>: ${s.type} — ${s.condition}</div>`;
        }
        if(gi.note) grassHtml+=`<div style="color:var(--txd);font-style:italic;margin-top:2px">${gi.note}</div>`;
        grassHtml+='</div>';
      } else {
        grassHtml=`<div style="margin-top:6px;font-size:10px;color:var(--yl)">🌱 芝種: ${grassBase} (通年)</div>`;
      }

      const rp=v.rail_positions||{};
      let railHtml='';
      if(rp.available&&rp.available.length){
        railHtml='<div style="margin-top:6px;font-size:10px;border-left:2px solid var(--pp);padding-left:8px">';
        railHtml+=`<div style="color:var(--pp);font-weight:600;margin-bottom:2px">🔀 仮柵: ${rp.available.join('/')}</div>`;
        for(const ts of (rp.typical_schedule||[])){
          railHtml+=`<div style="color:var(--txd)"><strong>${ts.weeks}</strong>: ${ts.position}コース — ${ts.note}</div>`;
        }
        if(rp.note) railHtml+=`<div style="color:var(--txd);font-style:italic;margin-top:2px">${rp.note}</div>`;
        railHtml+='</div>';
      }

      const db=v.draw_bias||{};
      let drawHtml='';
      if(Object.keys(db).length){
        drawHtml='<div style="margin-top:6px;font-size:10px;border-left:2px solid var(--bl);padding-left:8px">';
        drawHtml+='<div style="color:var(--bl);font-weight:600;margin-bottom:2px">🎰 枠順バイアス</div>';
        for(const[dist,bias] of Object.entries(db)){
          const label=formatCourseLabel(dist);
          const inner=bias.inner_1_4, outer=bias.outer_9_plus;
          const fcm=bias.first_corner_m;
          const corners=bias.corners;
          let tag='',color='var(--txd)';
          if(inner>1.08){tag='内枠有利';color='var(--gn)';}
          else if(outer>1.08){tag='外枠有利';color='var(--rd)';}
          else{tag='フラット';color='var(--txd)';}
          const fcInfo=fcm!=null?` [初角${fcm}m`+(corners!=null?`/コーナー${corners}回`:'')+ ']':'';
          const startInfo=bias.start_pos?` ${bias.start_pos}`:'';
          drawHtml+=`<div><strong>${label}</strong>: <span style="color:${color}">${tag}</span> <span style="color:var(--txd)">(内${inner} / 外${outer})</span><span style="color:var(--cy);font-size:9px">${fcInfo}</span>${startInfo?`<span style="color:var(--txd);font-size:9px"> ${startInfo}</span>`:''}</div>`;
        }
        drawHtml+='</div>';
      }

      html+=`<div class="rc">
        <h4>${v.name} (${v.name_en})</h4>
        <div class="meta">${v.direction} / ${grassBase} / ${v.course_shape} / 直線${v.turf_straight_m}m / 坂${v.slope_height_m}m (${v.slope_type})</div>
        ${bars}
        <div style="margin-top:8px;font-size:11px;color:var(--txd)"><ul style="padding-left:16px">${chars}</ul></div>
        <div style="margin-top:6px">${favored}</div>
        <div>${unfavored}</div>
        ${blt.grass_specific?`<div style="margin-top:4px;font-size:11px;color:var(--yl);font-style:italic">🌱 ${blt.grass_specific}</div>`:''}
        ${blt.note?`<div style="margin-top:2px;font-size:11px;color:var(--txd);font-style:italic">${blt.note}</div>`:''}
        ${grassHtml}
        ${railHtml}
        ${drawHtml}
      </div>`;
    }
    html+='</div>';
    p.innerHTML=html;
  }catch(e){p.innerHTML='<div class="empty">プロファイル読込失敗</div>';}
}

// ── Heatmap ──
async function loadHeatmap(){
  const p=document.getElementById('p-heatmap');
  try{
    const d=await(await fetch('/api/course-bloodline/data/venue_sire')).json();
    if(d.error){p.innerHTML=`<div class="empty">${d.error}</div>`;return;}
    const cols=d.columns.filter(c=>c!=='');
    let html='<h3 style="margin-bottom:12px">競馬場 × 種牡馬 複勝率</h3><div class="scroll-x"><table><thead><tr><th>種牡馬</th>';
    for(const c of cols)html+=`<th>${c}</th>`;
    html+='</tr></thead><tbody>';
    for(const row of d.rows.slice(0,40)){
      const sire=row[''||Object.keys(row)[0]]||Object.values(row)[0];
      html+=`<tr><td><strong>${sire}</strong></td>`;
      for(const c of cols){
        const v=parseFloat(row[c]);
        if(isNaN(v)){html+='<td>-</td>';continue;}
        const pct=(v*100).toFixed(1);
        const cls=pct>=35?'cg':(pct>=25?'cy':'cr');
        html+=`<td><span class="hc ${cls}">${pct}%</span></td>`;
      }
      html+='</tr>';
    }
    html+='</tbody></table></div>';
    p.innerHTML=html;
  }catch(e){p.innerHTML='<div class="empty">ヒートマップ読込失敗</div>';}
}

// ── Aptitude ──
async function loadAptitude(){
  const p=document.getElementById('p-aptitude');
  try{
    const d=await(await fetch('/api/course-bloodline/data/aptitude')).json();
    if(d.error){p.innerHTML=`<div class="empty">${d.error}</div>`;return;}
    let html='<h3 style="margin-bottom:12px">種牡馬コース適性スコア — 得意な特性を定量化</h3><div class="scroll-x"><table><thead><tr><th>種牡馬</th><th>出走</th><th>複勝率</th>';
    for(const k of TK)html+=`<th>${TL[k]}</th>`;
    html+='<th>最適特性</th></tr></thead><tbody>';
    for(const r of d.rows.slice(0,50)){
      const t3=(parseFloat(r.overall_top3_rate)*100).toFixed(1);
      let cells=`<td><strong>${r.sire}</strong></td><td>${parseInt(r.total_runs).toLocaleString()}</td><td>${t3}%</td>`;
      for(const k of TK){
        const v=parseFloat(r['apt_'+k])||5;
        const w=v/10*100;
        cells+=`<td><div class="mini"><div style="width:${w}%;background:${TC[k]}"></div></div><span class="mv">${v.toFixed(1)}</span></td>`;
      }
      const bt=TL[r.best_trait]||r.best_trait||'';
      cells+=`<td><span class="badge">${bt}</span></td>`;
      html+=`<tr>${cells}</tr>`;
    }
    html+='</tbody></table></div>';
    html+=`<div class="notes"><strong>読み方:</strong><ul>
      <li>スコアが高い特性 = その種牡馬が「得意とするコース特性」</li>
      <li>パワー高 → 坂のあるコース (中山・阪神) で好成績</li>
      <li>瞬発力高 → 直線が長いコース (新潟・東京・京都) で好成績</li>
      <li>器用さ高 → 小回りコース (函館・札幌・小倉) で好成績</li>
    </ul></div>`;
    p.innerHTML=html;
  }catch(e){p.innerHTML='<div class="empty">適性データ読込失敗</div>';}
}

// ── Optimal ──
async function loadOptimal(){
  const p=document.getElementById('p-optimal');
  try{
    const d=await(await fetch('/api/course-bloodline/data/optimal')).json();
    if(d.error){p.innerHTML=`<div class="empty">${d.error}</div>`;return;}
    let html='<h3 style="margin-bottom:12px">種牡馬の最適レース条件推定</h3><div class="scroll-x"><table><thead><tr><th>種牡馬</th><th>出走</th><th>複勝率</th><th>最適競馬場</th><th>場複勝</th><th>最適距離帯</th><th>加重ベスト距離</th><th>最適馬場</th><th>最強コンボ</th></tr></thead><tbody>';
    for(const r of d.rows.slice(0,50)){
      const t3=(parseFloat(r.overall_top3)*100).toFixed(1);
      const vt3=(parseFloat(r.best_venue_top3)*100).toFixed(1);
      html+=`<tr>
        <td><strong>${r.sire}</strong></td>
        <td>${parseInt(r.total_runs).toLocaleString()}</td>
        <td>${t3}%</td>
        <td style="font-weight:600">${r.best_venue}</td>
        <td style="color:var(--gn)">${vt3}%</td>
        <td>${r.best_distance_cat}</td>
        <td style="font-weight:600">${parseInt(r.weighted_best_dist_m).toLocaleString()}m</td>
        <td>${r.best_track_cond}</td>
        <td style="color:var(--ac);font-weight:600">${r.best_combo}</td>
      </tr>`;
    }
    html+='</tbody></table></div>';
    p.innerHTML=html;
  }catch(e){p.innerHTML='<div class="empty">最適条件データ読込失敗</div>';}
}

// ── Track Condition ──
async function loadTrackCond(){
  const p=document.getElementById('p-trackcond');
  try{
    const d=await(await fetch('/api/course-bloodline/data/track_condition')).json();
    if(d.error){p.innerHTML=`<div class="empty">${d.error}</div>`;return;}
    const bySire={};
    for(const r of d.rows){
      if(!bySire[r.sire])bySire[r.sire]=[];
      bySire[r.sire].push(r);
    }
    let html='<h3 style="margin-bottom:12px">馬場状態 × 血統 — 成績変動</h3><p style="color:var(--txd);font-size:12px;margin-bottom:16px">Δ (デルタ) = その馬場条件での複勝率 − 全体平均複勝率。正なら得意、負なら苦手。</p>';
    html+='<div class="scroll-x"><table><thead><tr><th>種牡馬</th><th>条件</th><th>出走数</th><th>複勝率</th><th>全体平均</th><th>Δ</th><th></th></tr></thead><tbody>';
    let count=0;
    for(const[sire,rows] of Object.entries(bySire)){
      if(count>150)break;
      const sorted=[...rows].sort((a,b)=>parseFloat(b.delta)-parseFloat(a.delta));
      for(const r of sorted){
        const t3=(parseFloat(r.top3_rate)*100).toFixed(1);
        const base=(parseFloat(r.baseline_top3)*100).toFixed(1);
        const delta=(parseFloat(r.delta)*100).toFixed(1);
        const dc=parseFloat(delta)>=0?'var(--gn)':'var(--rd)';
        const sign=parseFloat(delta)>=0?'+':'';
        const w=Math.min(Math.abs(parseFloat(delta))/10*100,100);
        const bgc=parseFloat(delta)>=0?'var(--gn)':'var(--rd)';
        html+=`<tr>
          <td><strong>${r.sire}</strong></td>
          <td>${r.condition_label||r.surface+'・'+r.track_condition}</td>
          <td>${r.count}</td>
          <td style="font-weight:600">${t3}%</td>
          <td style="color:var(--txd)">${base}%</td>
          <td style="color:${dc};font-weight:700">${sign}${delta}%</td>
          <td style="min-width:80px"><div class="mini"><div style="width:${w}%;background:${bgc}"></div></div></td>
        </tr>`;
        count++;
      }
    }
    html+='</tbody></table></div>';
    p.innerHTML=html;
  }catch(e){p.innerHTML='<div class="empty">馬場×血統データ読込失敗</div>';}
}

function hideSt(){document.getElementById('sBar').classList.add('hidden');}

// ── Draw × Bloodline ──
async function loadDrawBl(){
  const p=document.getElementById('p-drawbl');
  try{
    const d=await(await fetch('/api/course-bloodline/data/draw_summary')).json();
    if(d.error){p.innerHTML=`<div class="empty">${d.error}</div>`;return;}
    let html='<h3 style="margin-bottom:12px">枠順バイアス × 血統 — 内枠/外枠の得意不得意</h3>';
    html+=`<p style="color:var(--txd);font-size:12px;margin-bottom:16px">内外差 (inner_outer_gap) = 内枠での複勝率 − 外枠での複勝率。正なら内枠得意、負なら外枠得意。</p>`;
    html+='<div class="scroll-x"><table><thead><tr><th>種牡馬</th><th>内枠 複勝率</th><th>中枠 複勝率</th><th>外枠 複勝率</th><th>内外差</th><th></th><th>傾向</th></tr></thead><tbody>';
    for(const row of d.rows.slice(0,60)){
      const sire=row[''||Object.keys(row)[0]]||Object.values(row)[0];
      const inner=parseFloat(row.inner); const mid=parseFloat(row.middle); const outer=parseFloat(row.outer);
      const gap=parseFloat(row.inner_outer_gap);
      const gc=gap>=0?'var(--gn)':'var(--rd)';
      const sign=gap>=0?'+':'';
      const fmt=v=>isNaN(v)?'-':(v*100).toFixed(1)+'%';
      let label='',lc='var(--txd)';
      if(gap>0.05){label='🟢 内枠巧者';lc='var(--gn)';}
      else if(gap<-0.05){label='🔴 外枠巧者';lc='var(--rd)';}
      else{label='⚪ フラット';lc='var(--txd)';}
      const w=Math.min(Math.abs(gap)/0.15*100,100);
      const bgc=gap>=0?'var(--gn)':'var(--rd)';
      html+=`<tr>
        <td><strong>${sire}</strong></td>
        <td>${fmt(inner)}</td><td>${fmt(mid)}</td><td>${fmt(outer)}</td>
        <td style="color:${gc};font-weight:700">${sign}${(gap*100).toFixed(1)}%</td>
        <td style="min-width:80px"><div class="mini"><div style="width:${w}%;background:${bgc}"></div></div></td>
        <td style="color:${lc};font-weight:600">${label}</td>
      </tr>`;
    }
    html+='</tbody></table></div>';
    html+=`<div class="notes"><strong>読み方:</strong><ul>
      <li>内枠巧者 = 小回り・短距離で好成績を出しやすい血統 (器用さ・先行力が高い)</li>
      <li>外枠巧者 = 直線の長いコースで外を回しても差しが利く血統 (末脚の切れ味が高い)</li>
      <li>フラット = 枠順に左右されにくい万能血統</li>
      <li>仮柵がA→C/Dに移動すると内枠有利度が低下し、外枠巧者に有利な馬場になる</li>
    </ul></div>`;
    p.innerHTML=html;
  }catch(e){p.innerHTML='<div class="empty">枠順×血統データ読込失敗</div>';}
}

// ── First Corner Distance × Draw × Bloodline ──
async function loadFcDraw(){
  const p=document.getElementById('p-fcdraw');
  try{
    const d=await(await fetch('/api/course-bloodline/data/fc_draw_summary')).json();
    if(d.error){p.innerHTML=`<div class="empty">${d.error}</div>`;return;}
    const bands=['very_short','short','medium','long','very_long'];
    const bandLabels={very_short:'~250m',short:'250~400m',medium:'400~550m',long:'550~700m',very_long:'700m~'};
    const bandIcons={very_short:'🔴',short:'🟠',medium:'🟡',long:'🟢',very_long:'🔵'};
    let html='<h3 style="margin-bottom:12px">初角距離 × 枠順 × 血統 — 距離別ドローバイアス感受性</h3>';
    html+=`<p style="color:var(--txd);font-size:12px;margin-bottom:16px">初角までの距離が短いほど内枠有利。「枠順感受性」(draw_sensitivity) が高い種牡馬は初角が短いコースで特に内枠を引きたい血統。</p>`;
    html+='<div class="scroll-x"><table><thead><tr><th>種牡馬</th><th>出走数</th>';
    for(const b of bands){
      html+=`<th colspan="3" style="text-align:center;color:var(--ac)">${bandIcons[b]} ${bandLabels[b]}</th>`;
    }
    html+='<th>枠順感受性</th><th>タイプ</th></tr><tr><th></th><th></th>';
    for(let i=0;i<bands.length;i++){
      html+='<th style="font-size:9px">内枠率</th><th style="font-size:9px">外枠率</th><th style="font-size:9px">内外差</th>';
    }
    html+='<th></th><th></th></tr></thead><tbody>';

    for(const row of d.rows.slice(0,60)){
      html+=`<tr><td><strong>${row.sire}</strong></td><td>${parseInt(row.total||0).toLocaleString()}</td>`;
      for(const b of bands){
        const ir=parseFloat(row[b+'_inner_rate']);
        const or2=parseFloat(row[b+'_outer_rate']);
        const gap=parseFloat(row[b+'_gap']);
        const fmtR=v=>isNaN(v)?'<span style="color:var(--txd)">-</span>':`${(v*100).toFixed(1)}%`;
        html+=`<td>${fmtR(ir)}</td><td>${fmtR(or2)}</td>`;
        if(!isNaN(gap)){
          const gc=gap>=0?'var(--gn)':'var(--rd)';
          const sign=gap>=0?'+':'';
          html+=`<td style="color:${gc};font-weight:700;font-size:11px">${sign}${(gap*100).toFixed(1)}%</td>`;
        }else{html+='<td style="color:var(--txd)">-</td>';}
      }
      const ds=parseFloat(row.draw_sensitivity);
      if(!isNaN(ds)){
        const dsc=ds>=0.05?'var(--rd)':(ds<=-0.05?'var(--gn)':'var(--txd)');
        const dsSign=ds>=0?'+':'';
        html+=`<td style="color:${dsc};font-weight:700">${dsSign}${(ds*100).toFixed(1)}%</td>`;
      }else{html+='<td style="color:var(--txd)">-</td>';}

      let typeLabel='',typeColor='var(--txd)';
      const vsGap=parseFloat(row.very_short_gap);
      const lGap=parseFloat(row.long_gap);
      if(!isNaN(ds)){
        if(ds>0.05){typeLabel='🔴 内枠依存型';typeColor='var(--rd)';}
        else if(ds<-0.05){typeLabel='🔵 外枠巧者型';typeColor='var(--bl)';}
        else{typeLabel='⚪ 枠不問型';typeColor='var(--txd)';}
      }else{typeLabel='-';}
      html+=`<td style="color:${typeColor};font-weight:600;font-size:11px">${typeLabel}</td></tr>`;
    }
    html+='</tbody></table></div>';
    html+=`<div class="notes"><strong>読み方:</strong><ul>
      <li>🔴 内枠依存型 = 初角が短いコースでは内枠が必須。外枠だと成績が大きく低下</li>
      <li>🔵 外枠巧者型 = 初角が短いコースでも外枠から好走可能。先行力・機動力が高い</li>
      <li>⚪ 枠不問型 = 初角距離に関わらず枠順の影響が小さい万能型</li>
      <li>「枠順感受性」= 初角~250mでの内外差 − 初角550m~での内外差。大きいほど初角距離に敏感</li>
      <li>例: 中山芝1200m (初角200m) は内枠依存型にとって最も有利なコース</li>
      <li>例: 新潟芝2000m外 (初角1000m) は枠順の影響がほとんどない</li>
    </ul></div>`;
    p.innerHTML=html;
  }catch(e){p.innerHTML='<div class="empty">初角距離×枠順×血統データ読込失敗</div>';}
}

// ── Grass Type × Bloodline ──
async function loadGrassType(){
  const p=document.getElementById('p-grasstype');
  try{
    const d=await(await fetch('/api/course-bloodline/data/grass_summary')).json();
    if(d.error){p.innerHTML=`<div class="empty">${d.error}</div>`;return;}
    const gtCols=['洋芝','野芝','オーバーシード','エクイターフ'];
    const gtColors={'洋芝':'var(--gn)','野芝':'var(--bl)','オーバーシード':'var(--yl)','エクイターフ':'var(--pp)'};
    const gtIcons={'洋芝':'🌿','野芝':'🌾','オーバーシード':'🌱','エクイターフ':'🏗️'};
    let html='<h3 style="margin-bottom:12px">芝種別 × 血統パフォーマンス</h3>';
    html+=`<p style="color:var(--txd);font-size:12px;margin-bottom:16px">同じ種牡馬でも芝の種類 (洋芝/野芝/オーバーシード) によって成績が大きく変わります。</p>`;
    html+='<div class="scroll-x"><table><thead><tr><th>種牡馬</th>';
    for(const gt of gtCols) html+=`<th style="color:${gtColors[gt]}">${gtIcons[gt]} ${gt}</th>`;
    const hasGaps=d.columns.includes('洋芝_野芝_gap');
    const hasOS=d.columns.includes('OS_野芝_gap');
    if(hasGaps) html+='<th>洋芝-野芝差</th>';
    if(hasOS) html+='<th>OS-野芝差</th>';
    html+='<th>適性タイプ</th></tr></thead><tbody>';
    for(const row of d.rows.slice(0,60)){
      const sire=row[''||Object.keys(row)[0]]||Object.values(row)[0];
      html+=`<tr><td><strong>${sire}</strong></td>`;
      for(const gt of gtCols){
        const v=parseFloat(row[gt]);
        if(isNaN(v)){html+='<td style="color:var(--txd)">-</td>';continue;}
        const pct=(v*100).toFixed(1);
        const cls=pct>=35?'cg':(pct>=25?'cy':'cr');
        html+=`<td><span class="hc ${cls}">${pct}%</span></td>`;
      }
      if(hasGaps){
        const gap=parseFloat(row['洋芝_野芝_gap']);
        if(!isNaN(gap)){
          const gc=gap>=0?'var(--gn)':'var(--rd)';
          const sign=gap>=0?'+':'';
          html+=`<td style="color:${gc};font-weight:700">${sign}${(gap*100).toFixed(1)}%</td>`;
        }else{html+='<td>-</td>';}
      }
      if(hasOS){
        const gap=parseFloat(row['OS_野芝_gap']);
        if(!isNaN(gap)){
          const gc=gap>=0?'var(--yl)':'var(--rd)';
          const sign=gap>=0?'+':'';
          html+=`<td style="color:${gc};font-weight:700">${sign}${(gap*100).toFixed(1)}%</td>`;
        }else{html+='<td>-</td>';}
      }

      const yo=parseFloat(row['洋芝'])||0, no=parseFloat(row['野芝'])||0, os=parseFloat(row['オーバーシード'])||0;
      let typeLabel='',typeColor='var(--txd)';
      const gap1=yo-no;
      if(gap1>0.05){typeLabel='🌿 洋芝巧者';typeColor='var(--gn)';}
      else if(gap1<-0.05){typeLabel='🌾 野芝巧者';typeColor='var(--bl)';}
      else{typeLabel='⚡ 万能型';typeColor='var(--ac)';}
      html+=`<td style="color:${typeColor};font-weight:600;font-size:11px">${typeLabel}</td>`;
      html+='</tr>';
    }
    html+='</tbody></table></div>';
    html+=`<div class="notes"><strong>読み方:</strong><ul>
      <li>🌿 洋芝巧者 = 札幌・函館で好成績。パワーがあり欧州血統の影響が強い</li>
      <li>🌾 野芝巧者 = 夏〜秋の高速馬場で好成績。スピード・瞬発力が高い</li>
      <li>🌱 オーバーシードが得意 = 冬の中山・阪神で好成績。パワー型だが洋芝ほどは要求されない</li>
      <li>🏗️ エクイターフ = 改修後の京都 (2023〜)。洋芝ベースだが従来より均一</li>
      <li>洋芝-野芝差が大きいほど、芝種によるパフォーマンス差が大きい</li>
    </ul></div>`;
    p.innerHTML=html;
  }catch(e){p.innerHTML='<div class="empty">芝種別×血統データ読込失敗</div>';}
}
