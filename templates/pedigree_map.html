<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>血統構造マップ | ML-AutoPilot Keiba</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&family=Noto+Sans+JP:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="/static/vendor/d3.min.js"></script>
<style>
:root {
  --bg: #0a0c10;
  --surface: #12151c;
  --border: #1e2330;
  --text: #e8eaf0;
  --text-dim: #8890a0;
  --accent: #00d4aa;
  --accent2: #ff6b35;
  --ss: #e63946; --kk: #457b9d; --rb: #2a9d8f; --nd: #e9c46a;
  --dh: #f4a261; --sw: #264653; --sc: #a8dadc; --mp: #6d6875;
  --ap: #b5838d; --dp: #ffb4a2; --other: #606060;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;overflow:hidden;height:100vh}
#tree-view{flex:1;min-height:0;overflow:hidden;display:none;flex-direction:column;position:relative}
#tree-msg{display:none;align-items:center;justify-content:center;position:absolute;inset:0;font-size:1rem;background:var(--bg);z-index:5}
.gnav+.layout{height:calc(100vh - 44px)}
h1{font-family:'Shippori Mincho',serif;font-size:1.4rem;font-weight:700;letter-spacing:0.05em;color:var(--accent)}
.layout{display:grid;grid-template-columns:280px 1fr 300px;height:calc(100vh - 44px);gap:0}
.panel{background:var(--surface);border-right:1px solid var(--border);padding:16px;overflow-y:auto}
.panel-right{border-right:none;border-left:1px solid var(--border)}
.panel h2{font-size:0.75rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--text-dim);margin:16px 0 8px;font-weight:600}
.panel h2:first-child{margin-top:0}
.color-mode-btn{display:block;width:100%;padding:8px 12px;margin:3px 0;background:transparent;border:1px solid var(--border);color:var(--text);font-size:0.8rem;cursor:pointer;text-align:left;border-radius:4px;transition:all .15s}
.color-mode-btn:hover{border-color:var(--accent);color:var(--accent)}
.color-mode-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.legend-item{display:flex;align-items:center;gap:8px;font-size:0.75rem;margin:3px 0;color:var(--text-dim)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
canvas{display:block;background:var(--bg);flex-shrink:0}
.tooltip{position:fixed;pointer-events:none;background:rgba(18,21,28,.95);border:1px solid var(--accent);border-radius:6px;padding:12px 16px;font-size:0.8rem;line-height:1.5;max-width:340px;display:none;z-index:100;backdrop-filter:blur(8px)}
.tooltip .name{font-family:'Shippori Mincho',serif;font-size:1rem;font-weight:700;color:var(--accent);margin-bottom:6px}
.tooltip .line-tag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:0.7rem;margin-bottom:6px;font-weight:600}
.tooltip .stats{display:grid;grid-template-columns:1fr 1fr;gap:2px 12px}
.tooltip .stat-label{color:var(--text-dim);font-size:0.7rem}
.tooltip .stat-value{color:var(--text);font-weight:600;font-size:0.75rem}
.similar-list{margin-top:12px}
.similar-item{display:flex;justify-content:space-between;padding:6px 10px;margin:2px 0;background:rgba(255,255,255,.03);border-radius:4px;font-size:0.75rem;cursor:pointer;transition:all .15s}
.similar-item:hover{background:rgba(0,212,170,.1);color:var(--accent)}
.similar-score{color:var(--accent2);font-weight:600}
.selected-sire{font-family:'Shippori Mincho',serif;font-size:1.1rem;font-weight:700;color:var(--accent);margin-bottom:8px}
.search-box{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;font-size:0.85rem;margin:8px 0;outline:none}
.search-box:focus{border-color:var(--accent)}
.search-results{max-height:200px;overflow-y:auto}
.search-result{padding:6px 10px;cursor:pointer;font-size:0.8rem;border-radius:3px;transition:background .15s}
.search-result:hover{background:rgba(0,212,170,.15);color:var(--accent)}
.header-bar{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--surface)}
.header-bar .info{font-size:0.75rem;color:var(--text-dim)}
.zoom-controls{display:flex;gap:4px}
.zoom-btn{width:32px;height:32px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;border-radius:4px;font-size:1rem;display:flex;align-items:center;justify-content:center}
.zoom-btn:hover{border-color:var(--accent);color:var(--accent)}
.inbreed-item{font-size:.7rem;color:var(--text-dim);padding:2px 0}
.inbreed-cross{color:var(--accent2);font-weight:600}
.loading{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-dim);font-size:1rem}
.compare-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.65rem;font-weight:600;margin-left:4px}
.compare-badge.perf{background:rgba(255,107,53,.15);color:#ff6b35}
.compare-badge.ped{background:rgba(0,212,170,.15);color:#00d4aa}

/* ── ビュー切り替えタブ ── */
.view-tabs{display:flex;gap:4px;padding:0 16px}
.view-tab{padding:6px 16px;font-size:.75rem;font-weight:600;border:1px solid var(--border);
  background:transparent;color:var(--text-dim);border-radius:4px;cursor:pointer;transition:all .15s}
.view-tab:hover{border-color:var(--accent);color:var(--accent)}
.view-tab.active{background:var(--accent);color:#0a0c10;border-color:var(--accent)}

/* ── 父系ツリー（インライン階層展開式） ── */
.tree-info-card{background:rgba(0,212,170,.06);border:1px solid rgba(0,212,170,.2);
  border-radius:6px;padding:10px 12px;font-size:.75rem;line-height:1.7}
.tree-info-stat{display:flex;justify-content:space-between;color:var(--text-dim);margin-bottom:2px}
.tree-info-stat span:last-child{color:var(--text);font-weight:600}

/* ── BMS 統計パネル ── */
.bms-section{margin-top:12px}
.bms-section-title{font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;
  color:var(--text-dim);font-weight:600;margin-bottom:6px;padding-bottom:4px;
  border-bottom:1px solid var(--border)}
.bms-total-label{font-size:.65rem;color:var(--text-dim);margin-bottom:6px}
.bms-rank-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;
  padding:4px 6px;border-radius:4px;cursor:pointer;transition:background .12s}
.bms-rank-row:hover{background:rgba(255,255,255,.05)}
.bms-rank-no{width:16px;font-size:.6rem;color:var(--text-dim);text-align:right;flex-shrink:0}
.bms-rank-bar-wrap{flex:1;height:5px;background:rgba(255,255,255,.07);
  border-radius:3px;overflow:hidden}
.bms-rank-bar{height:100%;border-radius:3px;transition:width .3s ease}
.bms-rank-bar.as-sire{background:linear-gradient(90deg,#00d4aa,#00a87f)}
.bms-rank-bar.as-bms{background:linear-gradient(90deg,#ff6b35,#cc4a1a)}
.bms-rank-name{font-size:.72rem;color:var(--text);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;max-width:110px;flex-shrink:0}
.bms-rank-root{font-size:.6rem;color:var(--text-dim);flex-shrink:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px}
.bms-rank-count{font-size:.65rem;color:var(--accent2);font-weight:600;flex-shrink:0;
  min-width:28px;text-align:right}
.bms-loading{font-size:.72rem;color:var(--text-dim);padding:6px 0}

#tree-toolbar{padding:6px 10px;border-bottom:1px solid var(--border);
  background:rgba(0,0,0,.15);display:flex;align-items:center;gap:8px;flex-shrink:0}
#tree-search-input{flex:1;padding:5px 10px;background:var(--bg);border:1px solid var(--border);
  color:var(--text);border-radius:4px;font-size:.8rem;outline:none}
#tree-search-input:focus{border-color:var(--accent)}
.tree-search-clear{background:none;border:none;color:var(--text-dim);cursor:pointer;
  font-size:.9rem;padding:2px 6px}
.tree-search-clear:hover{color:var(--accent)}

/* ── ツリー本体スクロール域 ── */
#tree-node-list{flex:1;min-height:0;overflow-y:auto;padding:4px 0;font-size:.82rem}

/* ── ノード行 ── */
.tn-row{display:flex;align-items:center;gap:0;height:28px;
  cursor:pointer;transition:background .1s;position:relative}
.tn-row:hover{background:rgba(255,255,255,.04)}
.tn-row.tn-active{background:rgba(0,212,170,.09)}

/* 階層インデント + 縦線 */
.tn-indent{display:flex;align-items:center;flex-shrink:0}
.tn-vline{width:20px;height:28px;flex-shrink:0;position:relative}
.tn-vline::before{content:'';position:absolute;left:10px;top:0;bottom:0;
  border-left:1px solid rgba(255,255,255,.1)}
.tn-connector{width:20px;height:28px;flex-shrink:0;position:relative}
.tn-connector::before{content:'';position:absolute;left:10px;top:0;bottom:50%;
  border-left:1px solid rgba(255,255,255,.1)}
.tn-connector::after{content:'';position:absolute;left:10px;top:50%;width:10px;
  border-top:1px solid rgba(255,255,255,.1)}
.tn-connector.last::before{bottom:50%}
/* トグルボタン */
.tn-toggle{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;border-radius:3px;font-size:.65rem;transition:transform .2s}
.tn-toggle.open{transform:rotate(90deg)}
.tn-toggle.leaf{color:rgba(255,255,255,.15);cursor:default}
.tn-toggle.has-children{color:var(--accent);cursor:pointer}
/* 名前 */
.tn-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  padding:0 4px;color:var(--text)}
.tn-name.tn-root-name{font-weight:600;color:var(--accent)}
/* 名前リンク（クリックで血統ページへ） */
a.tn-name{text-decoration:none;cursor:pointer}
a.tn-name:hover{color:var(--accent);text-decoration:underline;text-underline-offset:2px}
a.tn-name.tn-root-name:hover{color:#00ffcc}
/* バッジ */
.tn-desc{font-size:.65rem;padding:1px 7px;border-radius:8px;flex-shrink:0;margin-right:2px;
  white-space:nowrap}
.tn-desc.big{background:rgba(0,212,170,.12);color:var(--accent)}
.tn-desc.mid{background:rgba(245,158,11,.1);color:#f59e0b}
.tn-desc.small{background:rgba(255,255,255,.06);color:var(--text-dim)}
/* netkeibaリンク */
.tn-link{display:flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:3px;color:rgba(255,255,255,.3);
  text-decoration:none;flex-shrink:0;font-size:.7rem;margin-right:6px;
  transition:color .15s,background .15s}
.tn-link:hover{color:#06b6d4;background:rgba(6,182,212,.1)}

/* 子コンテナ */
.tn-children{overflow:hidden;max-height:0;transition:max-height .2s ease}
.tn-children.open{max-height:none}
/* もっと表示ボタン */
.tn-load-more{padding:4px 8px 4px 32px}
.tn-load-more button{background:transparent;border:1px solid var(--border);color:var(--text-dim);
  font-size:.72rem;padding:3px 12px;border-radius:4px;cursor:pointer;transition:all .15s}
.tn-load-more button:hover{border-color:var(--accent);color:var(--accent)}
.tn-load-more button:disabled{opacity:.5;cursor:default}

/* ローディングスピナー */
.tn-loading{padding:6px 0 6px 44px;color:var(--text-dim);font-size:.75rem;font-style:italic}

/* ── 再構築パネル ── */
#rebuild-panel{margin-top:16px;padding:10px 12px;background:rgba(0,0,0,.2);
  border:1px solid var(--border);border-radius:6px;font-size:.72rem}
#rebuild-panel h3{font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;
  color:var(--text-dim);margin:0 0 8px;font-weight:600}
.rebuild-btn{width:100%;padding:7px 0;background:rgba(0,212,170,.12);
  border:1px solid rgba(0,212,170,.35);color:var(--accent);font-size:.78rem;
  border-radius:4px;cursor:pointer;transition:all .15s;font-weight:600}
.rebuild-btn:hover:not(:disabled){background:rgba(0,212,170,.22);border-color:var(--accent)}
.rebuild-btn:disabled{opacity:.45;cursor:default}
.rebuild-btn.running{background:rgba(245,158,11,.1);border-color:#f59e0b;color:#f59e0b}
.rebuild-progress-wrap{margin-top:8px;display:none}
.rebuild-progress-bar-bg{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-bottom:5px}
.rebuild-progress-bar{height:100%;background:var(--accent);border-radius:3px;
  transition:width .4s ease;width:0%}
.rebuild-progress-bar.error{background:#e63946}
.rebuild-msg{color:var(--text-dim);font-size:.68rem;line-height:1.5;word-break:break-all}
.rebuild-stats{margin-top:6px;font-size:.68rem;color:var(--text-dim);
  display:grid;grid-template-columns:1fr 1fr;gap:2px 8px}
.rebuild-stats span:nth-child(odd){color:var(--text-dim)}
.rebuild-stats span:nth-child(even){color:var(--text);font-weight:600}
.rebuild-file-info{margin-top:6px;font-size:.65rem;color:rgba(255,255,255,.3);line-height:1.6}

/* 詳細パネル */
.tree-detail-name{font-family:'Shippori Mincho',serif;font-size:1rem;font-weight:700;
  margin-bottom:8px;word-break:break-all;line-height:1.4}
.tn-netkeiba-btn{display:block;margin-top:10px;padding:7px 12px;
  background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.3);
  border-radius:5px;color:#06b6d4;text-decoration:none;font-size:.75rem;text-align:center;
  transition:background .15s}
.tn-netkeiba-btn:hover{background:rgba(6,182,212,.2)}

/* ── Responsive ── */
@media (max-width: 900px) {
  .layout{grid-template-columns:1fr;height:auto}
  .panel{border-right:none;border-bottom:1px solid var(--border);max-height:none}
  .panel-right{border-left:none;border-top:1px solid var(--border)}
  h1{font-size:1.2rem}
  canvas{height:400px!important}
}
@media (max-width: 480px) {
  .panel{padding:12px}
  h1{font-size:1rem}
  h2{font-size:0.7rem}
  .search-box{font-size:0.8rem}
  .header-bar{padding:10px 12px;flex-wrap:wrap}
  .zoom-controls{width:100%;justify-content:center;margin-top:8px}
  canvas{height:350px!important}
}
</style>
</head>
<body>
{% include '_nav.html' %}
<div class="layout">
  <div class="panel" id="left-panel">
    <h1><img src="/data/image/icon.jpg" alt="" class="page-brand-icon">血統構造マップ</h1>
    <p style="font-size:.7rem;color:var(--text-dim);margin:4px 0 12px">5世代祖先共有 PCA 2D / コサイン類似度</p>
    <h2>Color Mode</h2>
    <div id="color-modes"></div>
    <h2>Legend</h2>
    <div id="legend"></div>
    <h2>Search</h2>
    <input type="text" class="search-box" id="search" placeholder="種牡馬名で検索...">
    <div class="search-results" id="search-results"></div>
  </div>
  <div style="display:flex;flex-direction:column;overflow:hidden">
    <div class="header-bar">
      <div class="view-tabs">
        <button class="view-tab active" id="tab-scatter" onclick="switchView('scatter')">類似度マップ</button>
        <button class="view-tab" id="tab-tree" onclick="switchView('tree')">父系ツリー</button>
      </div>
      <div class="info" id="info-text">Loading...</div>
      <div class="zoom-controls" id="zoom-controls-wrap">
        <button class="zoom-btn" id="zoom-in">+</button>
        <button class="zoom-btn" id="zoom-out">−</button>
        <button class="zoom-btn" id="zoom-reset">⟳</button>
      </div>
    </div>
    <canvas id="chart"></canvas>
    <div id="tree-view">
      <div id="tree-msg" class="loading" style="display:none"></div>
      <div id="tree-toolbar">
        <input id="tree-search-input" type="text" placeholder="🔍  種牡馬名で検索..." oninput="treeSearch(this.value)">
        <button class="tree-search-clear" onclick="clearTreeSearch()" title="クリア">✕</button>
      </div>
      <div id="tree-node-list"></div>
    </div>
  </div>
  <div class="panel panel-right" id="right-panel">
    <div id="scatter-right-content">
      <h2>Selected Stallion</h2>
      <div id="detail-content"><p style="color:var(--text-dim);font-size:.8rem">クリックで種牡馬を選択</p></div>
    </div>
    <div id="tree-right-content" style="display:none">
      <h2 style="margin-top:0">選択ノード</h2>
      <div id="tree-node-detail"><p style="color:var(--text-dim);font-size:.75rem">ノードをクリックして選択</p></div>
    </div>
  </div>
</div>
<div class="tooltip" id="tooltip"></div>
<script>
const LINE_COLORS={
  "サンデーサイレンス系":"#e63946","キングカメハメハ系":"#457b9d","ロベルト系":"#2a9d8f",
  "ノーザンダンサー系":"#e9c46a","デインヒル系":"#f4a261","サドラーズウェルズ系":"#264653",
  "ストームキャット系":"#a8dadc","ミスタープロスペクター系":"#6d6875",
  "エーピーインディ系":"#b5838d","デピュティミニスター系":"#ffb4a2","その他":"#606060"
};

let DATA=[], SIM={};
let currentMode="sire_line", selected=null, hovered=null;
let offsetX=0, offsetY=0, scale=1, dragging=false, dragStartX=0, dragStartY=0;

const canvas=document.getElementById("chart");
const ctx=canvas.getContext("2d");
const tooltip=document.getElementById("tooltip");

const COLOR_MODES=[
  {id:"sire_line",label:"系統別",fn:d=>LINE_COLORS[d.sire_line]||"#606060"},
  {id:"inbreeding",label:"インブリード数",fn:d=>{
    const v=Math.min(d.inbreeding_count/6,1);
    return `rgb(${Math.round(60+195*v)},${Math.round(180-100*v)},${Math.round(180-130*v)})`;
  }},
  {id:"unique",label:"ユニーク祖先数",fn:d=>{
    const v=Math.min((d.unique_ancestors||30)/50,1);
    return `rgb(${Math.round(40+200*v)},${Math.round(60+160*v)},${Math.round(120+100*v)})`;
  }},
  {id:"progeny",label:"産駒数",fn:d=>{
    const v=Math.min(d.n_progeny/250,1);
    return `rgb(${Math.round(40+200*v)},${Math.round(60+150*v)},${Math.round(120+100*v)})`;
  }}
];

async function init(){
  try{
    const res=await fetch('/api/pedigree-map');
    const json=await res.json();
    if(json.error){document.getElementById('info-text').textContent=json.error;return}
    DATA=json.data||[];
    SIM=json.similarity||{};
    document.getElementById('info-text').textContent=`${DATA.length} stallions (5世代祖先共有コサイン類似度)`;
    initColorModes();updateLegend();resize();
  }catch(e){document.getElementById('info-text').textContent='データ取得エラー: '+e.message}
}

function resize(){
  const rect=canvas.parentElement.getBoundingClientRect();
  canvas.width=rect.width*devicePixelRatio;
  canvas.height=(rect.height-44)*devicePixelRatio;
  canvas.style.width=rect.width+"px";
  canvas.style.height=(rect.height-44)+"px";
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  draw();
}
window.addEventListener("resize",resize);

function getColorFn(){return COLOR_MODES.find(m=>m.id===currentMode).fn}

function worldToScreen(wx,wy){
  const cw=canvas.width/devicePixelRatio,ch=canvas.height/devicePixelRatio;
  if(!DATA.length)return[cw/2,ch/2];
  const xs=DATA.map(d=>d.x),ys=DATA.map(d=>d.y);
  const xmin=Math.min(...xs),xmax=Math.max(...xs),ymin=Math.min(...ys),ymax=Math.max(...ys);
  const pad=60;
  const sx=(wx-xmin)/(xmax-xmin||1)*(cw-2*pad)+pad;
  const sy=(1-(wy-ymin)/(ymax-ymin||1))*(ch-2*pad)+pad;
  return[(sx+offsetX)*scale+cw*(1-scale)/2,(sy+offsetY)*scale+ch*(1-scale)/2];
}

function draw(){
  const cw=canvas.width/devicePixelRatio,ch=canvas.height/devicePixelRatio;
  ctx.clearRect(0,0,cw,ch);
  if(!DATA.length)return;
  const colorFn=getColorFn();

  if(selected&&SIM[selected]){
    const simList=SIM[selected];
    const selData=DATA.find(d=>d.name===selected);
    if(selData){
      const[sx,sy]=worldToScreen(selData.x,selData.y);
      simList.forEach(([name,score])=>{
        const other=DATA.find(d=>d.name===name);
        if(other){
          const[ox,oy]=worldToScreen(other.x,other.y);
          ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(ox,oy);
          ctx.strokeStyle=`rgba(0,212,170,${score*0.6})`;
          ctx.lineWidth=score*4;ctx.stroke();
        }
      });
    }
  }

  DATA.forEach(d=>{
    const[px,py]=worldToScreen(d.x,d.y);
    const r=Math.max(4,Math.min(12,Math.sqrt(d.n_progeny||20)*0.7));
    const isSelected=d.name===selected;
    const isHovered=d.name===hovered;
    const isSimilar=selected&&SIM[selected]&&SIM[selected].some(([n])=>n===d.name);

    ctx.beginPath();
    ctx.arc(px,py,isSelected?r+4:isHovered?r+2:r,0,Math.PI*2);
    if(selected&&!isSelected&&!isSimilar){
      ctx.fillStyle=colorFn(d).replace("rgb","rgba").replace(")",",0.15)");
    }else{
      ctx.fillStyle=colorFn(d);
    }
    ctx.fill();
    if(isSelected){
      ctx.strokeStyle="#fff";ctx.lineWidth=2.5;ctx.stroke();
      ctx.beginPath();ctx.arc(px,py,r+8,0,Math.PI*2);
      ctx.strokeStyle="rgba(0,212,170,0.4)";ctx.lineWidth=1;ctx.stroke();
    }else if(isHovered){
      ctx.strokeStyle="rgba(255,255,255,0.6)";ctx.lineWidth=1.5;ctx.stroke();
    }

    const showLabel=isSelected||isHovered||isSimilar||(d.n_progeny||0)>100||scale>1.5;
    if(showLabel){
      ctx.font=`${isSelected?'bold ':''}${isSelected?'12':'10'}px 'Noto Sans JP',sans-serif`;
      ctx.fillStyle=isSelected?"#fff":isSimilar?"rgba(255,255,255,0.9)":"rgba(255,255,255,0.6)";
      ctx.textAlign="center";
      const label=d.name.length>10?d.name.slice(0,10)+"…":d.name;
      ctx.fillText(label,px,py-r-5);
    }
  });
}

function findNearest(mx,my){
  let best=null,bestDist=Infinity;
  DATA.forEach(d=>{
    const[px,py]=worldToScreen(d.x,d.y);
    const dist=Math.hypot(px-mx,py-my);
    if(dist<bestDist){bestDist=dist;best=d}
  });
  return bestDist<20?best:null;
}

canvas.addEventListener("mousemove",e=>{
  if(dragging){offsetX+=e.movementX/scale;offsetY+=e.movementY/scale;draw();return}
  const rect=canvas.getBoundingClientRect();
  const d=findNearest(e.clientX-rect.left,e.clientY-rect.top);
  hovered=d?d.name:null;canvas.style.cursor=d?"pointer":"grab";draw();
  if(d){showTooltip(d,e.clientX,e.clientY)}else{tooltip.style.display="none"}
});
canvas.addEventListener("mousedown",e=>{dragging=true;dragStartX=e.clientX;dragStartY=e.clientY;canvas.style.cursor="grabbing"});
canvas.addEventListener("mouseup",e=>{
  const moved=Math.hypot(e.clientX-dragStartX,e.clientY-dragStartY);
  dragging=false;canvas.style.cursor="grab";
  if(moved<5){const rect=canvas.getBoundingClientRect();const d=findNearest(e.clientX-rect.left,e.clientY-rect.top);if(d)selectSire(d.name)}
});
canvas.addEventListener("mouseleave",()=>{dragging=false;hovered=null;tooltip.style.display="none";draw()});
canvas.addEventListener("wheel",e=>{e.preventDefault();scale=Math.max(0.3,Math.min(8,scale*(e.deltaY>0?0.9:1.1)));draw()},{passive:false});

document.getElementById("zoom-in").onclick=()=>{scale=Math.min(8,scale*1.3);draw()};
document.getElementById("zoom-out").onclick=()=>{scale=Math.max(0.3,scale/1.3);draw()};
document.getElementById("zoom-reset").onclick=()=>{scale=1;offsetX=0;offsetY=0;draw()};

// ── ユーティリティ ──────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

function netkeibaUrl(horse_id) {
  // 10桁数字（日本馬）または 000a系（外国馬）→ netkeiba 血統ページ
  const id = String(horse_id || '');
  if (/^\d{10}$/.test(id) || /^000a[0-9a-f]+$/i.test(id)) {
    return `https://db.netkeiba.com/horse/ped/${id}/`;
  }
  return null;
}

function descClass(n_desc) {
  if (n_desc > 1000) return 'big';
  if (n_desc > 50)   return 'mid';
  return 'small';
}

function descLabel(node) {
  if (node.n_descendants > 0) return `${node.n_descendants.toLocaleString()} 子孫`;
  if (node.n_children > 0)    return `${node.n_children} 子`;
  return '末端';
}

// ── APIフェッチ（キャッシュ付き） ──────────────────────────
async function fetchNode(id) {
  if (_treeCache[id]) return _treeCache[id];
  const res = await fetch(`/api/stallion-sire-tree/node/${encodeURIComponent(id)}`);
  const data = await res.json();
  _treeCache[id] = data;
  return data;
}

// ── ノード行のHTMLを生成 ────────────────────────────────────
function makeNodeRowHtml(node, depth, isLast, isRoot) {
  const indent = buildIndentHtml(depth, isLast);
  const hasKids = node.n_children > 0;
  const toggleCls = hasKids ? 'has-children' : 'leaf';
  const nameCls   = isRoot && depth === 0 ? 'tn-name tn-root-name' : 'tn-name';
  const nkUrl = netkeibaUrl(node.id);
  // 名前をリンクにする（クリックで新タブ）。リンクがない場合は span のまま
  const nameHtml = nkUrl
    ? `<a class="${nameCls}" href="${nkUrl}" target="_blank" title="netkeiba 血統ページを開く" onclick="event.stopPropagation()">${esc(node.name)}</a>`
    : `<span class="${nameCls}" title="${esc(node.name)}">${esc(node.name)}</span>`;
  const descHtml = `<span class="tn-desc ${descClass(node.n_descendants)}">${descLabel(node)}</span>`;
  return `
    <div class="tn-row" data-id="${esc(node.id)}" onclick="onNodeClick(this,'${esc(node.id)}','${esc(node.name)}',${hasKids})">
      ${indent}
      <span class="tn-toggle ${toggleCls}" data-toggle="${node.id}">${hasKids ? '▶' : '·'}</span>
      ${nameHtml}
      ${descHtml}
    </div>
    <div class="tn-children" id="ch-${esc(node.id)}"></div>`;
}

function buildIndentHtml(depth, isLast) {
  if (depth === 0) return '';
  let html = '';
  // depth-1 本の縦線
  for (let i = 0; i < depth - 1; i++) {
    html += '<span class="tn-vline"></span>';
  }
  // 最後の接続線
  html += `<span class="tn-connector${isLast ? ' last' : ''}"></span>`;
  return `<span class="tn-indent">${html}</span>`;
}

// ── ノードクリック処理 ─────────────────────────────────────
async function onNodeClick(el, id, name, hasKids) {
  // 詳細パネル更新
  highlightRow(id);
  const cached = _treeCache[id];
  if (cached?.node) renderTreeDetail(cached.node);
  else {
    // 非同期で詳細を取得
    fetchNode(id).then(d => { if (d.node) renderTreeDetail(d.node); });
  }
  if (!hasKids) return;

  const childContainer = document.getElementById(`ch-${id}`);
  if (!childContainer) return;

  const toggle = el.querySelector(`[data-toggle="${id}"]`);
  const isOpen = childContainer.classList.contains('open');

  if (isOpen) {
    // 折りたたみ
    childContainer.classList.remove('open');
    childContainer.style.maxHeight = '0';
    if (toggle) toggle.classList.remove('open');
    return;
  }

  // 展開
  childContainer.classList.add('open');
  childContainer.style.maxHeight = 'none';
  if (toggle) toggle.classList.add('open');

  // 子ノードが未ロードなら取得
  if (childContainer.innerHTML === '') {
    childContainer.innerHTML = '<div class="tn-loading">読み込み中...</div>';
    try {
      const parentDepth = countDepth(el);
      await loadChildren(id, childContainer, parentDepth, 0);
    } catch(e) {
      childContainer.innerHTML = `<div class="tn-loading" style="color:#e63946">エラー: ${esc(e.message)}</div>`;
    }
  }
}

const PAGE_SIZE = 100; // 一度に表示する子ノード数

async function loadChildren(id, container, parentDepth, offset) {
  const url = `/api/stallion-sire-tree/node/${encodeURIComponent(id)}?offset=${offset}&limit=${PAGE_SIZE}`;
  const res  = await fetch(url);
  const data = await res.json();
  if (data.node && !_treeCache[id]) _treeCache[id] = data;

  const children     = data.children || [];
  const total        = data.total_children || children.length;
  const nextOffset   = offset + children.length;
  const hasMore      = nextOffset < total;

  if (offset === 0) {
    // 初回: コンテナを完全クリア（読み込み中...を除去）
    container.innerHTML = '';
    if (children.length === 0) {
      container.innerHTML = '<div class="tn-loading">（子ノードなし）</div>';
      return;
    }
  } else {
    // 追加ロード: 「もっと表示」ボタンだけ削除
    const existingMore = container.querySelector('.tn-load-more');
    if (existingMore) existingMore.remove();
  }

  // horse_id で重複を排除して描画
  const seenIds = new Set(
    Array.from(container.querySelectorAll('.tn-row')).map(r => r.dataset.id)
  );
  const frag = document.createDocumentFragment();
  children.forEach((c, i) => {
    if (seenIds.has(c.id)) return; // horse_id 重複スキップ
    seenIds.add(c.id);
    const isLast = !hasMore && (i === children.length - 1);
    const div = document.createElement('div');
    div.innerHTML = makeNodeRowHtml(c, parentDepth + 1, isLast, false);
    while (div.firstChild) frag.appendChild(div.firstChild);
  });
  container.appendChild(frag);

  if (hasMore) {
    const btn = document.createElement('div');
    btn.className = 'tn-load-more';
    btn.innerHTML = `<button onclick="loadMoreChildren('${esc(id)}', this, ${parentDepth}, ${nextOffset})">▼ さらに表示（${nextOffset} / ${total} 件）</button>`;
    container.appendChild(btn);
  }
}

async function loadMoreChildren(id, btn, parentDepth, offset) {
  btn.disabled = true;
  btn.textContent = '読み込み中...';
  const container = btn.closest('.tn-children');
  try {
    await loadChildren(id, container, parentDepth, offset);
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'エラー（再試行）';
  }
}

function countDepth(rowEl) {
  // tn-indent スパン内の vline/connector 数でネストの深さを算出
  const indent = rowEl.querySelector('.tn-indent');
  if (!indent) return 0;
  return indent.querySelectorAll('.tn-vline, .tn-connector').length;
}

function highlightRow(id) {
  document.querySelectorAll('.tn-row.tn-active').forEach(r => r.classList.remove('tn-active'));
  const row = document.querySelector(`.tn-row[data-id="${CSS.escape(id)}"]`);
  if (row) { row.classList.add('tn-active'); row.scrollIntoView({block:'nearest', behavior:'smooth'}); }
}

// ── BMS ランキング HTML 生成 ──────────────────────────────
function renderBmsRankList(items, colorClass, maxCount) {
  if (!items || items.length === 0)
    return '<div class="bms-loading">データなし</div>';
  return items.map((item, i) => {
    const pct = maxCount > 0 ? Math.max(4, Math.round(item.count / maxCount * 100)) : 4;
    const rootLabel = item.root_name && item.root_name !== item.name
      ? `<span class="bms-rank-root" title="${esc(item.root_name)}">${esc(item.root_name)}系</span>` : '';
    return `<div class="bms-rank-row" title="${esc(item.name)} (${item.count.toLocaleString()}頭)">
      <span class="bms-rank-no">${i+1}</span>
      <span class="bms-rank-name" title="${esc(item.name)}">${esc(item.name)}</span>
      ${rootLabel}
      <div class="bms-rank-bar-wrap"><div class="bms-rank-bar ${colorClass}" style="width:${pct}%"></div></div>
      <span class="bms-rank-count">${item.count.toLocaleString()}</span>
    </div>`;
  }).join('');
}

          ${renderBmsRankList(data.as_bms, 'as-bms', max2)}
        </div>`;
    })
    .catch(() => {
      const area = document.getElementById('bms-stats-area');
      if (area) area.innerHTML = '';
    });
}

// ── ルートからツリー全体を描画 ─────────────────────────────
async function initFullTree() {
  try {
    // 全ルートを一括取得（limit=9999 で実質上限なし）
    const res = await fetch('/api/stallion-sire-tree/roots?limit=9999');
    const data = await res.json();
    if (data.error) { _treeMsg(data.error, true); return; }
    _treeMsg('');
    const list = document.getElementById('tree-node-list');
    list.innerHTML = data.nodes.map((n, i) =>
      makeNodeRowHtml(n, 0, i === data.nodes.length - 1, true)
    ).join('');
  } catch(e) {
    _treeMsg('読み込みエラー: ' + e.message, true);
  }
}

// ── 検索 ──────────────────────────────────────────────────
let _treeSearchTimer = null;
function treeSearch(q) {
  clearTimeout(_treeSearchTimer);
  _treeSearchTimer = setTimeout(async () => {
    const list = document.getElementById('tree-node-list');
    if (!q.trim()) {
      // 検索クリア → ルート再表示
      _treeMsg('');
      await initFullTree();
      return;
    }
    _treeMsg('検索中...');
    try {
      const res = await fetch(`/api/stallion-sire-tree/search?q=${encodeURIComponent(q)}&limit=80`);
      const data = await res.json();
      _treeMsg('');
      if (!data.nodes?.length) {
        list.innerHTML = `<div style="padding:32px;text-align:center;color:var(--text-dim);font-size:.8rem">"${esc(q)}" に一致する馬が見つかりません</div>`;
        return;
      }
      // 検索結果はフラットリスト（depth=0）で表示
      list.innerHTML = `
        <div style="padding:4px 12px 8px;font-size:.7rem;color:var(--text-dim)">
          検索結果: ${data.total.toLocaleString()} 件中 上位${data.nodes.length}件
        </div>
        ${data.nodes.map((n, i) => makeNodeRowHtml(n, 0, i === data.nodes.length - 1, false)).join('')}`;
    } catch(e) { _treeMsg('検索エラー: ' + e.message, true); }
  }, 350);
}

function clearTreeSearch() {
  const inp = document.getElementById('tree-search-input');
  if (inp) inp.value = '';
  treeSearch('');
}

// ════════════════════════════════════════════════════════════
//  ツリー再構築
// ════════════════════════════════════════════════════════════

let _rebuildPollTimer = null;

async function startRebuild() {
  const btn  = document.getElementById('rebuild-btn');
  const wrap = document.getElementById('rebuild-progress-wrap');
  const bar  = document.getElementById('rebuild-progress-bar');
  const msg  = document.getElementById('rebuild-msg');
  const det  = document.getElementById('rebuild-stats-detail');
  if (!btn || !wrap) return;

  btn.disabled = true;
  btn.classList.add('running');
  btn.textContent = '⚙ 再計算中...';
  wrap.style.display = 'block';
  bar.className = 'rebuild-progress-bar';
  bar.style.width = '0%';
  msg.textContent = '起動中...';
  det.style.display = 'none';

  try {
    const res = await fetch('/api/stallion-sire-tree/rebuild', { method: 'POST' });
    const data = await res.json();
    if (!res.ok) {
      msg.textContent = data.error || 'エラー';
      bar.classList.add('error');
      btn.disabled = false;
      btn.classList.remove('running');
      btn.textContent = '⚙ 父系ツリーを再計算';
      return;
    }
  } catch(e) {
    msg.textContent = 'リクエストエラー: ' + e.message;
    bar.classList.add('error');
    btn.disabled = false;
    btn.classList.remove('running');
    btn.textContent = '⚙ 父系ツリーを再計算';
    return;
  }

  // ポーリング開始
  clearInterval(_rebuildPollTimer);
  _rebuildPollTimer = setInterval(_pollRebuildStatus, 1500);
}

async function _pollRebuildStatus() {
  const btn  = document.getElementById('rebuild-btn');
  const wrap = document.getElementById('rebuild-progress-wrap');
  const bar  = document.getElementById('rebuild-progress-bar');
  const msg  = document.getElementById('rebuild-msg');
  const det  = document.getElementById('rebuild-stats-detail');
  const fi   = document.getElementById('rebuild-file-info');

  let data;
  try {
    const res = await fetch('/api/stallion-sire-tree/rebuild/status');
    data = await res.json();
  } catch(e) {
    return; // ネットワークエラーは無視して再試行
  }

  const pct = Math.round((data.progress || 0) * 100);
  bar.style.width = pct + '%';
  msg.textContent = data.message || '';

  // ファイル情報
  if (data.files) {
    const parts = [];
    if (data.files.nodes) parts.push(`nodes: ${data.files.nodes.size_kb} KB  (${data.files.nodes.updated_at?.slice(0,19).replace('T',' ')})`);
    if (data.files.edges) parts.push(`edges: ${data.files.edges.size_kb} KB  (${data.files.edges.updated_at?.slice(0,19).replace('T',' ')})`);
    if (fi) fi.textContent = parts.join('\n');
  }

  if (!data.running) {
    clearInterval(_rebuildPollTimer);
    _rebuildPollTimer = null;
    btn.disabled = false;
    btn.classList.remove('running');
    btn.textContent = '⚙ 父系ツリーを再計算';

    if (data.error) {
      bar.classList.add('error');
    } else if (data.stats) {
      // 統計カードを更新
      _updateTreeStatsCard(data.stats);
      // 詳細表示
      det.style.display = 'grid';
      det.innerHTML = `
        <span>ノード総数</span><span>${(data.stats.n_nodes||0).toLocaleString()} 頭</span>
        <span>父-子ペア</span><span>${(data.stats.n_edges||0).toLocaleString()} 組</span>
        <span>ルート数</span><span>${(data.stats.n_roots||0).toLocaleString()}</span>
        <span>最大深さ</span><span>${data.stats.max_depth || '—'} 世代</span>
        <span>処理時間</span><span>${data.stats.elapsed_sec || '—'} 秒</span>
        <span>ファイル数</span><span>${(data.stats.n_files||0).toLocaleString()}</span>`;
      // ツリーキャッシュをクリアして再読み込み
      Object.keys(_treeCache).forEach(k => delete _treeCache[k]);
      _treeLoaded = false;
      _treeMsg('再読み込み中...');
      document.getElementById('tree-node-list').innerHTML = '';
      setTimeout(() => {
        _treeLoaded = true;
        _treeMsg('');
        initFullTree();
      }, 800);
    }
  }
}

function _updateTreeStatsCard(stats) {
  const nEl = document.getElementById('stat-nodes');
  const eEl = document.getElementById('stat-edges');
  const rEl = document.getElementById('stat-roots');
  if (nEl) nEl.textContent = (stats.n_nodes||0).toLocaleString() + ' 頭';
  if (eEl) eEl.textContent = (stats.n_edges||0).toLocaleString() + ' 組';
  if (rEl) rEl.textContent = (stats.n_roots||0).toLocaleString();
}

async function _loadInitialRebuildStatus() {
  try {
    const res  = await fetch('/api/stallion-sire-tree/rebuild/status');
    const data = await res.json();
    const fi   = document.getElementById('rebuild-file-info');

    if (data.files && fi) {
      const parts = [];
      if (data.files.nodes) parts.push(`nodes: ${data.files.nodes.size_kb} KB  (${data.files.nodes.updated_at?.slice(0,19).replace('T',' ')})`);
      if (data.files.edges) parts.push(`edges: ${data.files.edges.size_kb} KB  (${data.files.edges.updated_at?.slice(0,19).replace('T',' ')})`);
      fi.textContent = parts.join('\n');
    }
    if (data.stats) _updateTreeStatsCard(data.stats);

    // 前回のジョブが実行中なら自動でポーリング再開
    if (data.running) {
      const btn  = document.getElementById('rebuild-btn');
      const wrap = document.getElementById('rebuild-progress-wrap');
      if (btn)  { btn.disabled = true; btn.classList.add('running'); btn.textContent = '⚙ 再計算中...'; }
      if (wrap) wrap.style.display = 'block';
      clearInterval(_rebuildPollTimer);
      _rebuildPollTimer = setInterval(_pollRebuildStatus, 1500);
    }
  } catch(e) { /* ignore */ }
}

// ── 左パネル初期化 ─────────────────────────────────────────

      scatterContent.appendChild(leftPanel.children[1]);

  }
  if (!document.getElementById('tree-left-content')) {
    const treeContent = document.createElement('div');
    treeContent.id = 'tree-left-content';
    treeContent.style.display = 'none';
    treeContent.innerHTML = `
      <h2 style="margin-top:0">操作方法</h2>
      <div style="font-size:.7rem;color:var(--text-dim);line-height:1.9">
        <div><span style="color:var(--accent);font-weight:600">▶</span> をクリックして子ノードを展開</div>
        <div><span style="color:var(--accent);font-weight:600">▼</span> で折りたたみ</div>
        <div><span style="color:#06b6d4">🔗</span> でnetkeiba血統ページへ</div>
        <div style="margin-top:6px">上部検索欄で名前絞り込み</div>
      </div>
      <div id="tree-stats-card" style="margin-top:14px;padding:10px;background:rgba(0,212,170,.05);
        border-radius:4px;border:1px solid rgba(0,212,170,.15);font-size:.72rem">
        <div style="color:var(--accent);font-weight:600;margin-bottom:6px">データ規模</div>
        <div style="display:flex;justify-content:space-between;margin-bottom:2px">
          <span style="color:var(--text-dim)">馬総数</span><strong id="stat-nodes">—</strong>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:2px">
          <span style="color:var(--text-dim)">父-子ペア</span><strong id="stat-edges">—</strong>
        </div>
        <div style="display:flex;justify-content:space-between">
          <span style="color:var(--text-dim)">ルート数</span><strong id="stat-roots">—</strong>
        </div>
      </div>
      <h2 style="margin-top:16px">色の意味</h2>
      <div style="font-size:.7rem;color:var(--text-dim);line-height:1.8">
        <div><span style="color:var(--accent);font-weight:600">緑バッジ</span> 1,000+ 子孫</div>
        <div><span style="color:#f59e0b;font-weight:600">黄バッジ</span> 51〜1,000 子孫</div>
        <div><span style="color:var(--text-dim)">灰バッジ</span> 〜50 子孫</div>
      </div>

      <div id="rebuild-panel">
        <h3>ツリー再構築</h3>
        <button class="rebuild-btn" id="rebuild-btn" onclick="startRebuild()">
          ⚙ 父系ツリーを再計算
        </button>
        <div style="margin-top:5px;font-size:.65rem;color:rgba(255,255,255,.35);line-height:1.6">
          ローカル上の全血統データから<br>
          父子ペアを再集計します。<br>
          目安: 約 10 秒
        </div>
        <div class="rebuild-progress-wrap" id="rebuild-progress-wrap">
          <div class="rebuild-progress-bar-bg">
            <div class="rebuild-progress-bar" id="rebuild-progress-bar"></div>
          </div>
          <div class="rebuild-msg" id="rebuild-msg"></div>
          <div class="rebuild-stats" id="rebuild-stats-detail" style="display:none"></div>
        </div>
        <div class="rebuild-file-info" id="rebuild-file-info"></div>
      </div>`;
    leftPanel.appendChild(treeContent);
  }
}

initTreeLeftPanel();
_loadInitialRebuildStatus();
</script>
